show_player:
  s_outlane_l_active:
    led_on_show:
      loops: 0
      show_tokens:
        led: l_left_outlane
        col: f0f0f0
      key: l_left_outlane_show
  
  s_inlane_l_active:  
    led_on_show:
      loops: 0    
      show_tokens:
        led: l_left_inlane
        col: f0f0f0        
      key: l_left_inlane_show        

  s_outlane_r_active:
    led_on_show:
      loops: 0    
      show_tokens:
        led: l_right_outlane
        col: f0f0f0        
      key: l_right_outlane_show
  
  s_inlane_r_active:  
    led_on_show:
      loops: 0
      show_tokens:
        led: l_right_inlane
        col: f0f0f0        
      key: l_right_inlane_show        
  
  s_upper_target_left_active:
    led_on_show:
      loops: 0
      show_tokens:
        led: l_upper_left
        col: f000f0        
      key: l_upper_left_show        

  s_upper_target_center_active:
    led_on_show:
      loops: 0
      show_tokens:
        led: l_upper_middle
        col: f000f0        
      key: l_upper_middle_show        
  
  s_upper_target_right_active:
    led_on_show:
      loops: 0
      show_tokens:
        led: l_upper_right
        col: f000f0        
      key: l_upper_right_show        
  
    

    

coil_player:
  enable_up_post_event:
    c_up_post:
      action: enable    
      
  timer_timer_up_post_hold_complete:
    c_up_post:
      action: disable

  mode_base_stopping:
    c_up_post:
      action: disable

  up_kick:
    c_vuk_to_upper:
      action: pulse
    
  diverter_open:    
    c_diverter_open_close:
      action: pulse
      pulse_ms: 220

  diverter_close:    
    c_diverter_open_close:
      action: pulse
      pulse_ms: 100    



 
sequences:
  reset_left_bank_after_hit:
    events:
      - drop_target_bank_dt_bank_left_down
      - s_web_target_left_active
    reset_on_complete: true
    disable_on_complete: false
    events_when_complete: drop_target_bank_dt_bank_1eft_reset
  
  reset_right_bank_after_hit:
    events:
      - drop_target_bank_dt_bank_right_down
      - s_web_target_top_active
    reset_on_complete: true
    disable_on_complete: false
    events_when_complete: drop_target_bank_dt_bank_right_reset

