hardware:
    platform: fast 
fast:
  net:
    controller: neuron
    io_loop:
      cab:
        model: FP-I/O-0024
        order: 1
      3208:
        model: FP-I/O-3208
        order: 2
      1616mid:
        model: FP-I/O-1616
        order: 3
      1616bot:
        model: FP-I/O-1616
        order: 4
    port: auto
    baud: 921600
    debug: false
    watchdog: 1s
    default_quick_debounce_open: 2ms
    default_quick_debounce_close: 2ms
    default_normal_debounce_open: 4ms
    default_normal_debounce_close: 4ms
  exp:
    boards:
      playfield:
        model: FP-EXP-0071
        led_fade_time: 100ms
    port: auto
    baud: 921600
    debug: False

