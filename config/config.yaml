#config_version=6
hardware:
    platform: fast 
fast:
  net:
    controller: neuron
    io_loop:
      cab:
        model: FP-I/O-0024
        order: 1
      3208:
        model: FP-I/O-3208
        order: 2
      1616mid:
        model: FP-I/O-1616
        order: 3
      1616bot:
        model: FP-I/O-1616
        order: 4
    port: auto
    baud: 921600
    debug: false
    watchdog: 1s
    default_quick_debounce_open: 2ms
    default_quick_debounce_close: 2ms
    default_normal_debounce_open: 4ms
    default_normal_debounce_close: 4ms
  exp:
    boards:
      playfield:
        model: FP-EXP-0071
        led_fade_time: 100ms
    port: auto
    baud: 921600
    debug: False

virtual_platform_start_active_switches:
  - s_trough1
  - s_trough2
  - s_trough3
  - s_trough4
  - s_trough5
  - s_trough6




#Game Config
config:
  - lights.yaml
  - coils.yaml
  - switches.yaml
  - devices.yaml
  - sounds.yaml
  - images.yaml
  - videos.yaml

playfields:
  playfield:    
    default_source_device: bd_plunger
    tags: default

machine:
  balls_installed: 3

game:
  balls_per_game: 3
  max_players: 4



modes:
  - attract
  - base
  - service
  - high_score  
  - bonus
  - bonus_lanes
  - daily_bugle_mystery
  - meteor
  - custom_bonus
  - super_spinner
  - super_pops
  - qualify_villain_vars
  - qualify_upper_access
  - qualify_villain_locate
  - qualify_villain_select
  - qualify_villain_start
  - doc_ock
  - electro
  - goblin 
  - lizard
  - mysterio
  - parafino
  - rhino
  - sandman
  - scorpion
  - vulture
 # - kingpin



event_player:
  ball_starting:
    - cmd_flippers_enable
    - cmd_autofire_coils_enable
    - cmd_drop_targets_reset
  ball_ending:
    - cmd_flippers_disable
    - cmd_autofire_coils_disable
    - timer_timer_up_post_hold_complete
  tilt:
    - cmd_flippers_disable
    - cmd_autofire_coils_disable
    - timer_timer_up_post_hold_complete
  slam_tilt:
    - cmd_flippers_disable
    - cmd_autofire_coils_disable
    - timer_timer_up_post_hold_complete
    
  rooftop_diverter_open{device.switches.s_diverter_open.state == 1}:
    - fire_rooftop_diverter_open
    
  rooftop_diverter_close{device.switches.s_diverter_open.state == 0}:
    - fire_rooftop_diverter_close

  s_plunger_active{current_player.multiball_autoplunge_active == 1}:
    - plunger_auto_fire|2s

  drop_target_bank_dt_bank_left_down{current_player.villain_mode_running == 0}:
    - drop_target_bank_dt_bank_1eft_reset

  drop_target_bank_dt_bank_right_down{current_player.villain_mode_running == 0}:
    - drop_target_bank_dt_bank_right_reset

  reset_drops:
    - reset_3bank
    - reset_5bank|300ms

  reset_5bank_delayed:
    - reset_5bank|500ms



coil_player:
  enable_up_post_event:
    c_up_post:
      action: enable    
      
  timer_timer_up_post_hold_complete:
    c_up_post:
      action: disable

  mode_base_stopping:
    c_up_post:
      action: disable

  kickout_saucer_1:
    c_saucer_1:
      action: pulse

  kickout_saucer_2:
    c_saucer_2:
      action: pulse

  kickout_saucer_3:
    c_saucer_3:
      action: pulse

  up_kick:
    c_vuk_to_upper:
      action: pulse
    
  fire_rooftop_diverter_open:
    c_diverter_open_close:
      action: pulse
      pulse_ms: 220
  
  fire_rooftop_diverter_close:
    c_diverter_open_close:
      action: pulse
      pulse_ms: 100    

  reset_5bank:
    c_right_bank_reset:
      action: pulse

  reset_3bank:
    c_left_bank_reset:
      action: pulse

  plunger_auto_fire:
    c_auto_plunger:
      action: pulse
      




 
sequences:
  reset_left_bank_after_hit:
    events:
      - drop_target_bank_dt_bank_left_down
      - xxxs_web_target_left_active
    reset_on_complete: true
    disable_on_complete: false
    events_when_complete: drop_target_bank_dt_bank_1eft_reset
  
  reset_right_bank_after_hit:
    events:
      - drop_target_bank_dt_bank_right_down
      - xxxs_web_target_top_active
    reset_on_complete: true
    disable_on_complete: false
    events_when_complete: drop_target_bank_dt_bank_right_reset



ball_saves:

  mystery_ball_save:
    active_time: 10s
    hurry_up_time: 3s
    grace_period: 2s
    enable_events:
      - mystery_award_ball_save


  default_ball_save:
    active_time: 10s
    hurry_up_time: 3s
    grace_period: 2s
    enable_events:
      - ball_started
#    timer_start_events:
#      - playfield_active      

