event_player:
  ball_starting:
    - cmd_flippers_enable
    - cmd_autofire_coils_enable
    - cmd_drop_targets_reset
  ball_ending:
    - cmd_flippers_disable
    - cmd_autofire_coils_disable
    - timer_timer_up_post_hold_complete
  tilt:
    - cmd_flippers_disable
    - cmd_autofire_coils_disable
    - timer_timer_up_post_hold_complete
    - case_files_clear_lights
    - clear_villain_saucer_lights
    - reset_drops
    - clear_saucers

  slam_tilt:
    - cmd_flippers_disable
    - cmd_autofire_coils_disable
    - timer_timer_up_post_hold_complete
    - case_files_clear_lights
    - clear_villain_saucer_lights
    - reset_drops
    - clear_saucers
    
  rooftop_diverter_open{device.switches.s_diverter_open.state == 1}:
    - fire_rooftop_diverter_open
    
  rooftop_diverter_close{device.switches.s_diverter_open.state == 0}:
    - fire_rooftop_diverter_close

  s_plunger_active{current_player.multiball_autoplunge_active == 1}:
    - plunger_auto_fire|2s

  ball_started{current_player.multiball_autoplunge_active == 1}:
    - disable_outlane_autoplunge

  drop_target_bank_dt_bank_left_down{current_player.villain_mode_running == 0}:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down{current_player.villain_mode_running == 0}:
    - drop_target_bank_dt_bank_right_reset

  reset_drops:
    - reset_3bank
    - reset_5bank|300ms

  villain_full_cleanup:
    - case_files_clear_lights
    - case_files_reset_all
    - clear_villain_saucer_lights
    - clear_saucers
    - reset_drops

  reset_5bank_delayed:
    - reset_5bank|500ms



extra_ball_groups:
  main_extra_ball_group:
    max_per_game: 3
    light_events: mystery_extra_ball_lit
    award_lit_events: mystery_extra_ball_award


coil_player:
  enable_up_post_event:
    c_up_post:
      action: enable    
      
  timer_timer_up_post_hold_complete:
    c_up_post:
      action: disable

  mode_base_stopping:
    c_up_post:
      action: disable

  kickout_saucer_1:
    c_saucer_1:
      action: pulse

  kickout_saucer_2:
    c_saucer_2:
      action: pulse

  kickout_saucer_3:
    c_saucer_3:
      action: pulse

  up_kick:
    c_vuk_to_upper:
      action: pulse
    
  fire_rooftop_diverter_open:
    c_diverter_open_close:
      action: pulse
      pulse_ms: 220
  
  fire_rooftop_diverter_close:
    c_diverter_open_close:
      action: pulse
      pulse_ms: 100    

  reset_5bank:
    c_right_bank_reset:
      action: pulse

  reset_3bank:
    c_left_bank_reset:
      action: pulse

  plunger_auto_fire:
    c_auto_plunger:
      action: pulse
      

sound_player:
  up_kick:
    hb_spring_1:
      action: play
      bus: effects

 
sequences:
  reset_left_bank_after_hit:
    events:
      - drop_target_bank_dt_bank_left_down
      - xxxs_web_target_left_active
    reset_on_complete: true
    disable_on_complete: false
    events_when_complete: drop_target_bank_dt_bank_left_reset
  
  reset_right_bank_after_hit:
    events:
      - drop_target_bank_dt_bank_right_down
      - xxxs_web_target_mid_active
    reset_on_complete: true
    disable_on_complete: false
    events_when_complete: drop_target_bank_dt_bank_right_reset



ball_saves:

  mystery_ball_save:
    active_time: 10s
    hurry_up_time: 3s
    grace_period: 2s
    enable_events:
      - mystery_award_ball_save


  default_ball_save:
    active_time: 16s
    hurry_up_time: 3s
    grace_period: 2s
    enable_events:
      - start_my_default_ball_save
#    timer_start_events:
#      - playfield_active      


  case_file_ball_save:
    active_time: 10s
    hurry_up_time: 3s
    grace_period: 2s
    enable_events:
      - start_case_file_ball_save





