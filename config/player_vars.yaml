#config_version=6
#
# Player variable declarations for ASM67 campaign/progression systems.
#
# Include this file from your main config.yaml, for example:
#
# config:
#   - player_vars_campaign.yaml
#
# Or paste the player_vars: block into config.yaml.
#
# Notes:
# - These are intentionally broad/default-safe.
# - Declaring these prevents Godot/GMC MPFVariable nodes and Python f-string
#   lookups from reading missing player vars.
# - MPF Player objects should be read with player["var"] or helper methods,
#   not player.get(...).

