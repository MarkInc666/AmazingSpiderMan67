#config_version=6

# DeVargas placeholder villain mode.
# Mode idea: Gold value moves between shots; collect trails then cash city jackpot.

mode:
  start_events: start_mode_devargas
  stop_events:
    - devargas_mode_complete
    - devargas_mode_failed
    - devargas_mode_completed_summary
    - ball_ended
  code: devargas.Devargas
  priority: 300

widget_player:
  mode_devargas_started:
    devargas:
      action: play

  devargas_mode_complete:
    devargas:
      action: remove

  devargas_mode_failed:
    devargas:
      action: remove

  mode_devargas_stopping:
    devargas:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: devargas_shot_hit
  s_pop_right_active: devargas_shot_hit
  s_trispinner_opto_active: devargas_shot_hit
  s_web_spinner_active: devargas_shot_hit
  s_star_rollover_active: devargas_shot_hit
  s_upper_target_left_active: devargas_shot_hit
  s_upper_target_center_active: devargas_shot_hit
  s_upper_target_right_active: devargas_shot_hit

  s_left_drops_1_active: devargas_shot_hit
  s_left_drops_2_active: devargas_shot_hit
  s_left_drops_3_active: devargas_shot_hit
  s_right_drops_1_active: devargas_shot_hit
  s_right_drops_2_active: devargas_shot_hit
  s_right_drops_3_active: devargas_shot_hit
  s_right_drops_4_active: devargas_shot_hit
  s_right_drops_5_active: devargas_shot_hit

  s_saucer_1_active:
    - devargas_major_hit
    - clear_saucers
  s_saucer_2_active:
    - devargas_major_hit
    - clear_saucers
  s_saucer_3_active:
    - devargas_major_hit
    - clear_saucers
  s_vuk_switch_active: devargas_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_devargas_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_devargas_stopping:
    - clear_saucers
