#config_version=6

# Infinata placeholder villain mode.
# Mode idea: Shots loop through dimensions; hit sequence to escape loop and collect jackpot.

mode:
  start_events: start_mode_infinata
  stop_events:
    - infinata_mode_complete
    - infinata_mode_failed
    - infinata_mode_completed_summary
    - ball_ended
  code: infinata.Infinata
  priority: 300

widget_player:
  mode_infinata_started:
    infinata:
      action: play

  infinata_mode_complete:
    infinata:
      action: remove

  infinata_mode_failed:
    infinata:
      action: remove

  mode_infinata_stopping:
    infinata:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: infinata_shot_hit
  s_pop_right_active: infinata_shot_hit
  s_trispinner_opto_active: infinata_shot_hit
  s_web_spinner_active: infinata_shot_hit
  s_star_rollover_active: infinata_shot_hit
  s_upper_target_left_active: infinata_shot_hit
  s_upper_target_center_active: infinata_shot_hit
  s_upper_target_right_active: infinata_shot_hit

  s_left_drops_1_active: infinata_shot_hit
  s_left_drops_2_active: infinata_shot_hit
  s_left_drops_3_active: infinata_shot_hit
  s_right_drops_1_active: infinata_shot_hit
  s_right_drops_2_active: infinata_shot_hit
  s_right_drops_3_active: infinata_shot_hit
  s_right_drops_4_active: infinata_shot_hit
  s_right_drops_5_active: infinata_shot_hit

  s_saucer_1_active:
    - infinata_major_hit
    - clear_saucers
  s_saucer_2_active:
    - infinata_major_hit
    - clear_saucers
  s_saucer_3_active:
    - infinata_major_hit
    - clear_saucers
  s_vuk_switch_active: infinata_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_infinata_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_infinata_stopping:
    - clear_saucers
