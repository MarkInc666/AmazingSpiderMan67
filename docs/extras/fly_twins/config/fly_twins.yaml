#config_version=6

# Fly Twins placeholder villain mode.
# Mode idea: Two fly shots are lit; hit both within window for double jackpot.

mode:
  start_events: start_mode_fly_twins
  stop_events:
    - fly_twins_mode_complete
    - fly_twins_mode_failed
    - fly_twins_mode_completed_summary
    - ball_ended
  code: fly_twins.FlyTwins
  priority: 300

widget_player:
  mode_fly_twins_started:
    fly_twins:
      action: play

  fly_twins_mode_complete:
    fly_twins:
      action: remove

  fly_twins_mode_failed:
    fly_twins:
      action: remove

  mode_fly_twins_stopping:
    fly_twins:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: fly_twins_shot_hit
  s_pop_right_active: fly_twins_shot_hit
  s_trispinner_opto_active: fly_twins_shot_hit
  s_web_spinner_active: fly_twins_shot_hit
  s_star_rollover_active: fly_twins_shot_hit
  s_upper_target_left_active: fly_twins_shot_hit
  s_upper_target_center_active: fly_twins_shot_hit
  s_upper_target_right_active: fly_twins_shot_hit

  s_left_drops_1_active: fly_twins_shot_hit
  s_left_drops_2_active: fly_twins_shot_hit
  s_left_drops_3_active: fly_twins_shot_hit
  s_right_drops_1_active: fly_twins_shot_hit
  s_right_drops_2_active: fly_twins_shot_hit
  s_right_drops_3_active: fly_twins_shot_hit
  s_right_drops_4_active: fly_twins_shot_hit
  s_right_drops_5_active: fly_twins_shot_hit

  s_saucer_1_active:
    - fly_twins_major_hit
    - clear_saucers
  s_saucer_2_active:
    - fly_twins_major_hit
    - clear_saucers
  s_saucer_3_active:
    - fly_twins_major_hit
    - clear_saucers
  s_vuk_switch_active: fly_twins_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_fly_twins_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_fly_twins_stopping:
    - clear_saucers
