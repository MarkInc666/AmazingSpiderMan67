#config_version=6

# Desperado placeholder villain mode.
# Mode idea: Chase moves around playfield; collect bounties then final saucer showdown.

mode:
  start_events: start_mode_desperado
  stop_events:
    - desperado_mode_complete
    - desperado_mode_failed
    - desperado_mode_completed_summary
    - ball_ended
  code: desperado.Desperado
  priority: 300

widget_player:
  mode_desperado_started:
    desperado:
      action: play

  desperado_mode_complete:
    desperado:
      action: remove

  desperado_mode_failed:
    desperado:
      action: remove

  mode_desperado_stopping:
    desperado:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: desperado_shot_hit
  s_pop_right_active: desperado_shot_hit
  s_trispinner_opto_active: desperado_shot_hit
  s_web_spinner_active: desperado_shot_hit
  s_star_rollover_active: desperado_shot_hit
  s_upper_target_left_active: desperado_shot_hit
  s_upper_target_center_active: desperado_shot_hit
  s_upper_target_right_active: desperado_shot_hit

  s_left_drops_1_active: desperado_shot_hit
  s_left_drops_2_active: desperado_shot_hit
  s_left_drops_3_active: desperado_shot_hit
  s_right_drops_1_active: desperado_shot_hit
  s_right_drops_2_active: desperado_shot_hit
  s_right_drops_3_active: desperado_shot_hit
  s_right_drops_4_active: desperado_shot_hit
  s_right_drops_5_active: desperado_shot_hit

  s_saucer_1_active:
    - desperado_major_hit
    - clear_saucers
  s_saucer_2_active:
    - desperado_major_hit
    - clear_saucers
  s_saucer_3_active:
    - desperado_major_hit
    - clear_saucers
  s_vuk_switch_active: desperado_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_desperado_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_desperado_stopping:
    - clear_saucers
