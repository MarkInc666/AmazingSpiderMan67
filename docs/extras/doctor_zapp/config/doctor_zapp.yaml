#config_version=6

# Doctor Zapp placeholder villain mode.
# Mode idea: Chain electricity through shot groups; each correct chain step lights higher jackpot.

mode:
  start_events: start_mode_doctor_zapp
  stop_events:
    - doctor_zapp_mode_complete
    - doctor_zapp_mode_failed
    - doctor_zapp_mode_completed_summary
    - ball_ended
  code: doctor_zapp.DoctorZapp
  priority: 300

widget_player:
  mode_doctor_zapp_started:
    doctor_zapp:
      action: play

  doctor_zapp_mode_complete:
    doctor_zapp:
      action: remove

  doctor_zapp_mode_failed:
    doctor_zapp:
      action: remove

  mode_doctor_zapp_stopping:
    doctor_zapp:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: doctor_zapp_shot_hit
  s_pop_right_active: doctor_zapp_shot_hit
  s_trispinner_opto_active: doctor_zapp_shot_hit
  s_web_spinner_active: doctor_zapp_shot_hit
  s_star_rollover_active: doctor_zapp_shot_hit
  s_upper_target_left_active: doctor_zapp_shot_hit
  s_upper_target_center_active: doctor_zapp_shot_hit
  s_upper_target_right_active: doctor_zapp_shot_hit

  s_left_drops_1_active: doctor_zapp_shot_hit
  s_left_drops_2_active: doctor_zapp_shot_hit
  s_left_drops_3_active: doctor_zapp_shot_hit
  s_right_drops_1_active: doctor_zapp_shot_hit
  s_right_drops_2_active: doctor_zapp_shot_hit
  s_right_drops_3_active: doctor_zapp_shot_hit
  s_right_drops_4_active: doctor_zapp_shot_hit
  s_right_drops_5_active: doctor_zapp_shot_hit

  s_saucer_1_active:
    - doctor_zapp_major_hit
    - clear_saucers
  s_saucer_2_active:
    - doctor_zapp_major_hit
    - clear_saucers
  s_saucer_3_active:
    - doctor_zapp_major_hit
    - clear_saucers
  s_vuk_switch_active: doctor_zapp_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_doctor_zapp_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_doctor_zapp_stopping:
    - clear_saucers
