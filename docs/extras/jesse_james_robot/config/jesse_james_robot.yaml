#config_version=6

# Jesse James Robot placeholder villain mode.
# Mode idea: Lit target appears briefly; hit before it moves to win quickdraw jackpots.

mode:
  start_events: start_mode_jesse_james_robot
  stop_events:
    - jesse_james_robot_mode_complete
    - jesse_james_robot_mode_failed
    - jesse_james_robot_mode_completed_summary
    - ball_ended
  code: jesse_james_robot.JesseJamesRobot
  priority: 300

widget_player:
  mode_jesse_james_robot_started:
    jesse_james_robot:
      action: play

  jesse_james_robot_mode_complete:
    jesse_james_robot:
      action: remove

  jesse_james_robot_mode_failed:
    jesse_james_robot:
      action: remove

  mode_jesse_james_robot_stopping:
    jesse_james_robot:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: jesse_james_robot_shot_hit
  s_pop_right_active: jesse_james_robot_shot_hit
  s_trispinner_opto_active: jesse_james_robot_shot_hit
  s_web_spinner_active: jesse_james_robot_shot_hit
  s_star_rollover_active: jesse_james_robot_shot_hit
  s_upper_target_left_active: jesse_james_robot_shot_hit
  s_upper_target_center_active: jesse_james_robot_shot_hit
  s_upper_target_right_active: jesse_james_robot_shot_hit

  s_left_drops_1_active: jesse_james_robot_shot_hit
  s_left_drops_2_active: jesse_james_robot_shot_hit
  s_left_drops_3_active: jesse_james_robot_shot_hit
  s_right_drops_1_active: jesse_james_robot_shot_hit
  s_right_drops_2_active: jesse_james_robot_shot_hit
  s_right_drops_3_active: jesse_james_robot_shot_hit
  s_right_drops_4_active: jesse_james_robot_shot_hit
  s_right_drops_5_active: jesse_james_robot_shot_hit

  s_saucer_1_active:
    - jesse_james_robot_major_hit
    - clear_saucers
  s_saucer_2_active:
    - jesse_james_robot_major_hit
    - clear_saucers
  s_saucer_3_active:
    - jesse_james_robot_major_hit
    - clear_saucers
  s_vuk_switch_active: jesse_james_robot_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_jesse_james_robot_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_jesse_james_robot_stopping:
    - clear_saucers
