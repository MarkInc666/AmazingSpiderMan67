#config_version=6

# Blotto placeholder villain mode.
# Mode idea: Blotto covers shots with ink; hit reveal shots to uncover jackpot.

mode:
  start_events: start_mode_blotto
  stop_events:
    - blotto_mode_complete
    - blotto_mode_failed
    - blotto_mode_completed_summary
    - ball_ended
  code: blotto.Blotto
  priority: 300

widget_player:
  mode_blotto_started:
    blotto:
      action: play

  blotto_mode_complete:
    blotto:
      action: remove

  blotto_mode_failed:
    blotto:
      action: remove

  mode_blotto_stopping:
    blotto:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: blotto_shot_hit
  s_pop_right_active: blotto_shot_hit
  s_trispinner_opto_active: blotto_shot_hit
  s_web_spinner_active: blotto_shot_hit
  s_star_rollover_active: blotto_shot_hit
  s_upper_target_left_active: blotto_shot_hit
  s_upper_target_center_active: blotto_shot_hit
  s_upper_target_right_active: blotto_shot_hit

  s_left_drops_1_active: blotto_shot_hit
  s_left_drops_2_active: blotto_shot_hit
  s_left_drops_3_active: blotto_shot_hit
  s_right_drops_1_active: blotto_shot_hit
  s_right_drops_2_active: blotto_shot_hit
  s_right_drops_3_active: blotto_shot_hit
  s_right_drops_4_active: blotto_shot_hit
  s_right_drops_5_active: blotto_shot_hit

  s_saucer_1_active:
    - blotto_major_hit
    - clear_saucers
  s_saucer_2_active:
    - blotto_major_hit
    - clear_saucers
  s_saucer_3_active:
    - blotto_major_hit
    - clear_saucers
  s_vuk_switch_active: blotto_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_blotto_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_blotto_stopping:
    - clear_saucers
