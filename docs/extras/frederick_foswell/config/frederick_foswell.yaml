#config_version=6

mode:
  start_events: start_mode_frederick_foswell
  stop_events:
    - frederick_foswell_mode_complete
    - frederick_foswell_mode_failed
    - frederick_foswell_mode_completed_summary
    - ball_ended
  code: frederick_foswell.FrederickFoswell
  priority: 300

widget_player:
  mode_frederick_foswell_started:
    frederick_foswell:
      action: play

  frederick_foswell_mode_complete:
    frederick_foswell:
      action: remove

  frederick_foswell_mode_failed:
    frederick_foswell:
      action: remove

  mode_frederick_foswell_stopping:
    frederick_foswell:
      action: remove

event_player:
  s_pop_left_active: frederick_foswell_pop_hit
  s_pop_right_active: frederick_foswell_pop_hit

  s_web_spinner_active: frederick_foswell_spinner_hit
  s_trispinner_opto_active: frederick_foswell_spinner_hit

  s_saucer_1_active: frederick_foswell_saucer_1_hit
  s_saucer_2_active: frederick_foswell_saucer_2_hit
  s_saucer_3_active: frederick_foswell_saucer_3_hit

  s_vuk_switch_active: frederick_foswell_vuk_hit
  s_upper_target_center_active: frederick_foswell_back_page_hit

  mode_frederick_foswell_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - rooftop_diverter_close

  mode_frederick_foswell_stopping:
    - clear_saucers
    - rooftop_diverter_close
    - frederick_foswell_clear_lights

show_player:
  frederick_foswell_saucer_1_lit:
    foswell_saucer_1_lit:
      loops: -1

  frederick_foswell_saucer_2_lit:
    foswell_saucer_2_lit:
      loops: -1

  frederick_foswell_saucer_3_lit:
    foswell_saucer_3_lit:
      loops: -1

  frederick_foswell_super_lit_show:
    foswell_vuk_super_lit:
      loops: -1

  frederick_foswell_back_page_lit_show:
    foswell_back_page_lit:
      loops: -1

  frederick_foswell_clear_lights:
    foswell_saucer_1_lit:
      action: stop
    foswell_saucer_2_lit:
      action: stop
    foswell_saucer_3_lit:
      action: stop
    foswell_vuk_super_lit:
      action: stop
    foswell_back_page_lit:
      action: stop

shows:
  foswell_saucer_1_lit:
    - duration: 500ms
      lights:
        l_1: yellow
        l_1_hole_l: yellow
        l_1_hole_r: yellow
    - duration: 500ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off

  foswell_saucer_2_lit:
    - duration: 500ms
      lights:
        l_2: yellow
        l_2_hole_l: yellow
        l_2_hole_r: yellow
    - duration: 500ms
      lights:
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off

  foswell_saucer_3_lit:
    - duration: 500ms
      lights:
        l_3: yellow
        l_3_hole_l: yellow
        l_3_hole_r: yellow
    - duration: 500ms
      lights:
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off

  foswell_vuk_super_lit:
    - duration: 300ms
      lights:
        l_advance_multiplier: red
    - duration: 300ms
      lights:
        l_mid_multibonus: red
    - duration: 300ms
      lights:
        l_mid_web_target: red

  foswell_back_page_lit:
    - duration: 250ms
      lights:
        l_upper_middle: white
    - duration: 250ms
      lights:
        l_upper_middle: off
