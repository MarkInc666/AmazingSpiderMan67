    - duration: 300ms
      lights:
        gi: off

  villain_select_sandman_show:
    - duration: 300ms
      lights:
        gi: yellow
    - duration: 300ms
      lights:
        gi: off

  villain_select_electro_show:
    - duration: 300ms
      lights:
