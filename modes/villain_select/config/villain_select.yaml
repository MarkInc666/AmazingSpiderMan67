#config_version=6

mode:
  code: villain_select.VillainSelect
  start_events: start_mode_villain_select
  stop_events:
    - stop_mode_villain_select
    - stop_carousel_select
    - ball_ending
    - villain_mode_started
  priority: 500

mode_settings:
  # Fallback list. Python replaces this dynamically before Carousel starts
  # when start_mode_villain_select includes villain_keys/max_choices.
  selectable_items:
    - rhino
    - sandman
    - vulture
    - lizard
    - electro
    - goblin
    - doc_ock
    - mysterio
    - scorpion
    - parafino
    - cerberus
    - vulcan
    - diana
    - cyclops
    - centaur
    - kingpin
    - human_flies
    - fifth_avenue_phantom
    - enforcers
    - diamond_smugglers
    - pardo
    - fakir
    - scarlet_sorcerer
    - super_swami
    - infinata
    - noah_boddy
    - dr_magneto
    - professor_pretoris
    - doctor_dumpty
    - dr_von_schlick
    - radiation_specialist
    - dr_zap
    - doctor_cool
    - snowman
    - ice_monster
    - dr_manta
    - doctor_atlantean
    - sky_master
    - plutonians
    - antarcticans
    - charles_cameo
    - brutus
    - eigor
    - the_fly
    - swamp_reptiles
    - phantom_from_depths_of_time
    - master_vine
    - master_technician
    - micro_men
    - grand_emperor

  next_item_events: villain_carousel_next
  previous_item_events: villain_carousel_previous
  select_item_events: villain_carousel_accept_selection


event_player:
  mode_villain_select_started:
    - play_song_20
    - cmd_flippers_disable
    - cmd_autofire_coils_disable

  villain_select_stopped:
    - cmd_flippers_enable
    - cmd_autofire_coils_enable

  stop_mode_villain_select:
    - cmd_flippers_enable
    - cmd_autofire_coils_enable

  villain_mode_started:
    - cmd_flippers_enable
    - cmd_autofire_coils_enable

  # Match the working qualify_villain_select flipper navigation.
  s_right_flipper_inactive{device.switches.s_left_flipper.state == 0}:
    villain_carousel_next

  s_left_flipper_inactive{device.switches.s_right_flipper.state == 0}:
    villain_carousel_previous

  # Use the same confirm path as the working selector.
  both_flippers_held_1s:
    flipper_cancel

  villain_select_timeout:
    stop_mode_villain_select


sound_player:
  villain_carousel_next:
    hb_up_1:
      action: play
      bus: effects

  villain_carousel_previous:
    hb_down_1:
      action: play
      bus: effects

  villain_carousel_accept_selection:
    zip_out:
      action: play
      bus: effects

  villain_select_already_played:
    hb_bonk_1:
      action: play
      bus: effects

  villain_select_only_one_choice:
    zip_out:
      action: play
      bus: effects


widget_player:
  mode_villain_select_started:
    villain_select:
      priority: 1000
      action: play

  villain_select_started:
    villain_select:
      priority: 1000
      action: play

  stop_mode_villain_select:
    villain_select:
      action: remove

  stop_carousel_select:
    villain_select:
      action: remove

  villain_select_stopped:
    villain_select:
      action: remove

  villain_select_selected:
    villain_select:
      action: remove


