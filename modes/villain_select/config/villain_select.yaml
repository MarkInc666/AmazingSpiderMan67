#config_version=6

mode:
  code: villain_select.VillainSelect
  start_events: start_mode_villain_select
  stop_events:
    - stop_mode_villain_select
    - stop_carousel_select
    - ball_ending
    - villain_mode_started
  priority: 500

mode_settings:
  # Fallback list. Python replaces this dynamically before Carousel starts
  # when start_mode_villain_select includes villain_keys/max_choices.
  selectable_items:
    - rhino
    - vulture
    - lizard
    - sandman
    - electro
    - doc_ock
    - mysterio
    - goblin
    - scorpion
    - parafino
    - centaur
    - cerberus
    - cyclops
    - reptilla
    - mole_man
    - enforcers
    - miss_trubble
    - fifth_avenue_phantom
    - frederick_foswell
    - blackwell

  next_item_events: villain_carousel_next
  previous_item_events: villain_carousel_previous
  select_item_events: villain_carousel_accept_selection


event_player:
  mode_villain_select_started:
    - play_song_20

  # Match the working qualify_villain_select flipper navigation.
  s_right_flipper_inactive{device.switches.s_left_flipper.state == 0}:
    villain_carousel_next

  s_left_flipper_inactive{device.switches.s_right_flipper.state == 0}:
    villain_carousel_previous

  # Use the same confirm path as the working selector.
  both_flippers_held_1s:
    flipper_cancel

  villain_select_timeout:
    stop_mode_villain_select


sound_player:
  villain_carousel_next:
    hb_up_1:
      action: play
      bus: effects

  villain_carousel_previous:
    hb_down_1:
      action: play
      bus: effects

  villain_carousel_accept_selection:
    zip_out:
      action: play
      bus: effects

  villain_select_already_played:
    hb_bonk_1:
      action: play
      bus: effects

  villain_select_only_one_choice:
    zip_out:
      action: play
      bus: effects


widget_player:
  mode_villain_select_started:
    villain_select:
      priority: 1000
      action: play

  villain_select_started:
    villain_select:
      priority: 1000
      action: play

  stop_mode_villain_select:
    villain_select:
      action: remove

  stop_carousel_select:
    villain_select:
      action: remove

  villain_select_stopped:
    villain_select:
      action: remove

  villain_select_selected:
    villain_select:
      action: remove


show_player:
  villain_select_started:
    villain_select_ready_show:
      action: play
      loops: -1

  villain_select_stopped:
    villain_select_ready_show:
      action: stop

  villain_select_selected:
    villain_select_ready_show:
      action: stop

  villain_select_highlighted_rhino:
    villain_select_rhino_show:
      action: play
      loops: -1

  villain_select_highlighted_vulture:
    villain_select_vulture_show:
      action: play
      loops: -1

  villain_select_highlighted_lizard:
    villain_select_lizard_show:
      action: play
      loops: -1

  villain_select_highlighted_sandman:
    villain_select_sandman_show:
      action: play
      loops: -1

  villain_select_highlighted_electro:
    villain_select_electro_show:
      action: play
      loops: -1

  villain_select_highlighted_doc_ock:
    villain_select_doc_ock_show:
      action: play
      loops: -1

  villain_select_highlighted_scorpion:
    villain_select_scorpion_show:
      action: play
      loops: -1

  villain_select_highlighted_mysterio:
    villain_select_mysterio_show:
      action: play
      loops: -1

  villain_select_highlighted_goblin:
    villain_select_goblin_show:
      action: play
      loops: -1

  villain_select_highlighted_parafino:
    villain_select_parafino_show:
      action: play
      loops: -1


