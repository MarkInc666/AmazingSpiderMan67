widget_player:
  villain_select_started:
    villain_select_widget:
      action: play

  villain_select_highlighted:
    villain_select_widget:
      action: update

  villain_select_stopped:
    villain_select_widget:
      action: remove

  villain_select_selected:
    villain_select_widget:
      action: remove


sound_player:
  villain_select_started:
    carousel_open:
      action: play
      bus: effects

  villain_select_moved_next:
    carousel_move:
      action: play
      bus: effects

  villain_select_moved_previous:
    carousel_move:
      action: play
      bus: effects

  villain_select_selected:
    carousel_select:
      action: play
      bus: effects

  villain_select_only_one_choice:
    carousel_select:
      action: play
      bus: effects
