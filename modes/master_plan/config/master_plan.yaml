#config_version=6

mode:
  start_events: start_mode_master_plan
  stop_events:
    - master_plan_mode_complete
    - master_plan_mode_completed_summary
    - ball_ended
  code: master_plan.MasterPlan
  priority: 300

widget_player:
  mode_master_plan_started:
    master_plan:
      action: play

  master_plan_mode_complete:
    master_plan:
      action: remove

  mode_master_plan_stopping:
    master_plan:
      action: remove

event_player:
  s_pop_left_active: master_plan_pop_hit
  s_pop_right_active: master_plan_pop_hit

  s_web_spinner_active: master_plan_spinner_hit
  s_trispinner_opto_active: master_plan_spinner_hit

  s_saucer_1_active: master_plan_saucer_1_hit
  s_saucer_2_active: master_plan_saucer_2_hit
  s_saucer_3_active: master_plan_saucer_3_hit

  s_vuk_switch_active: master_plan_vuk_hit
  s_upper_target_center_active: master_plan_back_page_hit

  mode_master_plan_started:
    - disable_daily_bugle_mystery
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - rooftop_diverter_close

  mode_master_plan_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - clear_saucers
    - rooftop_diverter_close
    - master_plan_clear_lights

show_player:
  master_plan_saucer_1_lit:
    foswell_saucer_1_lit:
      loops: -1

  master_plan_saucer_2_lit:
    foswell_saucer_2_lit:
      loops: -1

  master_plan_saucer_3_lit:
    foswell_saucer_3_lit:
      loops: -1

  master_plan_super_lit_show:
    foswell_vuk_super_lit:
      loops: -1

  master_plan_back_page_lit_show:
    foswell_back_page_lit:
      loops: -1

  master_plan_clear_lights:
    foswell_saucer_1_lit:
      action: stop
    foswell_saucer_2_lit:
      action: stop
    foswell_saucer_3_lit:
      action: stop
    foswell_vuk_super_lit:
      action: stop
    foswell_back_page_lit:
      action: stop

shows:
  foswell_saucer_1_lit:
    - duration: 500ms
      lights:
        l_1: yellow
        l_1_hole_l: yellow
        l_1_hole_r: yellow
    - duration: 500ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off

  foswell_saucer_2_lit:
    - duration: 500ms
      lights:
        l_2: yellow
        l_2_hole_l: yellow
        l_2_hole_r: yellow
    - duration: 500ms
      lights:
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off

  foswell_saucer_3_lit:
    - duration: 500ms
      lights:
        l_3: yellow
        l_3_hole_l: yellow
        l_3_hole_r: yellow
    - duration: 500ms
      lights:
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off

  foswell_vuk_super_lit:
    - duration: 300ms
      lights:
        l_advance_multiplier: red
    - duration: 300ms
      lights:
        l_mid_multibonus: red
    - duration: 300ms
      lights:
        l_mid_web_target: red

  foswell_back_page_lit:
    - duration: 250ms
      lights:
        l_upper_middle: white
    - duration: 250ms
      lights:
        l_upper_middle: off
