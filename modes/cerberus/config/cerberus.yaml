#config_version=6

mode:
  start_events: start_mode_cerberus
  stop_events:
    - cerberus_mode_complete
    - cerberus_mode_completed_summary
    - ball_ended
  code: cerberus.Cerberus
  priority: 300

widget_player:
  mode_cerberus_started:
    cerberus:
      action: play

  cerberus_mode_complete:
    cerberus:
      action: remove

  mode_cerberus_stopping:
    cerberus:
      action: remove

show_player:
  cerberus_lite_upper_targets:
    cerberus_upper_targets_flash_show:
      loops: -1

  cerberus_stop_upper_targets:
    cerberus_upper_targets_flash_show:
      action: stop

  cerberus_clear_all_lights:
    cerberus_upper_targets_flash_show:
      action: stop

  mode_cerberus_stopping:
    cerberus_upper_targets_flash_show:
      action: stop

event_player:
  s_upper_target_left_active:
    - cerberus_upper_target_1_hit

  s_upper_target_center_active:
    - cerberus_upper_target_2_hit

  s_upper_target_right_active:
    - cerberus_upper_target_3_hit

  s_trispinner_opto_active:
    - cerberus_spinner_hit

  s_saucer_1_active:
    - cerberus_saucer_1_hit
    - clear_saucers

  s_saucer_2_active:
    - cerberus_saucer_2_hit
    - clear_saucers

  s_saucer_3_active:
    - cerberus_saucer_3_hit
    - clear_saucers

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_cerberus_started:
    - clear_saucers
    - reset_drops

  mode_cerberus_stopping:
    - clear_saucers
    - cerberus_clear_all_lights

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_cerberus_started:
    gi: FF8C20

  mode_cerberus_stopping:
    gi: E0E0E0

  cerberus_saucer_1_jackpot_lit:
    l_1_hole_l: yellow
    l_1_hole_r: yellow

  cerberus_saucer_2_jackpot_lit:
    l_2_hole_l: yellow
    l_2_hole_r: yellow

  cerberus_saucer_3_jackpot_lit:
    l_3_hole_l: yellow
    l_3_hole_r: yellow

  cerberus_saucer_1_jackpot_off:
    l_1_hole_l: off
    l_1_hole_r: off

  cerberus_saucer_2_jackpot_off:
    l_2_hole_l: off
    l_2_hole_r: off

  cerberus_saucer_3_jackpot_off:
    l_3_hole_l: off
    l_3_hole_r: off

  cerberus_saucer_1_double_lit:
    l_1: white

  cerberus_saucer_2_double_lit:
    l_2: white

  cerberus_saucer_3_double_lit:
    l_3: white

  cerberus_saucer_1_double_off:
    l_1: off

  cerberus_saucer_2_double_off:
    l_2: off

  cerberus_saucer_3_double_off:
    l_3: off

  cerberus_clear_all_lights:
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off
    l_1: off
    l_2: off
    l_3: off
    l_1_hole_l: off
    l_1_hole_r: off
    l_2_hole_l: off
    l_2_hole_r: off
    l_3_hole_l: off
    l_3_hole_r: off

shows:
  cerberus_upper_targets_flash_show:
    - duration: 250ms
      lights:
        l_upper_left: yellow
        l_upper_middle: yellow
        l_upper_right: yellow
    - duration: 250ms
      lights:
        l_upper_left: off
        l_upper_middle: off
        l_upper_right: off
