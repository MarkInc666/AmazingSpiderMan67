#config_version=6

mode:
  code: bonus.Bonus
  priority: 500
  use_wait_queue: true

event_player:
  mode_bonus_started:
    - play_bonus_music

slide_player:
  mode_bonus_started:
    bonus:
      action: play
    main_game:
      action: remove

  bonus_start:
    bonus:
      action: update
      tokens:
        entry: initial

  bonus_entry:
    bonus:
      action: update

