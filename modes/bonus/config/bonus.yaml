#config_version=6

mode:
  code: bonus.Bonus
  priority: 500
  use_wait_queue: true

slide_player:
  mode_bonus_started:
    bonus:
      action: play
    main_game:
      action: remove

  bonus_start:
    bonus:
      action: update
      tokens:
        entry: initial

  bonus_entry:
    bonus:
      action: update

sound_player:
  asm_bonus_bucket_counted:
    hb_pot_1:
      action: play
      bus: effects

  asm_bonus_mode_counted:
    bump_sfx_2:
      action: play
      bus: effects

  asm_bonus_total_awarded:
    hb_bounce_2:
      action: play
      bus: effects

  asm_bonus_held:
    sm_ill_keep_these:
      action: play
      bus: voice

  asm_hold_bonus_awarded:
    sm_ill_keep_these:
      action: play
      bus: voice

mode_settings:
  display_delay_ms: 1000ms
  hurry_up_delay_ms: 50ms
  keep_multiplier: false

  # ASM67 uses custom bonus code rather than stock MPF bonus_entries:
  # - regular bonus buckets are visibly counted once per bonus multiplier pass
  # - mode/chapter bank bonuses are listed separately and are not multiplied
  # - mode/chapter bank bonuses carry over across balls
  # - held_bonus is consumed when awarded unless Hold Bonus is earned again
  bonus_entries: []
