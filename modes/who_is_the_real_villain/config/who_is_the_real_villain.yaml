#config_version=6

# Who Is the Real Villain? placeholder mini-wizard.
# Crime & Disguise mini-wizard multiball.
# Temporary flow: intro -> 2-ball multiball -> MB end -> summary -> next chapter.

mode:
  start_events: start_mode_who_is_the_real_villain
  stop_events:
    - stop_mode_who_is_the_real_villain
    - ball_ended
  code: who_is_the_real_villain.WhoIsTheRealVillain
  priority: 800

multiballs:
  who_is_the_real_villain_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: who_is_the_real_villain_start_multiball
    stop_events:
      - stop_mode_who_is_the_real_villain

variable_player:
  multiball_who_is_the_real_villain_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_who_is_the_real_villain_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_who_is_the_real_villain_started:
    who_is_the_real_villain:
      action: play

  who_is_the_real_villain_mode_complete:
    who_is_the_real_villain:
      action: remove

  who_is_the_real_villain_mode_failed:
    who_is_the_real_villain:
      action: remove

  mode_who_is_the_real_villain_stopping:
    who_is_the_real_villain:
      action: remove

  stop_mode_who_is_the_real_villain:
    who_is_the_real_villain:
      action: remove

event_player:
  s_pop_left_active: who_is_the_real_villain_shot_hit
  s_pop_right_active: who_is_the_real_villain_shot_hit
  s_trispinner_opto_active: who_is_the_real_villain_shot_hit
  s_web_spinner_active: who_is_the_real_villain_shot_hit
  s_star_rollover_active: who_is_the_real_villain_shot_hit
  s_upper_target_left_active: who_is_the_real_villain_shot_hit
  s_upper_target_center_active: who_is_the_real_villain_shot_hit
  s_upper_target_right_active: who_is_the_real_villain_shot_hit
  s_left_drops_1_active: who_is_the_real_villain_shot_hit
  s_left_drops_2_active: who_is_the_real_villain_shot_hit
  s_left_drops_3_active: who_is_the_real_villain_shot_hit
  s_right_drops_1_active: who_is_the_real_villain_shot_hit
  s_right_drops_2_active: who_is_the_real_villain_shot_hit
  s_right_drops_3_active: who_is_the_real_villain_shot_hit
  s_right_drops_4_active: who_is_the_real_villain_shot_hit
  s_right_drops_5_active: who_is_the_real_villain_shot_hit
  s_saucer_1_active: who_is_the_real_villain_shot_hit
  s_saucer_2_active: who_is_the_real_villain_shot_hit
  s_saucer_3_active: who_is_the_real_villain_shot_hit
  s_vuk_switch_active: who_is_the_real_villain_shot_hit

  multiball_who_is_the_real_villain_multiball_ended: who_is_the_real_villain_complete_request

  mode_who_is_the_real_villain_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_who_is_the_real_villain_stopping:
    - clear_saucers
