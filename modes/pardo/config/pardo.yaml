#config_version=6

# Pardo: Hypnosis Reel.
# Three shots look identical. Spinner reveals which shot is real.

mode:
  start_events: start_mode_pardo
  stop_events:
    - pardo_mode_complete
    - pardo_mode_completed_summary
    - ball_ended
  code: pardo.Pardo
  priority: 300

widget_player:
  mode_pardo_started:
    pardo:
      action: play

  pardo_mode_complete:
    pardo:
      action: remove

  mode_pardo_stopping:
    pardo:
      action: remove

event_player:
  s_web_target_left_active: pardo_left_web_hit
  s_web_target_mid_active: pardo_center_web_hit

  # Either spinner reveals the current answer. The upper spinner may also be
  # one of the three hidden choices, so Python handles that special case.
  s_web_spinner_active: pardo_spinner_reveal
  s_trispinner_opto_active: pardo_spinner_switch

  s_upper_target_left_active: pardo_upper_target_left_hit
  s_upper_target_center_active: pardo_upper_target_center_hit
  s_upper_target_right_active: pardo_upper_target_right_hit

  s_left_drops_1_active: pardo_left_drops_hit
  s_left_drops_2_active: pardo_left_drops_hit
  s_left_drops_3_active: pardo_left_drops_hit

  s_right_drops_1_active: pardo_right_drops_hit
  s_right_drops_2_active: pardo_right_drops_hit
  s_right_drops_3_active: pardo_right_drops_hit
  s_right_drops_4_active: pardo_right_drops_hit
  s_right_drops_5_active: pardo_right_drops_hit

  s_pop_left_active: pardo_pops_hit
  s_pop_right_active: pardo_pops_hit

  # Daily Bugle VUK is disabled during the mode, so Pardo
  # must always eject the ball itself.
  s_vuk_switch_active:
    - up_kick|1.5s

  # Saucers are not Pardo choices, but they must still kick out.
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  pardo_startup_complete:
    - disable_daily_bugle_mystery
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_pardo_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - pardo_all_lights_off
    - clear_saucers

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_pardo_started:
    gi: 7A3DB8

  mode_pardo_stopping:
    gi: E0E0E0

  pardo_all_lights_off:
    l_left_web_target: off
    l_mid_web_target: off
    l_gi_a: off
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off
    l_3bankbonus: off
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: off
    l_5bank_4: off
    l_5bank_5: off
    l_pop_1_1: off
    l_pop_1_2: off
    l_pop_1_3: off
    l_pop_1_4: off
    l_pop_1_5: off
    l_pop_1_6: off
    l_pop_1_7: off
    l_pop_1_8: off
    l_pop_1_9: off
    l_pop_1_10: off
    l_pop_1_11: off
    l_pop_1_12: off
    l_pop_2_1: off
