  pardo_hidden_upper_spinner:
    l_gi_a: white
  pardo_hidden_upper_target_left:
    l_upper_left: white
  pardo_hidden_upper_target_center:
    l_upper_middle: white
  pardo_hidden_upper_target_right:
    l_upper_right: white
  pardo_hidden_left_drops:
