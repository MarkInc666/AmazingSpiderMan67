#config_version=6

# GrandEmperor placeholder villain mode.
# Mode idea: Chase moves around playfield; collect bounties then final saucer showdown.

mode:
  start_events: start_mode_grand_emperor
  stop_events:
    - grand_emperor_mode_complete
    - grand_emperor_mode_completed_summary
    - ball_ended
  code: grand_emperor.GrandEmperor
  priority: 300

widget_player:
  mode_grand_emperor_started:
    grand_emperor:
      action: play

  grand_emperor_mode_complete:
    grand_emperor:
      action: remove

  mode_grand_emperor_stopping:
    grand_emperor:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: grand_emperor_shot_hit
  s_pop_right_active: grand_emperor_shot_hit
  s_trispinner_opto_active: grand_emperor_shot_hit
  s_web_spinner_active: grand_emperor_shot_hit
  s_star_rollover_active: grand_emperor_shot_hit
  s_upper_target_left_active: grand_emperor_shot_hit
  s_upper_target_center_active: grand_emperor_shot_hit
  s_upper_target_right_active: grand_emperor_shot_hit

  s_left_drops_1_active: grand_emperor_shot_hit
  s_left_drops_2_active: grand_emperor_shot_hit
  s_left_drops_3_active: grand_emperor_shot_hit
  s_right_drops_1_active: grand_emperor_shot_hit
  s_right_drops_2_active: grand_emperor_shot_hit
  s_right_drops_3_active: grand_emperor_shot_hit
  s_right_drops_4_active: grand_emperor_shot_hit
  s_right_drops_5_active: grand_emperor_shot_hit

  s_saucer_1_active:
    - grand_emperor_major_hit
    - clear_saucers
  s_saucer_2_active:
    - grand_emperor_major_hit
    - clear_saucers
  s_saucer_3_active:
    - grand_emperor_major_hit
    - clear_saucers
  s_vuk_switch_active: grand_emperor_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_grand_emperor_started:
    - rooftop_diverter_open|500ms
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_grand_emperor_stopping:
    - clear_saucers
