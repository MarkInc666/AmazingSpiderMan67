#config_version=6

mode:
  start_events: start_mode_centaur
  stop_events:
    - centaur_mode_complete
    - centaur_mode_completed_summary
    - ball_ended
  code: centaur.Centaur
  priority: 300

widget_player:
  mode_centaur_started:
    centaur:
      action: play

  centaur_mode_complete:
    centaur:
      action: remove

  mode_centaur_stopping:
    centaur:
      action: remove

event_player:
  s_left_drops_1_active: centaur_drop_left_1_hit
  s_left_drops_2_active: centaur_drop_left_2_hit
  s_left_drops_3_active: centaur_drop_left_3_hit

  s_right_drops_1_active: centaur_drop_right_1_hit
  s_right_drops_2_active: centaur_drop_right_2_hit
  s_right_drops_3_active: centaur_drop_right_3_hit
  s_right_drops_4_active: centaur_drop_right_4_hit
  s_right_drops_5_active: centaur_drop_right_5_hit

  # Bank rubbers score in build/roof-ready phase. During final phase,
  # left/right rubbers have special jackpot behavior in Python.
  s_left_drops_rubber_active: centaur_left_rubber_hit
  s_left_drops_top_left_rubber_active: centaur_bank_rubber_hit
  s_left_drops_top_right_rubber_active: centaur_bank_rubber_hit
  s_right_drops_rubber_active: centaur_right_rubber_hit
  s_right_drops_top_rubber_active: centaur_bank_rubber_hit

  s_upper_exit_left_opto_active: centaur_upper_left_exit

  # The VUK is the physical entrance to the upper playfield after Centaur opens the roof gate.
  s_vuk_switch_active:
    - centaur_vuk_to_roof
    - up_kick

  # Centaur does not use the three saucers during gameplay; kick out any ball that lands there.
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers

  # Same early release pattern as Daily Bugle: both flippers held/tapped while post is holding.
  s_left_flipper_active{device.switches.s_right_flipper.state == 1}:
    - centaur_post_hold_cancel

  s_right_flipper_active{device.switches.s_left_flipper.state == 1}:
    - centaur_post_hold_cancel

  mode_centaur_started:
    - disable_daily_bugle_mystery
    - clear_saucers
    - reset_drops

  mode_centaur_stopping:
    - clear_saucers
    - centaur_clear_all_lights
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state

coil_player:
  centaur_stage_right_bank_drops:
    c_right_bank_drop_2:
      action: pulse
    c_right_bank_drop_3:
      action: pulse
    c_right_bank_drop_4:
      action: pulse

light_player:
  centaur_build_phase_started:
    l_gi_3bank: yellow
    l_gi_5bank_lower: yellow
    l_gi_5bank_upper: yellow

  centaur_gate_open:
    l_gi_ramp: green

  centaur_final_shot_staged:
    l_5bank_1: red
    l_5bank_5: red
    l_gi_5bank_lower: red
    l_gi_5bank_upper: red

  centaur_jackpot_awarded:
    l_5bank_1: white
    l_5bank_5: white

  centaur_secret_half_jackpot_awarded:
    l_3bankbonus: white
    l_gi_3bank: white

  centaur_clear_all_lights:
    l_gi_3bank: off
    l_gi_5bank_lower: off
    l_gi_5bank_upper: off
    l_gi_ramp: off
    l_5bank_1: off
    l_5bank_5: off
    l_3bankbonus: off
