#config_version=6

mode:
  start_events: start_mode_reptilla
  stop_events:
    - reptilla_mode_complete
    - reptilla_mode_failed
    - reptilla_mode_completed_summary
    - ball_ended
  code: reptilla.Reptilla
  priority: 300

widget_player:
  mode_reptilla_started:
    reptilla:
      action: play

  reptilla_mode_complete:
    reptilla:
      action: remove

  reptilla_mode_failed:
    reptilla:
      action: remove

  mode_reptilla_stopping:
    reptilla:
      action: remove

event_player:
  s_pop_left_active:
    - reptilla_pop_hit
  s_pop_right_active:
    - reptilla_pop_hit

  s_left_drops_1_active:
    - reptilla_left_drop_1_hit
  s_left_drops_2_active:
    - reptilla_left_drop_2_hit
  s_left_drops_3_active:
    - reptilla_left_drop_3_hit

  s_right_drops_1_active:
    - reptilla_right_drop_1_hit
  s_right_drops_2_active:
    - reptilla_right_drop_2_hit
  s_right_drops_3_active:
    - reptilla_right_drop_3_hit
  s_right_drops_4_active:
    - reptilla_right_drop_4_hit
  s_right_drops_5_active:
    - reptilla_right_drop_5_hit

  s_upper_target_center_active:
    - reptilla_upper_middle_hit

  s_web_target_mid_active:
    - reptilla_center_web_hit

  s_saucer_1_active:
    - clear_saucers
  s_saucer_2_active:
    - reptilla_saucer_2_hit
    - clear_saucers
  s_saucer_3_active:
    - clear_saucers

  mode_reptilla_started:
    - clear_saucers
    - reset_drops
    - reptilla_clear_all_lights

  mode_reptilla_stopping:
    - clear_saucers
    - reptilla_clear_all_lights

light_player:
  reptilla_left_bank_lit:
    l_3bankbonus: orange

  reptilla_upper_middle_lit:
    l_upper_middle: orange

  reptilla_right_bank_lit:
    l_5bank_3: orange

  reptilla_center_web_lit:
    l_mid_web_target: orange

  reptilla_super_jackpot_lit:
    l_2: red
    l_2_hole_l: red
    l_2_hole_r: red

  reptilla_clear_rampage_lights:
    l_3bankbonus: off
    l_upper_middle: off
    l_5bank_3: off
    l_mid_web_target: off

  reptilla_clear_all_lights:
    l_3bankbonus: off
    l_upper_middle: off
    l_5bank_3: off
    l_mid_web_target: off
    l_2: off
    l_2_hole_l: off
    l_2_hole_r: off
