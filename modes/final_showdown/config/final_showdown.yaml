  final_showdown_spinner_lit_show:
    - duration: 200ms
      lights:
        l_gi_a: orange
        l_spinner: orange
    - duration: 200ms
      lights:
        l_gi_a: off
        l_spinner: off

  final_showdown_star_lit_show:
    - duration: 250ms
      lights:
        l_star: yellow
    - duration: 250ms
      lights:
        l_star: off

  final_showdown_upper_targets_lit_show:
    - duration: 120ms
      lights:
        l_upper_left: yellow
        l_upper_middle: yellow
        l_upper_right: yellow
    - duration: 120ms
      lights:
        l_upper_left: blue
        l_upper_middle: blue
        l_upper_right: blue

  final_showdown_drops_lit_show:
    - duration: 250ms
      lights:
        l_3bankbonus: yellow
        l_5bank_1: yellow
        l_5bank_2: yellow
        l_5bank_3: yellow
        l_5bank_4: yellow
        l_5bank_5: yellow
    - duration: 120ms
      lights:
        l_3bankbonus: blue
        l_5bank_1: blue
        l_5bank_2: blue
        l_5bank_3: blue
        l_5bank_4: blue
        l_5bank_5: blue

  final_showdown_daily_bugle_jackpot_show:
    - duration: 150ms
      lights:
        l_gi_top_1: white
    - duration: 150ms
      lights:
        l_gi_top_1: off

  final_showdown_ab_ready_show:
    - duration: 200ms
      lights:
        l_a_rollover: purple
        l_b_rollover: purple
        l_right_a: purple
        l_left_b: purple
    - duration: 200ms
      lights:
        l_a_rollover: off
        l_b_rollover: off
        l_right_a: off
        l_left_b: off

  final_showdown_victory_laps_show:
    - duration: 150ms
      lights:
        gi: white
    - duration: 150ms
      lights:
        gi: off

  final_showdown_super_jackpot_show:
    - duration: 100ms
      lights:
        l_gi_top_1: red
        gi: red
    - duration: 100ms
      lights:
        l_gi_top_1: white
        gi: white      