#config_version=6

# Henry Smythe placeholder villain mode.
# Mode idea: Smythe repairs disabled robot systems unless repair shots are stopped.

mode:
  start_events: start_mode_doctor_atlantean
  stop_events:
    - doctor_atlantean_mode_complete
    - doctor_atlantean_mode_completed_summary
    - ball_ended
  code: doctor_atlantean.DoctorAtlantean
  priority: 300

widget_player:
  mode_doctor_atlantean_started:
    doctor_atlantean:
      action: play

  doctor_atlantean_mode_complete:
    doctor_atlantean:
      action: remove

  mode_doctor_atlantean_stopping:
    doctor_atlantean:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: doctor_atlantean_shot_hit
  s_pop_right_active: doctor_atlantean_shot_hit
  s_trispinner_opto_active: doctor_atlantean_shot_hit
  s_web_spinner_active: doctor_atlantean_shot_hit
  s_star_rollover_active: doctor_atlantean_shot_hit
  s_upper_target_left_active: doctor_atlantean_shot_hit
  s_upper_target_center_active: doctor_atlantean_shot_hit
  s_upper_target_right_active: doctor_atlantean_shot_hit

  s_left_drops_1_active: doctor_atlantean_shot_hit
  s_left_drops_2_active: doctor_atlantean_shot_hit
  s_left_drops_3_active: doctor_atlantean_shot_hit
  s_right_drops_1_active: doctor_atlantean_shot_hit
  s_right_drops_2_active: doctor_atlantean_shot_hit
  s_right_drops_3_active: doctor_atlantean_shot_hit
  s_right_drops_4_active: doctor_atlantean_shot_hit
  s_right_drops_5_active: doctor_atlantean_shot_hit

  s_saucer_1_active:
    - doctor_atlantean_major_hit
    - clear_saucers
  s_saucer_2_active:
    - doctor_atlantean_major_hit
    - clear_saucers
  s_saucer_3_active:
    - doctor_atlantean_major_hit
    - clear_saucers
  s_vuk_switch_active: doctor_atlantean_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_doctor_atlantean_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_doctor_atlantean_stopping:
    - clear_saucers
