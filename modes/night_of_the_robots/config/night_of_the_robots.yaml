#config_version=6

# Night of the Robots placeholder mini-wizard.
# Mode idea: Disable robot systems while historical robots create timed hazards.

mode:
  start_events: start_mode_night_of_the_robots
  stop_events:
    - stop_mode_night_of_the_robots
    - ball_ended
  code: night_of_the_robots.NightOfTheRobots
  priority: 800

multiballs:
  night_of_the_robots_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: night_of_the_robots_start_multiball
    stop_events:
      - stop_mode_night_of_the_robots


variable_player:

  multiball_night_of_the_robots_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_night_of_the_robots_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0


widget_player:
  mode_night_of_the_robots_started:
    night_of_the_robots:
      action: play

  night_of_the_robots_mode_complete:
    night_of_the_robots:
      action: remove

  night_of_the_robots_mode_failed:
    night_of_the_robots:
      action: remove

  mode_night_of_the_robots_stopping:
    night_of_the_robots:
      action: remove

  stop_mode_night_of_the_robots:
    night_of_the_robots:
      action: remove

event_player:
  s_pop_left_active: night_of_the_robots_shot_hit
  s_pop_right_active: night_of_the_robots_shot_hit
  s_trispinner_opto_active: night_of_the_robots_shot_hit
  s_web_spinner_active: night_of_the_robots_shot_hit
  s_star_rollover_active: night_of_the_robots_shot_hit
  s_upper_target_left_active: night_of_the_robots_shot_hit
  s_upper_target_center_active: night_of_the_robots_shot_hit
  s_upper_target_right_active: night_of_the_robots_shot_hit
  s_left_drops_1_active: night_of_the_robots_shot_hit
  s_left_drops_2_active: night_of_the_robots_shot_hit
  s_left_drops_3_active: night_of_the_robots_shot_hit
  s_right_drops_1_active: night_of_the_robots_shot_hit
  s_right_drops_2_active: night_of_the_robots_shot_hit
  s_right_drops_3_active: night_of_the_robots_shot_hit
  s_right_drops_4_active: night_of_the_robots_shot_hit
  s_right_drops_5_active: night_of_the_robots_shot_hit

  s_vuk_switch_active: night_of_the_robots_jackpot_hit

  multiball_night_of_the_robots_multiball_ended: night_of_the_robots_failed

  mode_night_of_the_robots_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_night_of_the_robots_stopping:
    - clear_saucers
