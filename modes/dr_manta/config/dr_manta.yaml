#config_version=6

# Doctor Manta placeholder villain mode.
# Mode idea: Manta traps ball in saucers; escape by hitting lit rescue shots and then cash at VUK/saucer.

mode:
  start_events: start_mode_dr_manta
  stop_events:
    - dr_manta_mode_complete
    - dr_manta_mode_completed_summary
    - ball_ended
  code: dr_manta.DrManta
  priority: 300

widget_player:
  mode_dr_manta_started:
    dr_manta:
      action: play

  dr_manta_mode_complete:
    dr_manta:
      action: remove

  mode_dr_manta_stopping:
    dr_manta:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: dr_manta_shot_hit
  s_pop_right_active: dr_manta_shot_hit
  s_trispinner_opto_active: dr_manta_shot_hit
  s_web_spinner_active: dr_manta_shot_hit
  s_star_rollover_active: dr_manta_shot_hit
  s_upper_target_left_active: dr_manta_shot_hit
  s_upper_target_center_active: dr_manta_shot_hit
  s_upper_target_right_active: dr_manta_shot_hit

  s_left_drops_1_active: dr_manta_shot_hit
  s_left_drops_2_active: dr_manta_shot_hit
  s_left_drops_3_active: dr_manta_shot_hit
  s_right_drops_1_active: dr_manta_shot_hit
  s_right_drops_2_active: dr_manta_shot_hit
  s_right_drops_3_active: dr_manta_shot_hit
  s_right_drops_4_active: dr_manta_shot_hit
  s_right_drops_5_active: dr_manta_shot_hit

  s_saucer_1_active:
    - dr_manta_major_hit
    - clear_saucers
  s_saucer_2_active:
    - dr_manta_major_hit
    - clear_saucers
  s_saucer_3_active:
    - dr_manta_major_hit
    - clear_saucers
  s_vuk_switch_active: dr_manta_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_dr_manta_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

