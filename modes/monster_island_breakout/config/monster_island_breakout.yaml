#config_version=6

# Monster Island Breakout placeholder mini-wizard.
# Mode idea: Survive monster attacks by completing short monster tasks. Each complete task reduces Monster Meter.

mode:
  start_events: start_mode_monster_island_breakout
  stop_events:
    - stop_mode_monster_island_breakout
    - ball_ended
  code: monster_island_breakout.MonsterIslandBreakout
  priority: 800

multiballs:
  monster_island_breakout_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: monster_island_breakout_start_multiball
    stop_events:
      - stop_mode_monster_island_breakout


variable_player:

  multiball_monster_island_breakout_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_monster_island_breakout_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0


widget_player:
  mode_monster_island_breakout_started:
    monster_island_breakout:
      action: play

  monster_island_breakout_mode_complete:
    monster_island_breakout:
      action: remove

  monster_island_breakout_mode_failed:
    monster_island_breakout:
      action: remove

  mode_monster_island_breakout_stopping:
    monster_island_breakout:
      action: remove

  stop_mode_monster_island_breakout:
    monster_island_breakout:
      action: remove

event_player:
  s_pop_left_active: monster_island_breakout_shot_hit
  s_pop_right_active: monster_island_breakout_shot_hit
  s_trispinner_opto_active: monster_island_breakout_shot_hit
  s_web_spinner_active: monster_island_breakout_shot_hit
  s_star_rollover_active: monster_island_breakout_shot_hit
  s_upper_target_left_active: monster_island_breakout_shot_hit
  s_upper_target_center_active: monster_island_breakout_shot_hit
  s_upper_target_right_active: monster_island_breakout_shot_hit
  s_left_drops_1_active: monster_island_breakout_shot_hit
  s_left_drops_2_active: monster_island_breakout_shot_hit
  s_left_drops_3_active: monster_island_breakout_shot_hit
  s_right_drops_1_active: monster_island_breakout_shot_hit
  s_right_drops_2_active: monster_island_breakout_shot_hit
  s_right_drops_3_active: monster_island_breakout_shot_hit
  s_right_drops_4_active: monster_island_breakout_shot_hit
  s_right_drops_5_active: monster_island_breakout_shot_hit

  s_vuk_switch_active: monster_island_breakout_jackpot_hit

  multiball_monster_island_breakout_multiball_ended: monster_island_breakout_failed

  mode_monster_island_breakout_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_monster_island_breakout_stopping:
    - clear_saucers
