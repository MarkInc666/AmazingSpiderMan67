#config_version=6

mode:
  start_events: start_mode_rhino_bash
  stop_events:
    - rhino_bash_complete
    - ball_ended
  code: rhino.RhinoBash
  priority: 300

event_player:

  rhino_bash_complete:
    - reset_villain_locate

  mode_rhino_bash_started:
    - rhino_start
    - rhino_light_jackpot_collect
    - clear_saucers

  # Pops build rage
  s_pop_left_active:
    - rhino_pop_hit

  s_pop_right_active:
    - rhino_pop_hit

  # Rhino Smash switches
  s_left_drops_1_active:
    - rhino_smash_hit
  s_left_drops_2_active:
    - rhino_smash_hit
  s_left_drops_3_active:
    - rhino_smash_hit

  s_right_drops_1_active:
    - rhino_smash_hit
  s_right_drops_2_active:
    - rhino_smash_hit
  s_right_drops_3_active:
    - rhino_smash_hit
  s_right_drops_4_active:
    - rhino_smash_hit
  s_right_drops_5_active:
    - rhino_smash_hit

  s_web_target_left_active:
    - rhino_smash_hit
  s_web_target_top_active:
    - rhino_smash_hit

  s_saucer_1_active:
    - rhino_smash_hit
  s_saucer_2_active:
    - rhino_smash_hit
  s_saucer_3_active:
    - rhino_smash_hit

  s_web_spinner_active:
    - rhino_smash_hit
  s_trispinner_opto_active:
    - rhino_smash_hit

  s_upper_target_left_active:
    - rhino_smash_hit
  s_upper_target_center_active:
    - rhino_smash_hit
  s_upper_target_right_active:
    - rhino_smash_hit

  s_upper_exit_left_opto_active:
    - rhino_smash_hit
  s_upper_exit_right_opto_active:
    - rhino_smash_hit

  s_inlane_a_active:
    - rhino_smash_hit
  s_inlane_b_active:
    - rhino_smash_hit

  # Left Middle B lane jackpot collect
  s_inlane_m_l_active:
    - rhino_jackpot_collect_request

show_player:

  rhino_light_jackpot_collect:
    rhino_left_b_lit:
      loops: -1

  rhino_jackpot_collected:
    rhino_jackpot_collect_show:
      loops: 1

  rhino_show_rage_1:
    rhino_rage_1:
      loops: -1

  rhino_show_rage_2:
    rhino_rage_1:
      action: stop
    rhino_rage_2:
      loops: -1

  rhino_show_rage_3:
    rhino_rage_2:
      action: stop
    rhino_rage_3:
      loops: -1

  rhino_show_rage_4:
    rhino_rage_3:
      action: stop
    rhino_rage_4:
      loops: -1

  rhino_show_rage_5:
    rhino_rage_4:
      action: stop
    rhino_rage_5:
      loops: -1

  rhino_berserk_started:
    rhino_berserk_gi:
      loops: -1

  rhino_berserk_stopped:
    rhino_berserk_gi:
      action: stop
    rhino_rage_5:
      action: stop

  rhino_crashed:
    rhino_crash_show:
      loops: 1

  rhino_bash_complete:
    rhino_berserk_gi:
      action: stop
    rhino_rage_1:
      action: stop
    rhino_rage_2:
      action: stop
    rhino_rage_3:
      action: stop
    rhino_rage_4:
      action: stop
    rhino_rage_5:
      action: stop
    rhino_left_b_lit:
      action: stop
    rhino_bash_complete_show:
      loops: 1

