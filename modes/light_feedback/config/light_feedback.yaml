shows:
  switch_feedback_single:
    - duration: 100ms
      lights:
        (lights): white
    - duration: 100ms
      lights:
        (lights): off

  switch_feedback_double:
    - duration: 100ms
      lights:
        (lights): white
    - duration: 75ms
      lights:
        (lights): off
    - duration: 100ms
      lights:
        (lights): white
    - duration: 75ms
      lights:
        (lights): off
