#config_version=6
# Global playfield switch-hit light feedback.
# Conservative defaults:
# - 250ms minimum flash steps so the hit is visible on the real playfield.
# - white command color so tinted plastics/inserts provide the visible color.
# - single-light mappings only for the first pass; mode-specific reward flashes can use the double show.

mode:
  start_events: ball_started
  stop_events:
    - ball_ending
    - ball_ended
    - tilt
    - slam_tilt
  priority: 105

show_player:
  s_leaf_next_to_1_active:
    switch_feedback_single:
      loops: 1
      priority: 900
      show_tokens:
        lights: l_gi_ramp
