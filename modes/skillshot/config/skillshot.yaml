#config_version=6

mode:
  start_events:
    # Normal balls get a skill shot immediately.
    # Chapter-select transition balls wait until the player selects a chapter,
    # then the selected/plunged ball gets the normal skill shot.
    - ball_started{current_player.chapter_select_needed != 1}
    - chapter_select_selected
  stop_events:
    - finish_skillshot2
    - start_mode_chapter_select
    - mode_chapter_select_started
  priority: 500
  code: skillshot.SkillShot


event_player:
  skillshot_awarded:
    - show_skillshot_result
    - skillshot_success_callout
    - skillshot_clear_lit_shot
    - finish_skillshot|2s

  skillshot_missed:
    - show_skillshot_result
    - skillshot_missed_callout
    - skillshot_clear_lit_shot
    - finish_skillshot|2s    

  finish_skillshot:
    - finish_skillshot2|100ms

variable_player:
  finish_skillshot:
    skillshot_active: 0

widget_player:
  mode_skillshot_started:
    skillshot:
      action: play

  mode_skillshot_stopping:
    skillshot:
      action: remove

  show_skillshot_result:
    skillshot_completed:
      action: play
      expire: 2s



sound_player:
  skillshot_success_callout:
    drum_1:
      action: play
      bus: effects


# ----------------------------
# Skill shot lights
# ----------------------------

show_player:

  skillshot_clear_lit_shot:
    skillshot_lit_show:
      action: stop

  skillshot_lit_saucer_left:
    flash_skillshot:
      key: skillshot_lit_show
      show_tokens:
        lights: l_1

  skillshot_lit_saucer_center:
    flash_skillshot:
      key: skillshot_lit_show
      show_tokens:
        lights: l_2

  skillshot_lit_saucer_right:
    flash_skillshot:
      key: skillshot_lit_show
      show_tokens:
        lights: l_3

  skillshot_lit_star:
    flash_skillshot:
      key: skillshot_lit_show
      show_tokens:
        lights: l_star

  skillshot_lit_upper_a:
    flash_skillshot:
      key: skillshot_lit_show
      show_tokens:
        lights: l_a_rollover

  skillshot_lit_upper_b:
    flash_skillshot:
      key: skillshot_lit_show
      show_tokens:
        lights: l_b_rollover

  mode_skillshot_stopping:
    skillshot_lit_show:
      action: stop



shows:
  flash_skillshot:
  - duration: 500ms
    lights:
      (lights): white

  - duration: 500ms
    lights:
      (lights): off  