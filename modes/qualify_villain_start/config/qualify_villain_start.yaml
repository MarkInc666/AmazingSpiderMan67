#config_version=6

mode:
  start_events: ball_started
  priority: 120

variable_player:
  mode_qualify_villain_start_started:
    villain_current_index:
      action: set
      int: 1
    villain_mode_running:
      action: set
      int: 0
    villain_start_ready:
      action: set
      int: 0
    saucer_1_select_ready:
      action: set
      int: 0
    saucer_2_select_ready:
      action: set
      int: 0
    saucer_3_select_ready:
      action: set
      int: 0
    villains_completed_this_ball_total:
      action: set
      int: 0

  reset_villain_locate:
    villain_mode_running:
      action: set
      int: 0
    villain_start_ready:
      action: set
      int: 0
    saucer_1_select_ready:
      action: set
      int: 0
    saucer_2_select_ready:
      action: set
      int: 0
    saucer_3_select_ready:
      action: set
      int: 0


  villain_started_set:
    villain_mode_running:
      action: set
      int: 1
    villain_start_ready:
      action: set
      int: 0
    villain_locate_spins:
      action: set
      int: 0
    saucer_1_select_ready:
      action: set
      int: 0
    saucer_2_select_ready:
      action: set
      int: 0
    saucer_3_select_ready:
      action: set
      int: 0

  villain_mode_running_clear:
    villain_mode_running:
      action: set
      int: 0

  saucer_1_select_ready_set:
    saucer_1_select_ready:
      action: set
      int: 1

  saucer_2_select_ready_set:
    saucer_2_select_ready:
      action: set
      int: 1

  saucer_3_select_ready_set:
    saucer_3_select_ready:
      action: set
      int: 1

  advance_current_villain:
    villain_current_index: 1

  current_villain_wrap_to_1:
    villain_current_index:
      action: set
      int: 1

  kingpin_ready_set:
    kingpin_ready:
      action: set
      int: 1

  slings_hit: 
    score: 110


shots:
  sling_left:
    switch: s_sling_l
  sling_right:
    switch: s_sling_r

shot_groups:
  slings:
      shots:   sling_left, sling_right


event_player:

  reset_villain_locate:
    - advance_current_villain
    - current_villain_wrap_check

  slings_hit:
    - advance_current_villain
    - current_villain_wrap_check

  s_saucer_1_active: saucer_1_villain_start_request
  s_saucer_2_active: saucer_2_villain_start_request
  s_saucer_3_active: saucer_3_villain_start_request


  saucer_1_villain_start_request{current_player.saucer_1_select_ready == 1}: start_mode_villain_select
  saucer_1_villain_start_request{current_player.villain_start_ready == 1 and current_player.saucer_1_select_ready == 0}: start_current_villain

  saucer_2_villain_start_request{current_player.saucer_2_select_ready == 1}: start_mode_villain_select
  saucer_2_villain_start_request{current_player.villain_start_ready == 1 and current_player.saucer_2_select_ready == 0}: start_current_villain

  saucer_3_villain_start_request{current_player.saucer_3_select_ready == 1}: start_mode_villain_select
  saucer_3_villain_start_request{current_player.villain_start_ready == 1 and current_player.saucer_3_select_ready == 0}: start_current_villain

  start_current_villain{current_player.kingpin_ready == 1}: start_kingpin_wizard
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 1}: start_doc_ock_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 2}: start_sandman_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 3}: start_vulture_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 4}: start_rhino_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 5}: start_goblin_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 6}: start_mysterio_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 7}: start_scorpion_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 8}: start_electro_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 9}: start_parafino_villain
  start_current_villain{current_player.kingpin_ready == 0 and current_player.villain_current_index == 10}: start_lizard_villain

  check_kingpin_ready{current_player.villains_completed_total >= 10}:
    - kingpin_ready_set
    - kingpin_wizard_ready

  current_villain_wrap_check{current_player.villain_current_index > 10}: current_villain_wrap_to_1
  
  start_rhino_villain:
    - villain_started_set
    - start_mode_rhino_bash

  start_sandman_villain:
    - villain_started_set
    - start_mode_sandman

  start_vulture_villain:
    - villain_started_set
    - start_mode_vulture

  start_electro_villain:
    - villain_started_set
    - start_mode_electro

  start_goblin_villain:
    - villain_started_set
    - start_mode_goblin

  start_mysterio_villain:
    - villain_started_set
    - start_mode_mysterio

  start_scorpion_villain:
    - villain_started_set
    - start_mode_scorpion

  start_doc_ock_villain:
    - villain_started_set
    - start_mode_doc_ock

  start_parafino_villain:
    - villain_started_set
    - start_mode_parafino

  start_lizard_villain:
    - villain_started_set
    - start_mode_lizard

  start_kingpin_wizard:
    - villain_started_set
    - start_mode_kingpin



show_player:

  start_mode_villain_select:
    villain_saucer_1_solid:
      action: stop
    villain_saucer_2_solid:
      action: stop
    villain_saucer_3_solid:
      action: stop
    villain_saucer_1_flash:
      action: stop
    villain_saucer_2_flash:
      action: stop
    villain_saucer_3_flash:
      action: stop

  start_current_villain:
    villain_saucer_1_solid:
      action: stop
    villain_saucer_2_solid:
      action: stop
    villain_saucer_3_solid:
      action: stop
    villain_saucer_1_flash:
      action: stop
    villain_saucer_2_flash:
      action: stop
    villain_saucer_3_flash:
      action: stop

  carousel_rhino_highlighted:
    villain_select_rhino_show:
      loops: 1

  carousel_sandman_highlighted:
    villain_select_sandman_show:
      loops: 1

  carousel_vulture_highlighted:
    villain_select_vulture_show:
      loops: 1

  carousel_electro_highlighted:
    villain_select_electro_show:
      loops: 1

  carousel_goblin_highlighted:
    villain_select_goblin_show:
      loops: 1

  carousel_mysterio_highlighted:
    villain_select_mysterio_show:
      loops: 1

  carousel_scorpion_highlighted:
    villain_select_scorpion_show:
      loops: 1

  carousel_doc_ock_highlighted:
    villain_select_doc_ock_show:
      loops: 1

  carousel_parafino_highlighted:
    villain_select_parafino_show:
      loops: 1

  carousel_lizard_highlighted:
    villain_select_lizard_show:
      loops: 1

shows:
  villain_select_rhino_show:
    - duration: 250ms
      lights:
        l_left_b: red

  villain_select_sandman_show:
    - duration: 250ms
      lights:
        l_spinner: yellow

  villain_select_vulture_show:
    - duration: 250ms
      lights:
        l_upper_middle: white

  villain_select_electro_show:
    - duration: 250ms
      lights:
        l_a_rollover: blue
        l_b_rollover: blue

  villain_select_goblin_show:
    - duration: 250ms
      lights:
        l_3_hole_l: green

  villain_select_mysterio_show:
    - duration: 250ms
      lights:
        l_star: purple

  villain_select_scorpion_show:
    - duration: 250ms
      lights:
        l_right_a: orange

  villain_select_doc_ock_show:
    - duration: 250ms
      lights:
        l_left_web_target: white
        l_mid_spider_target: white

  villain_select_parafino_show:
    - duration: 250ms
      lights:
        l_5bank_3: yellow

  villain_select_lizard_show:
    - duration: 250ms
      lights:
        l_1_hole_l: green

  villain_saucer_1_flash:
    - duration: 250ms
      lights:
        l_1_hole_l: red
        l_1: red
        l_1_hole_r: red
    - duration: 250ms
      lights:
        l_1_hole_l: off
        l_1: off
        l_1_hole_r: off

  villain_saucer_2_flash:
    - duration: 250ms
      lights:
        l_2_hole_l: red
        l_2: red
        l_2_hole_r: red
    - duration: 250ms
      lights:
        l_2_hole_l: off
        l_2: off
        l_2_hole_r: off

  villain_saucer_3_flash:
    - duration: 250ms
      lights:
        l_3_hole_l: red
        l_3: red
        l_3_hole_r: red
    - duration: 250ms
      lights:
        l_3_hole_l: off
        l_3: off
        l_3_hole_r: off

  villain_saucer_1_solid:
    - duration: 1s
      lights:
        l_1_hole_l: white
        l_1: white
        l_1_hole_r: white

  villain_saucer_2_solid:
    - duration: 1s
      lights:
        l_2_hole_l: white
        l_2: white
        l_2_hole_r: white

  villain_saucer_3_solid:
    - duration: 1s
      lights:
        l_3_hole_l: white
        l_3: white
        l_3_hole_r: white
