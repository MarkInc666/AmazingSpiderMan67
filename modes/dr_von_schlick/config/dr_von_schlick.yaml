#config_version=6

# Juan Ponce de León placeholder villain mode.
# Mode idea: Value drains until fountain shot is hit; fountain resets timer and raises jackpot.

mode:
  start_events: start_mode_dr_von_schlick
  stop_events:
    - dr_von_schlick_mode_complete
    - dr_von_schlick_mode_completed_summary
    - ball_ended
  code: dr_von_schlick.DrVonSchlick
  priority: 300

widget_player:
  mode_dr_von_schlick_started:
    dr_von_schlick:
      action: play

  dr_von_schlick_mode_complete:
    dr_von_schlick:
      action: remove

  mode_dr_von_schlick_stopping:
    dr_von_schlick:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: dr_von_schlick_shot_hit
  s_pop_right_active: dr_von_schlick_shot_hit
  s_trispinner_opto_active: dr_von_schlick_shot_hit
  s_web_spinner_active: dr_von_schlick_shot_hit
  s_star_rollover_active: dr_von_schlick_shot_hit
  s_upper_target_left_active: dr_von_schlick_shot_hit
  s_upper_target_center_active: dr_von_schlick_shot_hit
  s_upper_target_right_active: dr_von_schlick_shot_hit

  s_left_drops_1_active: dr_von_schlick_shot_hit
  s_left_drops_2_active: dr_von_schlick_shot_hit
  s_left_drops_3_active: dr_von_schlick_shot_hit
  s_right_drops_1_active: dr_von_schlick_shot_hit
  s_right_drops_2_active: dr_von_schlick_shot_hit
  s_right_drops_3_active: dr_von_schlick_shot_hit
  s_right_drops_4_active: dr_von_schlick_shot_hit
  s_right_drops_5_active: dr_von_schlick_shot_hit

  s_saucer_1_active:
    - dr_von_schlick_major_hit
    - clear_saucers
  s_saucer_2_active:
    - dr_von_schlick_major_hit
    - clear_saucers
  s_saucer_3_active:
    - dr_von_schlick_major_hit
    - clear_saucers
  s_vuk_switch_active: dr_von_schlick_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_dr_von_schlick_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_dr_von_schlick_stopping:
    - clear_saucers
