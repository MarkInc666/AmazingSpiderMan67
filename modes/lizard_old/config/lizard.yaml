#config_version=6

mode:
  start_events: start_mode_lizard
  stop_events:
    - lizard_mode_completed_summary
    - ball_ended
  code: lizard.Lizard
  priority: 300


widget_player:
  mode_lizard_started:
    lizard:
      action: play

  lizard_mode_complete:
    lizard:
      action: remove


sound_player:
  lizard_serum_collected:
    sm_i_have_to_hurry:
      action: play
      bus: voice

  lizard_light_serum_location{current_player.lizard_deliveries == 0}:
    sm_i_need_to_pick_up_the_serum:
      action: play
      bus: voice

  lizard_light_serum_location{current_player.lizard_deliveries > 0}:
    sm_i_need_to_pick_up_more_serum:
      action: play
      bus: voice


variable_player:

  mode_lizard_started:
    lizard_serum_ready:
      action: set
      int: 0
    lizard_deliveries:
      action: set
      int: 0
    lizard_delivery_value:
      action: set
      int: 1000000
    lizard_a_hit:
      action: set
      int: 0
    lizard_b_hit:
      action: set
      int: 0
    lizard_ab_ready:
      action: set
      int: 0

  lizard_serum_collected:
    score: 100000
    lizard_serum_ready:
      action: set
      int: 1

  lizard_set_a:
    lizard_a_hit:
      action: set
      int: 1

  lizard_set_b:
    lizard_b_hit:
      action: set
      int: 1

  lizard_apply_ab_bonus:
    lizard_delivery_value: 500000

  lizard_ab_ready_event:
    lizard_ab_ready:
      action: set
      int: 1

  lizard_clear_ab:
    lizard_a_hit:
      action: set
      int: 0
    lizard_b_hit:
      action: set
      int: 0
    lizard_ab_ready:
      action: set
      int: 0

  lizard_delivery_tick:
    lizard_delivery_value: -100000

  lizard_serum_delivered:
    score: current_player.lizard_delivery_value
    lizard_deliveries: 1
    lizard_serum_ready:
      action: set
      int: 0
    lizard_delivery_value:
      action: set
      int: 1000000

  lizard_serum_expired:
    lizard_serum_ready:
      action: set
      int: 0
    lizard_delivery_value:
      action: set
      int: 1000000

event_player:

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  s_saucer_1_active:
    - clear_saucers
    
  s_saucer_2_active:
    - clear_saucers
    
  s_saucer_3_active:
    - clear_saucers    

  lizard_mode_complete:
    villain_bookend_summary_request:
      villain: lizard
      done_event: lizard_mode_completed_summary

  timer_lizard_delivery_timer_tick:
    - lizard_delivery_tick_check

  timer_lizard_delivery_timer_complete:
    - lizard_serum_expired

  # A rollovers
  s_inlane_a_active:
    - lizard_a_rollover

  s_inlane_m_r_active:
    - lizard_a_rollover

  # B rollovers
  s_inlane_b_active:
    - lizard_b_rollover

  s_inlane_m_l_active:
    - lizard_b_rollover

  lizard_a_rollover:
    - lizard_set_a

  lizard_b_rollover:
    - lizard_set_b

  lizard_set_a{current_player.lizard_b_hit == 1}:
    - lizard_ab_ready_event

  lizard_set_b{current_player.lizard_a_hit == 1}:
    - lizard_ab_ready_event

  #ab reset the timer
  lizard_ab_ready_event:
    - lizard_delivery_timer_start
    - lizard_clear_ab

  # Collect serum
  s_star_rollover_active:
    - lizard_serum_collect_request

  lizard_serum_collect_request{current_player.lizard_serum_ready == 0 and current_player.lizard_ab_ready == 1}:
    - lizard_serum_collected
    - lizard_light_delivery_target
    - lizard_delivery_timer_start

  lizard_serum_collect_request{current_player.lizard_serum_ready == 0}:
    - lizard_serum_collected
    - lizard_light_delivery_target
    - lizard_delivery_timer_start

  lizard_delivery_tick_check{device.timers.lizard_delivery_timer.ticks <= 10 and device.timers.lizard_delivery_timer.ticks >= 3}:
    - lizard_delivery_tick


  # Delivery shots
  s_web_target_left_active:
    - lizard_delivery_request_left

  s_web_target_top_active:
    - lizard_delivery_request_center

  mode_lizard_started:
    - lizard_light_serum_location
    - clear_saucers
    - play_song_4

  lizard_serum_expired:
    - lizard_delivery_timer_stop
    - lizard_light_serum_location
    - lizard_serum_expired_show

timers:

  lizard_delivery_timer:
    start_value: 12
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: lizard_delivery_timer_start
        action: restart
      - event: lizard_delivery_timer_stop
        action: stop

show_player:

  lizard_light_serum_location:
    lizard_gi_show:
      loops: -1
    lizard_serum_star_show:
      loops: -1
    lizard_left_web_show:
      action: stop
    lizard_center_web_show:
      action: stop

  lizard_serum_collected:
    lizard_serum_star_show:
      action: stop
    lizard_gi_show:
      action: stop
    lizard_gi_hurry_show:
      loops: -1

  lizard_light_left_web:
    lizard_left_web_show:
      loops: -1

  lizard_light_center_web:
    lizard_center_web_show:
      loops: -1

  lizard_serum_delivered:
    lizard_left_web_show:
      action: stop
    lizard_center_web_show:
      action: stop
#    lizard_delivery_success_show:
#      loops: 1
    lizard_gi_show:
      action: stop
    lizard_gi_hurry_show:
      action: stop

  lizard_serum_expired_show:
    lizard_left_web_show:
      action: stop
    lizard_center_web_show:
      action: stop
#    lizard_serum_expired_lights:
#      loops: 1
    lizard_gi_show:
      action: stop
    lizard_gi_hurry_show:
      action: stop

  lizard_mode_complete:
    lizard_serum_star_show:
      action: stop
    lizard_left_web_show:
      action: stop
    lizard_center_web_show:
      action: stop
    lizard_complete_show:
      loops: 1
    lizard_gi_show:
      action: stop
    lizard_gi_hurry_show:
      action: stop

  lizard_a_complete:
    lizard_a_complete_show:
      loops: -1

  lizard_b_complete:
    lizard_b_complete_show:
      loops: -1

  lizard_ab_complete:
    lizard_a_complete_show:
      action: stop
    lizard_b_complete_show:
      action: stop
    lizard_ab_ready_show:
      loops: 3


shows:

  lizard_gi_show:
    - duration: 400ms  
      lights:
        gi: B0FFB0
    - duration: 200ms  
      lights:
        gi: D0FFD0
    - duration: 100ms
      lights:
        gi: FFFFFF

  lizard_gi_hurry_show:
    - duration: 400ms  
      lights:
        gi: FFFFB0
    - duration: 200ms  
      lights:
        gi: FFFFD0
    - duration: 100ms
      lights:
        gi: FFFFFF

  lizard_serum_star_show:    
    - duration: 500ms  
      lights:
        l_star: white
    - duration: 500ms
      lights:
        l_star: off

  lizard_left_web_show:
    - duration: 250ms
      lights:
        l_left_web_target: green
    - duration: 250ms
      lights:
        l_left_web_target: white

  lizard_center_web_show:
    - duration: 250ms
      lights:
        l_mid_spider_target: green
    - duration: 250ms
      lights:
        l_mid_spider_target: white

  lizard_delivery_success_show:
    - duration: 150ms
      lights:
        l_left_web_target: white
        l_mid_spider_target: white
    - duration: 150ms
      lights:
        l_left_web_target: green
        l_mid_spider_target: green

  lizard_serum_expired_lights:
    - duration: 150ms
      lights:
        l_star: red
        l_left_web_target: red
        l_mid_spider_target: red
    - duration: 150ms
      lights:
        l_star: off
        l_left_web_target: off
        l_mid_spider_target: off

  lizard_complete_show:
    - duration: 200ms
      lights:
        gi: green
    - duration: 200ms
      lights:
        gi: white

  lizard_a_complete_show:
    - duration: 300ms
      lights:
        l_a_rollover: white
        l_right_a: white
    - duration: 300ms
      lights:
        l_a_rollover: blue
        l_right_a: blue

  lizard_b_complete_show:
    - duration: 300ms
      lights:
        l_b_rollover: white
        l_left_b: white
    - duration: 300ms
      lights:
        l_b_rollover: blue
        l_left_b: blue

  lizard_ab_off_show:
    - duration: 300ms
      lights:
        l_a_rollover: off
        l_right_a: off
        l_b_rollover: off
        l_left_b: off

  lizard_ab_ready_show:
    - duration: 300ms
      lights:
        l_a_rollover: white
        l_right_a: white
        l_b_rollover: white
        l_left_b: white
    - duration: 300ms
      lights:
        l_a_rollover: blue
        l_b_rollover: blue
        l_right_a: blue
        l_left_b: blue

