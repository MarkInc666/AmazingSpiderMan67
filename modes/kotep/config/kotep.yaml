#config_version=6

# Kotep placeholder villain mode.
# Mode idea: Collect relic shots to weaken curse; wrong shots strengthen curse meter.

mode:
  start_events: start_mode_kotep
  stop_events:
    - kotep_mode_complete
    - kotep_mode_failed
    - kotep_mode_completed_summary
    - ball_ended
  code: kotep.Kotep
  priority: 300

widget_player:
  mode_kotep_started:
    kotep:
      action: play

  kotep_mode_complete:
    kotep:
      action: remove

  kotep_mode_failed:
    kotep:
      action: remove

  mode_kotep_stopping:
    kotep:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: kotep_shot_hit
  s_pop_right_active: kotep_shot_hit
  s_trispinner_opto_active: kotep_shot_hit
  s_web_spinner_active: kotep_shot_hit
  s_star_rollover_active: kotep_shot_hit
  s_upper_target_left_active: kotep_shot_hit
  s_upper_target_center_active: kotep_shot_hit
  s_upper_target_right_active: kotep_shot_hit

  s_left_drops_1_active: kotep_shot_hit
  s_left_drops_2_active: kotep_shot_hit
  s_left_drops_3_active: kotep_shot_hit
  s_right_drops_1_active: kotep_shot_hit
  s_right_drops_2_active: kotep_shot_hit
  s_right_drops_3_active: kotep_shot_hit
  s_right_drops_4_active: kotep_shot_hit
  s_right_drops_5_active: kotep_shot_hit

  s_saucer_1_active:
    - kotep_major_hit
    - clear_saucers
  s_saucer_2_active:
    - kotep_major_hit
    - clear_saucers
  s_saucer_3_active:
    - kotep_major_hit
    - clear_saucers
  s_vuk_switch_active: kotep_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_kotep_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_kotep_stopping:
    - clear_saucers
