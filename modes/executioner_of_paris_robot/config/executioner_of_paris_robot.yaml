#config_version=6

# Executioner of Paris Robot placeholder villain mode.
# Mode idea: A countdown threatens jackpot value; hit rescue shots to delay and cash.

mode:
  start_events: start_mode_executioner_of_paris_robot
  stop_events:
    - executioner_of_paris_robot_mode_complete
    - executioner_of_paris_robot_mode_failed
    - executioner_of_paris_robot_mode_completed_summary
    - ball_ended
  code: executioner_of_paris_robot.ExecutionerOfParisRobot
  priority: 300

widget_player:
  mode_executioner_of_paris_robot_started:
    executioner_of_paris_robot:
      action: play

  executioner_of_paris_robot_mode_complete:
    executioner_of_paris_robot:
      action: remove

  executioner_of_paris_robot_mode_failed:
    executioner_of_paris_robot:
      action: remove

  mode_executioner_of_paris_robot_stopping:
    executioner_of_paris_robot:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: executioner_of_paris_robot_shot_hit
  s_pop_right_active: executioner_of_paris_robot_shot_hit
  s_trispinner_opto_active: executioner_of_paris_robot_shot_hit
  s_web_spinner_active: executioner_of_paris_robot_shot_hit
  s_star_rollover_active: executioner_of_paris_robot_shot_hit
  s_upper_target_left_active: executioner_of_paris_robot_shot_hit
  s_upper_target_center_active: executioner_of_paris_robot_shot_hit
  s_upper_target_right_active: executioner_of_paris_robot_shot_hit

  s_left_drops_1_active: executioner_of_paris_robot_shot_hit
  s_left_drops_2_active: executioner_of_paris_robot_shot_hit
  s_left_drops_3_active: executioner_of_paris_robot_shot_hit
  s_right_drops_1_active: executioner_of_paris_robot_shot_hit
  s_right_drops_2_active: executioner_of_paris_robot_shot_hit
  s_right_drops_3_active: executioner_of_paris_robot_shot_hit
  s_right_drops_4_active: executioner_of_paris_robot_shot_hit
  s_right_drops_5_active: executioner_of_paris_robot_shot_hit

  s_saucer_1_active:
    - executioner_of_paris_robot_major_hit
    - clear_saucers
  s_saucer_2_active:
    - executioner_of_paris_robot_major_hit
    - clear_saucers
  s_saucer_3_active:
    - executioner_of_paris_robot_major_hit
    - clear_saucers
  s_vuk_switch_active: executioner_of_paris_robot_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_executioner_of_paris_robot_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_executioner_of_paris_robot_stopping:
    - clear_saucers
