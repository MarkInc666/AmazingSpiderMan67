    enforcers_upper_right_flash_3x:
      action: stop
    enforcers_upper_right_flash_4x:
      action: stop
    enforcers_upper_right_flash_5x:
      action: stop
    enforcers_ox_chase:
      action: stop

  enforcers_stop_left_upper_flash:
