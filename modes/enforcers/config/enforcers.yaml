      action: stop
    enforcers_upper_left_flash_2x:
      action: stop
    enforcers_upper_left_flash_3x:
      action: stop
    enforcers_upper_left_flash_4x:
      action: stop
    enforcers_upper_left_flash_5x:
      action: stop

  enforcers_stop_pops_upper_flash:
