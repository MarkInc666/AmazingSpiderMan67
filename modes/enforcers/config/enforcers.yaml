      action: stop
    enforcers_upper_center_flash_2x:
      action: stop
    enforcers_upper_center_flash_3x:
      action: stop
    enforcers_upper_center_flash_4x:
      action: stop
    enforcers_upper_center_flash_5x:
      action: stop

  enforcers_stop_right_upper_flash:
    enforcers_upper_right_flash_1x:
      action: stop
    enforcers_upper_right_flash_2x:
      action: stop
    enforcers_upper_right_flash_3x:
      action: stop
    enforcers_upper_right_flash_4x:
      action: stop
    enforcers_upper_right_flash_5x:
      action: stop

  enforcers_left_upper_flash_1x:
    enforcers_upper_left_flash_1x:
      loops: -1
  enforcers_left_upper_flash_2x:
    enforcers_upper_left_flash_2x:
      loops: -1
  enforcers_left_upper_flash_3x:
    enforcers_upper_left_flash_3x:
      loops: -1
  enforcers_left_upper_flash_4x:
    enforcers_upper_left_flash_4x:
      loops: -1
  enforcers_left_upper_flash_5x:
    enforcers_upper_left_flash_5x:
      loops: -1

  enforcers_pops_upper_flash_1x:
    enforcers_upper_center_flash_1x:
      loops: -1
  enforcers_pops_upper_flash_2x:
    enforcers_upper_center_flash_2x:
      loops: -1
  enforcers_pops_upper_flash_3x:
    enforcers_upper_center_flash_3x:
      loops: -1
  enforcers_pops_upper_flash_4x:
    enforcers_upper_center_flash_4x:
      loops: -1
  enforcers_pops_upper_flash_5x:
    enforcers_upper_center_flash_5x:
      loops: -1

  enforcers_right_upper_flash_1x:
    enforcers_upper_right_flash_1x:
      loops: -1
  enforcers_right_upper_flash_2x:
    enforcers_upper_right_flash_2x:
      loops: -1
  enforcers_right_upper_flash_3x:
    enforcers_upper_right_flash_3x:
      loops: -1
  enforcers_right_upper_flash_4x:
    enforcers_upper_right_flash_4x:
      loops: -1
  enforcers_right_upper_flash_5x:
    enforcers_upper_right_flash_5x:
      loops: -1

  enforcers_ox_lit:
    enforcers_ox_chase:
      loops: -1

  enforcers_ox_super_jackpot_awarded:
    enforcers_ox_chase:
      action: stop

