#config_version=6

mode:
  start_events: start_mode_enforcers
  stop_events:
    - enforcers_mode_complete
    - enforcers_mode_completed_summary
    - ball_ended
  code: enforcers.Enforcers
  priority: 300

widget_player:
  mode_enforcers_started:
    enforcers:
      action: play

  enforcers_mode_complete:
    enforcers:
      action: remove

  mode_enforcers_stopping:
    enforcers:
      action: remove

event_player:
  mode_enforcers_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - enforcers_clear_all_lights
    - enforcers_clear_upper_shows
    - enforcers_clear_saucers

  mode_enforcers_stopping:
    - clear_saucers
    - enforcers_clear_all_lights
    - enforcers_clear_upper_shows
    - enforcers_clear_saucers
    - rooftop_diverter_close

  # Build zones.
  s_left_drops_1_active: enforcers_left_zone_hit
  s_left_drops_2_active: enforcers_left_zone_hit
  s_left_drops_3_active: enforcers_left_zone_hit

  s_pop_left_active: enforcers_pops_zone_hit
  s_pop_right_active: enforcers_pops_zone_hit

  s_right_drops_1_active: enforcers_right_zone_hit
  s_right_drops_2_active: enforcers_right_zone_hit
  s_right_drops_3_active: enforcers_right_zone_hit
  s_right_drops_4_active: enforcers_right_zone_hit
  s_right_drops_5_active: enforcers_right_zone_hit

  # Upper target jackpots.
  s_upper_target_left_active: enforcers_upper_left_hit
  s_upper_target_center_active: enforcers_upper_center_hit
  s_upper_target_right_active: enforcers_upper_right_hit

  # OX Super Jackpot.
  s_web_target_mid_active: enforcers_ox_hit

  # Spinner adds to OX Super Jackpot.
  s_trispinner_opto_active: enforcers_upper_spinner_hit

  # More Jackpots saucer bonuses.
  s_saucer_1_active:
    - enforcers_saucer_1_hit
    - clear_saucers
  s_saucer_2_active:
    - enforcers_saucer_2_hit
    - clear_saucers
  s_saucer_3_active:
    - enforcers_saucer_3_hit
    - clear_saucers

  # Keep the physical drop zones available for continued multiplier building.
  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

show_player:
  enforcers_clear_upper_shows:
    enforcers_upper_left_flash_1x:
      action: stop
    enforcers_upper_left_flash_2x:
      action: stop
    enforcers_upper_left_flash_3x:
      action: stop
    enforcers_upper_left_flash_4x:
      action: stop
    enforcers_upper_left_flash_5x:
      action: stop
    enforcers_upper_center_flash_1x:
      action: stop
    enforcers_upper_center_flash_2x:
      action: stop
    enforcers_upper_center_flash_3x:
      action: stop
    enforcers_upper_center_flash_4x:
      action: stop
    enforcers_upper_center_flash_5x:
      action: stop
    enforcers_upper_right_flash_1x:
