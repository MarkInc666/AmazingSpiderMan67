#config_version=6

mode:
  start_events: start_mode_villain_select
  stop_events: stop_carousel_select
  code: qualify_villain_select.QualifyVillainSelect
  priority: 500

mode_settings:
  selectable_items:
    - lizard
    - rhino
    - sandman
    - vulture
    - electro
    - goblin
    - mysterio
    - scorpion
    - doc_ock
    - parafino

  next_item_events: s_right_flipper_inactive
  previous_item_events: s_left_flipper_inactive
  select_item_events: flipper_cancel
  block_events: carousel_selection_locked
  release_events: carousel_selection_unlocked


slide_player:
  mode_qualify_villain_select_started:
    villain_select:
      priority: 1000
      action: play

  stop_carousel_select:
    villain_select:
      action: remove

