#config_version=6

# Trubble Unleashed - Chapter 3 wizard
# No active case-file powers. Chapter case files only scale values.

mode:
  start_events: start_mode_trubble_unleashed
  stop_events:
    - stop_mode_trubble_unleashed
    - trubble_unleashed_mode_complete
    - trubble_unleashed_mode_completed_summary
    - ball_ended
  code: trubble_unleashed.TrubbleUnleashed
  priority: 800

variable_player:
  multiball_trubble_unleashed_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_trubble_unleashed_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

  multiball_trubble_unleashed_add_a_ball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_trubble_unleashed_add_a_ball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

multiballs:
  trubble_unleashed_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 20s
    start_events: trubble_unleashed_start_multiball
    stop_events:
      - trubble_unleashed_stop_multiball

  trubble_unleashed_add_a_ball:
    ball_count: 1
    ball_count_type: add
    shoot_again: 10s
    start_events: trubble_unleashed_add_a_ball

widget_player:
  mode_trubble_unleashed_started:
    trubble_unleashed:
      action: play

  trubble_unleashed_mode_complete:
    trubble_unleashed:
      action: remove

  mode_trubble_unleashed_stopping:
    trubble_unleashed:
      action: remove

event_player:
  mode_trubble_unleashed_started:
    - trubble_unleashed_setup
    - play_song_14

  mode_trubble_unleashed_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - trubble_unleashed_close_gate
    - trubble_unleashed_clear_all_lights

  trubble_unleashed_setup:
    - disable_daily_bugle_mystery
    - clear_saucers
    - reset_drops
    - trubble_unleashed_close_gate
    - trubble_unleashed_clear_all_lights

  multiball_trubble_unleashed_multiball_ended:
    - trubble_unleashed_multiball_ended

  s_upper_target_left_active:
    - trubble_unleashed_upper_target_left_hit
  s_upper_target_center_active:
    - trubble_unleashed_upper_target_center_hit
  s_upper_target_right_active:
    - trubble_unleashed_upper_target_right_hit

  s_upper_exit_left_opto_active:
    - trubble_unleashed_upper_exit_left
  s_upper_exit_right_opto_active:
    - trubble_unleashed_upper_exit_right

  s_left_drops_1_active:
    - trubble_unleashed_left_drop_hit
  s_left_drops_2_active:
    - trubble_unleashed_left_drop_hit
  s_left_drops_3_active:
    - trubble_unleashed_left_drop_hit

  s_right_drops_1_active:
    - trubble_unleashed_right_drop_1_hit
  s_right_drops_2_active:
    - trubble_unleashed_right_drop_2_hit
  s_right_drops_3_active:
    - trubble_unleashed_right_drop_3_hit
  s_right_drops_4_active:
    - trubble_unleashed_right_drop_4_hit
  s_right_drops_5_active:
    - trubble_unleashed_right_drop_5_hit

  s_saucer_1_active:
    - trubble_unleashed_saucer_1_hit
  s_saucer_2_active:
    - trubble_unleashed_saucer_2_hit
  s_saucer_3_active:
    - trubble_unleashed_saucer_3_hit

  # Daily Bugle is disabled during the wizard, so Trubble owns VUK eject/add-a-ball.
  s_vuk_switch_active:
    - trubble_unleashed_vuk_hit

  # Flipper-cancel the post hold. The timed staged shot starts only after the post drops.
  s_left_flipper_active{device.switches.s_right_flipper.state == 1}:
    - trubble_unleashed_post_hold_cancel
  s_right_flipper_active{device.switches.s_left_flipper.state == 1}:
    - trubble_unleashed_post_hold_cancel

  drop_target_bank_dt_bank_left_down:
    - trubble_unleashed_left_bank_complete
  drop_target_bank_dt_bank_right_down:
    - trubble_unleashed_right_bank_complete

  trubble_unleashed_open_gate: rooftop_diverter_open
  trubble_unleashed_close_gate: rooftop_diverter_close

coil_player:
  trubble_unleashed_drop_right_target_1:
    c_right_bank_drop_1:
      action: pulse
  trubble_unleashed_drop_right_target_2:
    c_right_bank_drop_2:
      action: pulse
  trubble_unleashed_drop_right_target_3:
    c_right_bank_drop_3:
      action: pulse
  trubble_unleashed_drop_right_target_4:
    c_right_bank_drop_4:
      action: pulse
  trubble_unleashed_drop_right_target_5:
    c_right_bank_drop_5:
      action: pulse

show_player:
  trubble_unleashed_saucer_1_lit:
    trubble_unleashed_saucer_1_lit_show:
      loops: -1
  trubble_unleashed_saucer_2_lit:
    trubble_unleashed_saucer_2_lit_show:
      loops: -1
  trubble_unleashed_saucer_3_lit:
    trubble_unleashed_saucer_3_lit_show:
      loops: -1

  trubble_unleashed_clear_saucer_lights:
    trubble_unleashed_saucer_1_lit_show:
      action: stop
    trubble_unleashed_saucer_2_lit_show:
      action: stop
    trubble_unleashed_saucer_3_lit_show:
      action: stop

  trubble_unleashed_right_drop_1_staged:
    trubble_unleashed_right_drop_1_staged_show:
      loops: -1
  trubble_unleashed_right_drop_2_staged:
    trubble_unleashed_right_drop_2_staged_show:
      loops: -1
  trubble_unleashed_right_drop_3_staged:
    trubble_unleashed_right_drop_3_staged_show:
      loops: -1
  trubble_unleashed_right_drop_4_staged:
    trubble_unleashed_right_drop_4_staged_show:
      loops: -1
  trubble_unleashed_right_drop_5_staged:
    trubble_unleashed_right_drop_5_staged_show:
      loops: -1

  trubble_unleashed_clear_staged_lights:
    trubble_unleashed_right_drop_1_staged_show:
      action: stop
    trubble_unleashed_right_drop_2_staged_show:
      action: stop
    trubble_unleashed_right_drop_3_staged_show:
      action: stop
    trubble_unleashed_right_drop_4_staged_show:
      action: stop
    trubble_unleashed_right_drop_5_staged_show:
      action: stop

  trubble_unleashed_add_a_ball_lit:
    trubble_unleashed_vuk_add_a_ball_show:
      loops: -1
  trubble_unleashed_add_a_ball_unlit:
    trubble_unleashed_vuk_add_a_ball_show:
      action: stop

  trubble_unleashed_staged_drop_collected:
    trubble_unleashed_staged_success_show:
      loops: 2
  trubble_unleashed_saucer_jackpot_collected:
    trubble_unleashed_saucer_jackpot_show:
      loops: 2
  trubble_unleashed_left_bank_complete_show:
    trubble_unleashed_left_bank_complete_flash:
      loops: 2

  trubble_unleashed_clear_all_lights:
    trubble_unleashed_saucer_1_lit_show:
      action: stop
    trubble_unleashed_saucer_2_lit_show:
      action: stop
    trubble_unleashed_saucer_3_lit_show:
      action: stop
    trubble_unleashed_right_drop_1_staged_show:
      action: stop
    trubble_unleashed_right_drop_2_staged_show:
      action: stop
    trubble_unleashed_right_drop_3_staged_show:
      action: stop
    trubble_unleashed_right_drop_4_staged_show:
      action: stop
    trubble_unleashed_right_drop_5_staged_show:
      action: stop
    trubble_unleashed_vuk_add_a_ball_show:
      action: stop

shows:
  trubble_unleashed_saucer_1_lit_show:
    - duration: 200ms
      lights:
        l_1: purple
        l_1_hole_l: purple
        l_1_hole_r: purple
    - duration: 200ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off

  trubble_unleashed_saucer_2_lit_show:
    - duration: 200ms
      lights:
        l_2: purple
        l_2_hole_l: purple
        l_2_hole_r: purple
    - duration: 200ms
      lights:
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off

  trubble_unleashed_saucer_3_lit_show:
    - duration: 200ms
      lights:
        l_3: purple
        l_3_hole_l: purple
        l_3_hole_r: purple
    - duration: 200ms
      lights:
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off

  trubble_unleashed_right_drop_1_staged_show:
    - duration: 150ms
      lights:
        l_5bank_1: green
    - duration: 150ms
      lights:
        l_5bank_1: off
  trubble_unleashed_right_drop_2_staged_show:
    - duration: 150ms
      lights:
        l_5bank_2: green
    - duration: 150ms
      lights:
        l_5bank_2: off
  trubble_unleashed_right_drop_3_staged_show:
    - duration: 150ms
      lights:
        l_5bank_3: green
    - duration: 150ms
      lights:
        l_5bank_3: off
  trubble_unleashed_right_drop_4_staged_show:
    - duration: 150ms
      lights:
        l_5bank_4: green
    - duration: 150ms
      lights:
        l_5bank_4: off
  trubble_unleashed_right_drop_5_staged_show:
    - duration: 150ms
      lights:
        l_5bank_5: green
    - duration: 150ms
      lights:
        l_5bank_5: off

  trubble_unleashed_vuk_add_a_ball_show:
    - duration: 200ms
      lights:
        l_gi_a: cyan
        l_gi_ramp: cyan
    - duration: 200ms
      lights:
        l_gi_a: off
        l_gi_ramp: off

  trubble_unleashed_staged_success_show:
    - duration: 100ms
      lights:
        l_gi_5bank_lower: blue
        l_gi_5bank_upper: blue
    - duration: 100ms
      lights:
        l_gi_5bank_lower: off
        l_gi_5bank_upper: off

  trubble_unleashed_saucer_jackpot_show:
    - duration: 100ms
      lights:
        l_1: white
        l_1_hole_l: white
        l_1_hole_r: white
        l_2: white
        l_2_hole_l: white
        l_2_hole_r: white
        l_3: white
        l_3_hole_l: white
        l_3_hole_r: white
    - duration: 100ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off

  trubble_unleashed_left_bank_complete_flash:
    - duration: 100ms
      lights:
        l_gi_3bank: white
    - duration: 100ms
      lights:
        l_gi_3bank: off

light_player:
  trubble_unleashed_clear_all_lights:
    l_gi_a: off
    l_gi_ramp: off
    l_gi_3bank: off
    l_gi_5bank_lower: off
    l_gi_5bank_upper: off
    l_1: off
    l_1_hole_l: off
    l_1_hole_r: off
    l_2: off
    l_2_hole_l: off
    l_2_hole_r: off
    l_3: off
    l_3_hole_l: off
    l_3_hole_r: off
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: off
    l_5bank_4: off
    l_5bank_5: off

  trubble_unleashed_setup:
    l_gi_3bank: blue

  trubble_unleashed_upper_target_left_hit:
    l_upper_left: purple
  trubble_unleashed_upper_target_center_hit:
    l_upper_middle: purple
  trubble_unleashed_upper_target_right_hit:
    l_upper_right: purple
