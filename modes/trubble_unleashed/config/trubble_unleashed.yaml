  trubble_unleashed_reveal_bad_upper_target_left:
    l_upper_left: 800000
  trubble_unleashed_reveal_bad_upper_target_center:
    l_upper_middle: 800000
  trubble_unleashed_reveal_bad_upper_target_right:
    l_upper_right: 800000
  trubble_unleashed_reveal_bad_left_drops:
