  # Wrong reveal: dim red.
  trubble_unleashed_reveal_bad_left_web:
    l_left_web_target: 800000
  trubble_unleashed_reveal_bad_center_web:
    l_mid_web_target: 800000
  trubble_unleashed_reveal_bad_upper_spinner:
