#config_version=6

# Fifth Avenue Phantom — Vanish and Reveal
# Right drop targets reveal the Phantom's hiding place for longer windows.
# Catch him while lit for a jackpot. If the fifth reveal expires, the mode ends.

mode:
  start_events: start_mode_fifth_avenue_phantom
  stop_events:
    - fifth_avenue_phantom_mode_complete
    - fifth_avenue_phantom_mode_failed
    - fifth_avenue_phantom_mode_completed_summary
    - ball_ended
  code: fifth_avenue_phantom.FifthAvenuePhantom
  priority: 300


widget_player:
  mode_fifth_avenue_phantom_started:
    fifth_avenue_phantom:
      action: play

  fifth_avenue_phantom_mode_complete:
    fifth_avenue_phantom:
      action: remove

  fifth_avenue_phantom_mode_failed:
    fifth_avenue_phantom:
      action: remove

  mode_fifth_avenue_phantom_stopping:
    fifth_avenue_phantom:
      action: remove


event_player:
  mode_fifth_avenue_phantom_started:
    - clear_saucers
    - drop_target_bank_dt_bank_right_reset

  mode_fifth_avenue_phantom_stopping:
    - clear_saucers
    - fifth_avenue_phantom_clear_lights

  fifth_avenue_phantom_mode_complete:
    - clear_saucers
    - fifth_avenue_phantom_clear_lights

  fifth_avenue_phantom_mode_failed:
    - clear_saucers
    - fifth_avenue_phantom_clear_lights


show_player:
  fifth_avenue_phantom_light_left_web:
    fifth_avenue_phantom_left_web_show:
      loops: -1

  fifth_avenue_phantom_light_center_web:
    fifth_avenue_phantom_center_web_show:
      loops: -1

  fifth_avenue_phantom_light_star:
    fifth_avenue_phantom_star_show:
      loops: -1

  fifth_avenue_phantom_light_left_drops:
    fifth_avenue_phantom_left_drops_show:
      loops: -1

  fifth_avenue_phantom_light_upper_targets:
    fifth_avenue_phantom_upper_targets_show:
      loops: -1

  fifth_avenue_phantom_light_saucers:
    fifth_avenue_phantom_saucers_show:
      loops: -1

  fifth_avenue_phantom_stop_left_web:
    fifth_avenue_phantom_left_web_show:
      action: stop

  fifth_avenue_phantom_stop_center_web:
    fifth_avenue_phantom_center_web_show:
      action: stop

  fifth_avenue_phantom_stop_star:
    fifth_avenue_phantom_star_show:
      action: stop

  fifth_avenue_phantom_stop_left_drops:
    fifth_avenue_phantom_left_drops_show:
      action: stop

  fifth_avenue_phantom_stop_upper_targets:
    fifth_avenue_phantom_upper_targets_show:
      action: stop

  fifth_avenue_phantom_stop_saucers:
    fifth_avenue_phantom_saucers_show:
      action: stop

  fifth_avenue_phantom_clear_lights:
    fifth_avenue_phantom_left_web_show:
      action: stop
    fifth_avenue_phantom_center_web_show:
      action: stop
    fifth_avenue_phantom_star_show:
      action: stop
    fifth_avenue_phantom_left_drops_show:
      action: stop
    fifth_avenue_phantom_upper_targets_show:
      action: stop
    fifth_avenue_phantom_saucers_show:
      action: stop


shows:
  fifth_avenue_phantom_left_web_show:
    - duration: 150ms
      lights:
        l_left_web_target: purple
    - duration: 150ms
      lights:
        l_left_web_target: off

  fifth_avenue_phantom_center_web_show:
    - duration: 150ms
      lights:
        l_mid_web_target: purple
    - duration: 150ms
      lights:
        l_mid_web_target: off

  fifth_avenue_phantom_star_show:
    - duration: 150ms
      lights:
        l_star: purple
    - duration: 150ms
      lights:
        l_star: off

  fifth_avenue_phantom_left_drops_show:
    - duration: 150ms
      lights:
        l_3bankbonus: purple
        l_left_special: purple
        l_left_multibonus: purple
    - duration: 150ms
      lights:
        l_3bankbonus: off
        l_left_special: off
        l_left_multibonus: off

  fifth_avenue_phantom_upper_targets_show:
    - duration: 150ms
      lights:
        l_upper_left: purple
        l_upper_middle: purple
        l_upper_right: purple
    - duration: 150ms
      lights:
        l_upper_left: off
        l_upper_middle: off
        l_upper_right: off

  fifth_avenue_phantom_saucers_show:
    - duration: 150ms
      lights:
        l_1: purple
        l_1_hole_l: purple
        l_1_hole_r: purple
        l_2: purple
        l_2_hole_l: purple
        l_2_hole_r: purple
        l_3: purple
        l_3_hole_l: purple
        l_3_hole_r: purple
    - duration: 150ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off
