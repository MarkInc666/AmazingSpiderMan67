shows:
  saucer_cluster_state_0:
    - duration: -1
      lights:
        (main_light): off
        (hole_left): off
        (hole_right): off

  saucer_cluster_state_1:
    - duration: 500ms
      lights:
        (main_light): blue
        (hole_left): off
        (hole_right): off
    - duration: 500ms
      lights:
        (main_light): off
        (hole_left): off
        (hole_right): off

  saucer_cluster_state_2:
    - duration: 350ms
      lights:
        (main_light): blue
        (hole_left): white
        (hole_right): white
    - duration: 350ms
      lights:
        (main_light): off
        (hole_left): off
        (hole_right): off

  saucer_cluster_state_3:
    - duration: 250ms
      lights:
        (main_light): green
        (hole_left): white
        (hole_right): white
    - duration: 250ms
      lights:
        (main_light): off
        (hole_left): off
        (hole_right): off

  saucer_cluster_state_4:
    - duration: 180ms
      lights:
        (main_light): green
        (hole_left): red
        (hole_right): red
    - duration: 180ms
      lights:
        (main_light): off
        (hole_left): off
        (hole_right): off

  saucer_cluster_state_5:
    - duration: 100ms
      lights:
        (main_light): white
        (hole_left): red
        (hole_right): red
    - duration: 100ms
      lights:
        (main_light): green
        (hole_left): off
        (hole_right): off
