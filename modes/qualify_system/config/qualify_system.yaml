  villain_qualify_drop_bank_reset_request:
    - drop_target_bank_dt_bank_left_reset

  s_left_drops_1_active:
    - villain_qualify_drop_1_hit

  s_left_drops_2_active:
    - villain_qualify_drop_2_hit

  s_left_drops_3_active:
    - villain_qualify_drop_3_hit

  s_star_rollover_active:
    - saucer_star_upgrade_hit

