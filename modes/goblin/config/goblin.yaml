#config_version=6

mode:
  start_events: start_mode_goblin
  stop_events:
    - goblin_mode_completed_summary
    - ball_ended
  code: goblin.Goblin
  priority: 500


multiballs:
  goblin_chaos_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 10s
    start_events: goblin_start_multiball
    stop_events:
      - goblin_mode_completed_summary
      - ball_ended

sound_player:
  goblin_flashing_shot_score:
    flockaway:
      action: play
      bus: effects

  goblin_solid_shot_score:
    quark_lose_petal:
      action: play
      bus: effects

  goblin_hold_started:
    phew2:
      action: play
      bus: voice


widget_player:
  mode_goblin_started:
    goblin:
      action: play

  goblin_mode_ended:
    goblin:
      action: remove

  mode_goblin_stopping:
    goblin:
      action: remove


shots:
  gob_right_drop_1:
    switch: s_right_drops_1
  gob_right_drop_2:
    switch: s_right_drops_2
  gob_right_drop_3:
    switch: s_right_drops_3
  gob_right_drop_4:
    switch: s_right_drops_4
  gob_right_drop_5:
    switch: s_right_drops_5

  gob_left_drop_1:
    switch: s_left_drops_1
  gob_left_drop_2:
    switch: s_left_drops_2
  gob_left_drop_3:
    switch: s_left_drops_3

  gob_upper_target_left:
    switch: s_upper_target_left
  gob_upper_target_center:
    switch: s_upper_target_center
  gob_upper_target_right:
    switch: s_upper_target_right

shot_groups:
  gob_right_drops:
    shots: gob_right_drop_1, gob_right_drop_2, gob_right_drop_3, gob_right_drop_4, gob_right_drop_5

  gob_left_drops:
    shots: gob_left_drop_1, gob_left_drop_2, gob_left_drop_3

  gob_upper_targets:
    shots: gob_upper_target_left, gob_upper_target_center, gob_upper_target_right


event_player:
  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  # real playfield input -> Python shot events
  s_left_web_target_active: goblin_left_web_hit
  s_web_target_top_active: goblin_right_web_hit
  s_web_spinner_active: goblin_spinner_hit
  gob_left_drops_hit: goblin_left_drops_hit
  gob_right_drops_hit: goblin_right_drops_hit
  s_trispinner_opto_active: goblin_upper_spinner_hit
  gob_upper_targets_hit: goblin_upper_target_hit

  # Saucers stabilize chaos and hold/eject from Python.
  # These use separate events to avoid relying on parameterized event_player syntax.
  s_saucer_1_active: goblin_saucer_1_hit
  s_saucer_2_active: goblin_saucer_2_hit
  s_saucer_3_active: goblin_saucer_3_hit

show_player:

  goblin_flashing_shot_score:
    goblin_gi_red_flash_show:
      loops: 2

  goblin_solid_shot_score:
    goblin_gi_green_flash_show:
      loops: 2

  mode_goblin_started:
    goblin_mode_start_show:
      loops: 0

  goblin_lite_left_web:
    goblin_left_web_flash_show:
      loops: -1
  goblin_lite_right_web:
    goblin_right_web_flash_show:
      loops: -1
  goblin_lite_spinner:
    goblin_spinner_flash_show:
      loops: -1
  goblin_lite_left_drops:
    goblin_left_drops_flash_show:
      loops: -1
  goblin_lite_right_drops:
    goblin_right_drops_flash_show:
      loops: -1
  goblin_lite_upper_spinner:
    goblin_upper_spinner_flash_show:
      loops: -1
  goblin_lite_saucers:
    goblin_saucers_flash_show:
      loops: -1
  goblin_lite_upper_target:
    goblin_upper_target_flash_show:
      loops: -1

  goblin_solid_left_web:
    goblin_left_web_solid_show:
      loops: -1
  goblin_solid_right_web:
    goblin_right_web_solid_show:
      loops: -1
  goblin_solid_spinner:
    goblin_spinner_solid_show:
      loops: -1
  goblin_solid_left_drops:
    goblin_left_drops_solid_show:
      loops: -1
  goblin_solid_right_drops:
    goblin_right_drops_solid_show:
      loops: -1
  goblin_solid_upper_spinner:
    goblin_upper_spinner_solid_show:
      loops: -1
  goblin_solid_saucers:
    goblin_saucers_solid_show:
      loops: -1
  goblin_solid_upper_target:
    goblin_upper_target_solid_show:
      loops: -1

  goblin_stop_left_web:
    goblin_left_web_flash_show:
      action: stop
    goblin_left_web_solid_show:
      action: stop

  goblin_stop_right_web:
    goblin_right_web_flash_show:
      action: stop
    goblin_right_web_solid_show:
      action: stop

  goblin_stop_spinner:
    goblin_spinner_flash_show:
      action: stop
    goblin_spinner_solid_show:
      action: stop

  goblin_stop_left_drops:
    goblin_left_drops_flash_show:
      action: stop
    goblin_left_drops_solid_show:
      action: stop

  goblin_stop_right_drops:
    goblin_right_drops_flash_show:
      action: stop
    goblin_right_drops_solid_show:
      action: stop

  goblin_stop_upper_spinner:
    goblin_upper_spinner_flash_show:
      action: stop
    goblin_upper_spinner_solid_show:
      action: stop

  goblin_stop_saucers:
    goblin_saucers_flash_show:
      action: stop
    goblin_saucers_solid_show:
      action: stop

  goblin_stop_upper_target:
    goblin_upper_target_flash_show:
      action: stop
    goblin_upper_target_solid_show:
      action: stop

  goblin_mode_ended:
    goblin_left_web_flash_show:
      action: stop
    goblin_right_web_flash_show:
      action: stop
    goblin_spinner_flash_show:
      action: stop
    goblin_left_drops_flash_show:
      action: stop
    goblin_right_drops_flash_show:
      action: stop
    goblin_upper_spinner_flash_show:
      action: stop
    goblin_saucers_flash_show:
      action: stop
    goblin_upper_target_flash_show:
      action: stop
    goblin_left_web_solid_show:
      action: stop
    goblin_right_web_solid_show:
      action: stop
    goblin_spinner_solid_show:
      action: stop
    goblin_left_drops_solid_show:
      action: stop
    goblin_right_drops_solid_show:
      action: stop
    goblin_upper_spinner_solid_show:
      action: stop
    goblin_saucers_solid_show:
      action: stop
    goblin_upper_target_solid_show:
      action: stop


shows:

  goblin_left_web_flash_show:
    - duration: 120ms
      lights:
        l_left_web_target: yellow
    - duration: 120ms
      lights:
        l_left_web_target: green

  goblin_right_web_flash_show:
    - duration: 120ms
      lights:
        l_mid_spider_target: yellow
    - duration: 120ms
      lights:
        l_mid_spider_target: green

  goblin_spinner_flash_show:
    - duration: 120ms
      lights:
        l_spinner: yellow
    - duration: 120ms
      lights:
        l_spinner: green

  goblin_left_drops_flash_show:
    - duration: 120ms
      lights:
        l_3bankbonus: yellow
    - duration: 120ms
      lights:
        l_3bankbonus: green

  goblin_right_drops_flash_show:
    - duration: 120ms
      lights:
        l_5bank_1: yellow
        l_5bank_2: yellow
        l_5bank_3: yellow
        l_5bank_4: yellow
        l_5bank_5: yellow
    - duration: 120ms
      lights:
        l_5bank_1: green
        l_5bank_2: green
        l_5bank_3: green
        l_5bank_4: green
        l_5bank_5: green

  goblin_upper_spinner_flash_show:
    - duration: 120ms
      lights:
        l_gi_a: yellow
    - duration: 120ms
      lights:
        l_gi_a: green

  goblin_saucers_flash_show:
    - duration: 120ms
      lights:
        l_1_hole_l: D08080
        l_1: D08080
        l_1_hole_r: D08080
        l_2_hole_l: D08080
        l_2: D08080
        l_2_hole_r: D08080
        l_3_hole_l: D08080
        l_3: D08080
        l_3_hole_r: D08080
    - duration: 120ms
      lights:
        l_1_hole_l: red
        l_1: red
        l_1_hole_r: red
        l_2_hole_l: red
        l_2: red
        l_2_hole_r: red
        l_3_hole_l: red
        l_3: red
        l_3_hole_r: red

  goblin_upper_target_flash_show:
    - duration: 120ms
      lights:
        l_upper_left: yellow
        l_upper_middle: yellow
        l_upper_right: yellow
    - duration: 120ms
      lights:
        l_upper_left: green
        l_upper_middle: green
        l_upper_right: green

  goblin_left_web_solid_show:
    - duration: -1
      lights:
        l_left_web_target: green

  goblin_right_web_solid_show:
    - duration: -1
      lights:
        l_mid_spider_target: green

  goblin_spinner_solid_show:
    - duration: -1
      lights:
        l_spinner: green

  goblin_left_drops_solid_show:
    - duration: -1
      lights:
        l_3bankbonus: green

  goblin_right_drops_solid_show:
    - duration: -1
      lights:
        l_5bank_1: green
        l_5bank_2: green
        l_5bank_3: green
        l_5bank_4: green
        l_5bank_5: green

  goblin_upper_spinner_solid_show:
    - duration: -1
      lights:
        l_gi_a: green

  goblin_saucers_solid_show:
    - duration: -1
      lights:
        l_1_hole_l: green
        l_1: green
        l_1_hole_r: green
        l_2_hole_l: green
        l_2: green
        l_2_hole_r: green
        l_3_hole_l: green
        l_3: green
        l_3_hole_r: green

  goblin_upper_target_solid_show:
    - duration: -1
      lights:
        l_upper_left: green
        l_upper_middle: green
        l_upper_right: green        

  goblin_mode_start_show:
    - duration: -1
      lights:
        gi: green

  goblin_gi_red_flash_show:
    - duration: 200ms
      lights:
        gi: red
    - duration: 200ms
      lights:
        gi: yellow

  goblin_gi_green_flash_show:
    - duration: 200ms
      lights:
        gi: green
    - duration: 200ms
      lights:
        gi: yellow
