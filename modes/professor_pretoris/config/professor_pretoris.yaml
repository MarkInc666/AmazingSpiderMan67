#config_version=6
mode:
  start_events: start_mode_professor_pretoris
  stop_events:
    - professor_pretoris_mode_complete
    - professor_pretoris_mode_completed_summary
    - ball_ended
  code: professor_pretoris.ProfessorPretoris
  priority: 300

widget_player:
  mode_professor_pretoris_started:
    professor_pretoris:
      action: play
  professor_pretoris_mode_complete:
    professor_pretoris:
      action: remove
  mode_professor_pretoris_stopping:
    professor_pretoris:
      action: remove

event_player:
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset
  mode_professor_pretoris_started:
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
  mode_professor_pretoris_stopping:
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

light_player:
  professor_pretoris_flood_started:
    gi: red
  professor_pretoris_band_1_blue:
    l_gi_right_return: blue
    l_gi_left_sling_lower: blue
    l_gi_right_sling: blue
    l_gi_left_sling_upper: blue
    l_gi_left_upper_flipper: blue
    l_gi_right_lower_triangle: blue
  professor_pretoris_band_2_blue:
    l_gi_5bank_lower: blue
    l_gi_3bank: blue
    l_gi_5bank_upper: blue
    l_gi_left_lower: blue
    l_gi_spinner: blue
    l_pop_2_6: blue
  professor_pretoris_band_3_blue:
    l_gi_left_upper: blue
    l_pop_2_7: blue
    l_pop_2_5: blue
    l_pop_1_6: blue
    l_pop_1_5: blue
    l_pop_1_7: blue
  professor_pretoris_band_4_blue:
    l_pop_2_8: blue
    l_pop_1_4: blue
    l_pop_1_8: blue
    l_pop_2_4: blue
    l_pop_2_9: blue
  professor_pretoris_band_5_blue:
    l_pop_1_9: blue
    l_pop_1_3: blue
    l_pop_2_3: blue
    l_pop_2_10: blue
    l_pop_1_2: blue
    l_pop_1_10: blue
  professor_pretoris_band_6_blue:
    l_pop_2_2: blue
    l_pop_2_11: blue
    l_pop_1_11: blue
    l_pop_1_1: blue
    l_pop_1_12: blue
    l_pop_2_1: blue
  professor_pretoris_band_7_blue:
    l_pop_2_12: blue
    l_gi_upflip: blue
    l_gi_ramp: blue
    l_gi_bright: blue
    l_gi_ab: blue
    l_gi_a: blue
  professor_pretoris_band_8_blue:
    l_gi_mid_spider: blue
    l_gi_top_4: blue
    l_gi_top_3: blue
    l_gi_top_1: blue
    l_gi_top_2: blue
  professor_pretoris_clear_lights:
    l_spinner: off
    l_mid_web_target: off
    l_left_web_target: off
    gi: E0E0E0

show_player:
  professor_pretoris_flood_started:
    professor_pretoris_spinner_blue_flash:
      loops: -1
  professor_pretoris_main_super_ready:
    professor_pretoris_spinner_blue_flash:
      action: stop
    professor_pretoris_center_super_purple_flash:
      loops: -1
  professor_pretoris_main_super_collected:
    professor_pretoris_center_super_purple_flash:
      action: stop
  professor_pretoris_main_super_expired:
    professor_pretoris_center_super_purple_flash:
      action: stop
  professor_pretoris_overflow_super_ready:
    professor_pretoris_left_super_purple_flash:
      loops: -1
  professor_pretoris_overflow_super_collected:
    professor_pretoris_left_super_purple_flash:
      action: stop
  professor_pretoris_overflow_super_expired:
    professor_pretoris_left_super_purple_flash:
      action: stop
  mode_professor_pretoris_stopping:
    professor_pretoris_spinner_blue_flash:
      action: stop
    professor_pretoris_center_super_purple_flash:
      action: stop
    professor_pretoris_left_super_purple_flash:
      action: stop

shows:
  professor_pretoris_spinner_blue_flash:
    - duration: 250ms
      lights:
        l_spinner: blue
    - duration: 250ms
      lights:
        l_spinner: off

  professor_pretoris_center_super_purple_flash:
    - duration: 200ms
      lights:
        l_mid_web_target: purple
        gi: 6030A0
    - duration: 200ms
      lights:
        l_mid_web_target: off
        gi: blue

  professor_pretoris_left_super_purple_flash:
    - duration: 200ms
      lights:
        l_left_web_target: purple
        gi: 6030A0
    - duration: 200ms
      lights:
        l_left_web_target: off
        gi: blue
