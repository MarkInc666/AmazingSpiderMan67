#config_version=6

# Pod placeholder villain mode.
# Mode idea: Pods roll between upper targets; hit active pod to stop spread and light saucer.

mode:
  start_events: start_mode_pod
  stop_events:
    - pod_mode_complete
    - pod_mode_failed
    - pod_mode_completed_summary
    - ball_ended
  code: pod.Pod
  priority: 300

widget_player:
  mode_pod_started:
    pod:
      action: play

  pod_mode_complete:
    pod:
      action: remove

  pod_mode_failed:
    pod:
      action: remove

  mode_pod_stopping:
    pod:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: pod_shot_hit
  s_pop_right_active: pod_shot_hit
  s_trispinner_opto_active: pod_shot_hit
  s_web_spinner_active: pod_shot_hit
  s_star_rollover_active: pod_shot_hit
  s_upper_target_left_active: pod_shot_hit
  s_upper_target_center_active: pod_shot_hit
  s_upper_target_right_active: pod_shot_hit

  s_left_drops_1_active: pod_shot_hit
  s_left_drops_2_active: pod_shot_hit
  s_left_drops_3_active: pod_shot_hit
  s_right_drops_1_active: pod_shot_hit
  s_right_drops_2_active: pod_shot_hit
  s_right_drops_3_active: pod_shot_hit
  s_right_drops_4_active: pod_shot_hit
  s_right_drops_5_active: pod_shot_hit

  s_saucer_1_active:
    - pod_major_hit
    - clear_saucers
  s_saucer_2_active:
    - pod_major_hit
    - clear_saucers
  s_saucer_3_active:
    - pod_major_hit
    - clear_saucers
  s_vuk_switch_active: pod_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_pod_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_pod_stopping:
    - clear_saucers
