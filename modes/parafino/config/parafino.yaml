#config_version=6

mode:
  start_events: start_mode_parafino
  stop_events:
    - parafino_mode_complete
    - parafino_mode_failed
    - parafino_mode_completed_summary
    - ball_ended
  priority: 800
  code: parafino.Parafino

variable_player:

  multiball_parafino_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_parafino_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

multiballs:
  parafino_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 20s
    start_events: parafino_start_multiball
    add_a_ball_events:
      - parafino_add_a_ball
    add_a_ball_shoot_again: 10s
    add_a_ball_hurry_up_time: 3s
    stop_events:
      - parafino_stop_multiball

event_player:
  parafino_startup_complete:
    - parafino_setup
    - parafino_start_multiball|1s

  parafino_setup:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - parafino_clear_all_lights
    - parafino_mode_intro
    - rooftop_diverter_close

  multiball_parafino_multiball_ended:
    - parafino_multiball_ended

  mode_parafino_stopping:
    - parafino_clear_all_lights
    - clear_saucers
    - rooftop_diverter_close


widget_player:
  mode_parafino_started:
    parafino:
      action: play

  parafino_mode_completed_summary:
    parafino:
      action: remove

  xparafino_mode_intro:
    parafino_intro:
      action: play
      expire: 5s

  xparafino_jackpot_lit:
    parafino_jackpot_lit:
      action: play
      expire: 3s

  xparafino_jackpot_collected:
    parafino_jackpot_collected:
      action: play
      expire: 3s

show_player:

  parafino_clear_all_lights:
    parafino_left_jackpot_show:
      action: stop
    parafino_pops_jackpot_show:
      action: stop
    parafino_right_jackpot_show:
      action: stop
    parafino_saucer_1_add_ball_show:
      action: stop
    parafino_saucer_2_add_ball_show:
      action: stop
    parafino_saucer_3_add_ball_show:
      action: stop

  parafino_left_jackpot_lit:
    parafino_left_jackpot_show:
      action: play
      loops: -1
      speed: 3

  parafino_pops_jackpot_lit:
    parafino_pops_jackpot_show:
      action: play
      loops: -1
      speed: 3

  parafino_right_jackpot_lit:
    parafino_right_jackpot_show:
      action: play
      loops: -1
      speed: 3

  parafino_saucer_1_add_ball_lit:
    parafino_saucer_1_add_ball_show:
      action: play
      loops: -1
      speed: 4

  parafino_saucer_2_add_ball_lit:
    parafino_saucer_2_add_ball_show:
      action: play
      loops: -1
      speed: 4

  parafino_saucer_3_add_ball_lit:
    parafino_saucer_3_add_ball_show:
      action: play
      loops: -1
      speed: 4

  parafino_saucer_1_reset:
    parafino_left_jackpot_show:
      action: stop
    parafino_saucer_1_add_ball_show:
      action: stop

  parafino_saucer_2_reset:
    parafino_pops_jackpot_show:
      action: stop
    parafino_saucer_2_add_ball_show:
      action: stop

  parafino_saucer_3_reset:
    parafino_right_jackpot_show:
      action: stop
    parafino_saucer_3_add_ball_show:
      action: stop

  parafino_clear_jackpot_lights:
    parafino_left_jackpot_show:
      action: stop
    parafino_pops_jackpot_show:
      action: stop
    parafino_right_jackpot_show:
      action: stop
    parafino_saucer_1_add_ball_show:
      action: stop
    parafino_saucer_2_add_ball_show:
      action: stop
    parafino_saucer_3_add_ball_show:
      action: stop

shows:

  parafino_left_jackpot_show:
    - duration: 200ms
      lights:
        l_3bankbonus: red
        l_1_hole_l: green
        l_1_hole_r: green
    - duration: 200ms
      lights:
        l_3bankbonus: off
        l_1_hole_l: green
        l_1_hole_r: green

  parafino_pops_jackpot_show:
    - duration: 200ms
      lights:
        l_pop_1_1: red
        l_pop_1_2: red
        l_pop_1_3: red
        l_pop_1_4: red
        l_pop_1_5: red
        l_pop_1_6: red
        l_pop_1_7: red
        l_pop_1_8: red
        l_pop_1_9: red
        l_pop_1_10: red
        l_pop_1_11: red
        l_pop_1_12: red
        l_pop_2_1: red
        l_pop_2_2: red
        l_pop_2_3: red
        l_pop_2_4: red
        l_pop_2_5: red
        l_pop_2_6: red
        l_pop_2_7: red
        l_pop_2_8: red
        l_pop_2_9: red
        l_pop_2_10: red
        l_pop_2_11: red
        l_pop_2_12: red
        l_2_hole_l: green
        l_2_hole_r: green
    - duration: 200ms
      lights:
        l_pop_1_1: off
        l_pop_1_2: off
        l_pop_1_3: off
        l_pop_1_4: off
        l_pop_1_5: off
        l_pop_1_6: off
        l_pop_1_7: off
        l_pop_1_8: off
        l_pop_1_9: off
        l_pop_1_10: off
        l_pop_1_11: off
        l_pop_1_12: off
        l_pop_2_1: off
        l_pop_2_2: off
        l_pop_2_3: off
        l_pop_2_4: off
        l_pop_2_5: off
        l_pop_2_6: off
        l_pop_2_7: off
        l_pop_2_8: off
        l_pop_2_9: off
        l_pop_2_10: off
        l_pop_2_11: off
        l_pop_2_12: off
        l_2_hole_l: green
        l_2_hole_r: green

  parafino_right_jackpot_show:
    - duration: 200ms
      lights:
        l_5bank_1: red
        l_5bank_2: red
        l_5bank_3: red
        l_5bank_4: red
        l_5bank_5: red
        l_3_hole_l: green
        l_3_hole_r: green
    - duration: 200ms
      lights:
        l_5bank_1: off
        l_5bank_2: off
        l_5bank_3: off
        l_5bank_4: off
        l_5bank_5: off
        l_3_hole_l: green
        l_3_hole_r: green

  parafino_saucer_1_add_ball_show:
    - duration: 150ms
      lights:
        l_1: white
    - duration: 150ms
      lights:
        l_1: off

  parafino_saucer_2_add_ball_show:
    - duration: 150ms
      lights:
        l_2: white
    - duration: 150ms
      lights:
        l_2: off

  parafino_saucer_3_add_ball_show:
    - duration: 150ms
      lights:
        l_3: white
    - duration: 150ms
      lights:
        l_3: off
