#config_version=6

mode:
  start_events: ball_started
  priority: 90



extra_balls:
  mystery_extra_ball:
    group: main_extra_ball_group


slide_player:
  mystery_extra_ball_lit:
    extra_ball:
      expire: 5s
      priority: 1000
      action: play

  mystery_extra_ball_award:
    extra_ball:
      expire: 5s
      priority: 1000
      action: play


event_player:
 
  #directly from bugle
  mystery_award_award_extra_ball:
    - mystery_extra_ball_award

  #light the eb at left bank
  mystery_award_light_extra_ball:
    - mystery_extra_ball_lit

  #left bank complete when lit
  drop_target_bank_dt_bank_left_down{device.extra_balls.mystery_extra_ball.enabled}:
    - mystery_extra_ball_award



variable_player:
  #if points instead of eb - TODO - call this from somewhere else
  extra_ball_award_million_points:
    score: 1000000

  mystery_award_award_extra_ball:  
    extra_ball_text:
      action: set
      string: "COLLECTED"

  mystery_award_light_extra_ball:
    extra_ball_text:
      action: set
      string: "IS LIT"



show_player:

  mystery_extra_ball_lit:
    extra_ball_lit_show:
      loops: -1

  mystery_extra_ball_award:
    extra_ball_lit_show:
      action: stop
    extra_ball_collect_gi_show:
      loops: 4
    extra_ball_award_show:
      loops: 1

#todo:  flash shoot again light during goblin, vulture, parafino MBs  - find events from logs

  ball_save_default_ball_save_enabled:
    shoot_again_flash:
      loops: -1

  ball_save_default_ball_save_hurry_up:
    shoot_again_fast_flash:
      loops: -1

  ball_save_default_ball_save_disabled:
    shoot_again_flash:
      action: stop
    shoot_again_fast_flash:
      action: stop

  ball_save_mystery_ball_save_enabled:
    shoot_again_flash:
      loops: -1

  ball_save_mystery_ball_save_hurry_up:
    shoot_again_fast_flash:
      loops: -1

  ball_save_mystery_ball_save_disabled:
    shoot_again_flash:
      action: stop
    shoot_again_fast_flash:
      action: stop


shows:
  shoot_again_fast_flash:
    - duration: 250ms
      lights:
        l_shoot_again: white
    - duration: 250ms
      lights:
        l_shoot_again: off     

  shoot_again_flash:
    - duration: 500ms
      lights:
        l_shoot_again: white
    - duration: 500ms
      lights:
        l_shoot_again: off     
      
  extra_ball_collect_gi_show:
    - duration: 250ms
      lights:
        gi: white
    - duration: 250ms
      lights:
        gi: blue

  extra_ball_lit_show:
    - duration: 200ms
      lights:
        l_extraball: white
    - duration: 200ms
      lights:
        l_extraball: blue

  extra_ball_award_show:
    - duration: -1
      lights:
        l_shoot_again: white
        gi: white
        
