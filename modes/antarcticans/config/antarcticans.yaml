#config_version=6

# Executioner of Paris Robot placeholder villain mode.
# Mode idea: A countdown threatens jackpot value; hit rescue shots to delay and cash.

mode:
  start_events: start_mode_antarcticans
  stop_events:
    - antarcticans_mode_complete
    - antarcticans_mode_completed_summary
    - ball_ended
  code: antarcticans.Antarcticans
  priority: 300

widget_player:
  mode_antarcticans_started:
    antarcticans:
      action: play

  antarcticans_mode_complete:
    antarcticans:
      action: remove

  mode_antarcticans_stopping:
    antarcticans:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: antarcticans_shot_hit
  s_pop_right_active: antarcticans_shot_hit
  s_trispinner_opto_active: antarcticans_shot_hit
  s_web_spinner_active: antarcticans_shot_hit
  s_star_rollover_active: antarcticans_shot_hit
  s_upper_target_left_active: antarcticans_shot_hit
  s_upper_target_center_active: antarcticans_shot_hit
  s_upper_target_right_active: antarcticans_shot_hit

  s_left_drops_1_active: antarcticans_shot_hit
  s_left_drops_2_active: antarcticans_shot_hit
  s_left_drops_3_active: antarcticans_shot_hit
  s_right_drops_1_active: antarcticans_shot_hit
  s_right_drops_2_active: antarcticans_shot_hit
  s_right_drops_3_active: antarcticans_shot_hit
  s_right_drops_4_active: antarcticans_shot_hit
  s_right_drops_5_active: antarcticans_shot_hit

  s_saucer_1_active:
    - antarcticans_major_hit
    - clear_saucers
  s_saucer_2_active:
    - antarcticans_major_hit
    - clear_saucers
  s_saucer_3_active:
    - antarcticans_major_hit
    - clear_saucers
  s_vuk_switch_active: antarcticans_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_antarcticans_started:
    - rooftop_diverter_open|500ms
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

