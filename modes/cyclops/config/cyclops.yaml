#config_version=6

# Cyclops - Eye of Doom
# Limited-flips monster mode.
# Center web target is the Cyclops Eye.
# Drop targets add flips. Banks reset when all drops in that bank are down.
# Case files adjust the flip budget, jackpot cap, safety net, extra Eye jackpot,
# and drop-bank assist.

mode:
  start_events: start_mode_cyclops
  stop_events:
    - cyclops_mode_complete
    - cyclops_mode_completed_summary
    - ball_ended
  code: cyclops.Cyclops
  priority: 300


widget_player:
  mode_cyclops_started:
    cyclops:
      action: play

  cyclops_mode_complete:
    cyclops:
      action: remove

  mode_cyclops_stopping:
    cyclops:
      action: remove


event_player:
  # The center web target is the Cyclops Eye.
  s_web_target_mid_active:
    - cyclops_eye_hit

  # Every drop switch adds flips. Bank-down events reset the physical banks.
  s_left_drops_1_active:
    - cyclops_left_drop_1_hit
  s_left_drops_2_active:
    - cyclops_left_drop_2_hit
  s_left_drops_3_active:
    - cyclops_left_drop_3_hit

  s_right_drops_1_active:
    - cyclops_right_drop_1_hit
  s_right_drops_2_active:
    - cyclops_right_drop_2_hit
  s_right_drops_3_active:
    - cyclops_right_drop_3_hit
  s_right_drops_4_active:
    - cyclops_right_drop_4_hit
  s_right_drops_5_active:
    - cyclops_right_drop_5_hit


  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset


  # Cyclops does not use saucers during gameplay; kick out any ball that lands there.
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers

  mode_cyclops_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - cyclops_eye_lit

  mode_cyclops_stopping:
    - clear_saucers
    - cyclops_eye_unlit



coil_player:
  cyclops_shot_assist_left_bank:
    c_left_bank_drop_1:
      action: pulse
    c_left_bank_drop_2:
      action: pulse
    c_left_bank_drop_3:
      action: pulse

  cyclops_shot_assist_right_bank:
    c_right_bank_drop_1:
      action: pulse
    c_right_bank_drop_2:
      action: pulse
    c_right_bank_drop_3:
      action: pulse
    c_right_bank_drop_4:
      action: pulse
    c_right_bank_drop_5:
      action: pulse

show_player:
  cyclops_eye_lit:
    cyclops_eye_lit_show:
      loops: -1

  cyclops_eye_unlit:
    cyclops_eye_lit_show:
      action: stop

  cyclops_mode_complete:
    cyclops_eye_lit_show:
      action: stop

  mode_cyclops_stopping:
    cyclops_eye_lit_show:
      action: stop


shows:
  cyclops_eye_lit_show:
    - duration: 300ms
      lights:
        l_advance_multiplier: red
        l_mid_multibonus: off
        l_mid_web_target: off
    - duration: 300ms
      lights:
        l_advance_multiplier: off
        l_mid_multibonus: red
        l_mid_web_target: off
    - duration: 300ms
      lights:
        l_advance_multiplier: off
        l_mid_multibonus: off
        l_mid_web_target: red
