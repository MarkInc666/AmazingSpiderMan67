#config_version=6

# Cyclops - Eye of Doom
# Limited-flips monster mode.
# Center web target is the Cyclops Eye.
# Drop targets add flips. Case files adjust the flip budget, jackpot cap,
# safety net, extra Eye jackpot, and drop-bank assist.

mode:
  start_events: start_mode_cyclops
  stop_events:
    - cyclops_mode_complete
    - cyclops_mode_failed
    - cyclops_mode_completed_summary
    - ball_ended
  code: cyclops.Cyclops
  priority: 300


widget_player:
  mode_cyclops_started:
    cyclops:
      action: play

  cyclops_mode_complete:
    cyclops:
      action: remove

  cyclops_mode_failed:
    cyclops:
      action: remove

  mode_cyclops_stopping:
    cyclops:
      action: remove


event_player:
  # The center web target is the Cyclops Eye.
  s_web_target_top_active:
    - cyclops_eye_hit

  # Drop targets add flips. Python tracks unique drops and case-file assist.
  s_left_drops_1_active:
    - cyclops_left_drop_1_hit
  s_left_drops_2_active:
    - cyclops_left_drop_2_hit
  s_left_drops_3_active:
    - cyclops_left_drop_3_hit

  s_right_drops_1_active:
    - cyclops_right_drop_1_hit
  s_right_drops_2_active:
    - cyclops_right_drop_2_hit
  s_right_drops_3_active:
    - cyclops_right_drop_3_hit
  s_right_drops_4_active:
    - cyclops_right_drop_4_hit
  s_right_drops_5_active:
    - cyclops_right_drop_5_hit

  mode_cyclops_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - cyclops_eye_lit

  mode_cyclops_stopping:
    - clear_saucers
    - cyclops_eye_unlit


show_player:
  cyclops_eye_lit:
    cyclops_eye_lit_show:
      loops: -1

  cyclops_eye_unlit:
    cyclops_eye_lit_show:
      action: stop

  cyclops_mode_complete:
    cyclops_eye_lit_show:
      action: stop

  cyclops_mode_failed:
    cyclops_eye_lit_show:
      action: stop

  mode_cyclops_stopping:
    cyclops_eye_lit_show:
      action: stop


shows:
  cyclops_eye_lit_show:
    - duration: 250ms
      lights:
        l_mid_spider_target: yellow
    - duration: 250ms
      lights:
        l_mid_spider_target: off
