#config_version=6

# Cyclops placeholder villain mode.
# Gameplay notes:
# Cyclops Mode idea: Monster Island chapter. One-eye moving shot. Placeholder: common shots build progress; later gameplay should feature one roaming lit shot that moves after hits/misses.
#
# This is intentionally simple for now. Hardware events are mapped to
# generic Python events, and the Python mode handles score/state/summary.

mode:
  start_events: start_mode_cyclops
  stop_events:
    - cyclops_mode_complete
    - cyclops_mode_failed
    - cyclops_mode_completed_summary
    - ball_ended
  code: cyclops.Cyclops
  priority: 300


widget_player:
  mode_cyclops_started:
    cyclops:
      action: play

  cyclops_mode_complete:
    cyclops:
      action: remove

  cyclops_mode_failed:
    cyclops:
      action: remove

  mode_cyclops_stopping:
    cyclops:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: cyclops_shot_hit
  s_pop_right_active: cyclops_shot_hit
  s_trispinner_opto_active: cyclops_shot_hit
  s_web_spinner_active: cyclops_shot_hit
  s_star_rollover_active: cyclops_shot_hit
  s_upper_target_left_active: cyclops_shot_hit
  s_upper_target_center_active: cyclops_shot_hit
  s_upper_target_right_active: cyclops_shot_hit

  s_left_drops_1_active: cyclops_shot_hit
  s_left_drops_2_active: cyclops_shot_hit
  s_left_drops_3_active: cyclops_shot_hit
  s_right_drops_1_active: cyclops_shot_hit
  s_right_drops_2_active: cyclops_shot_hit
  s_right_drops_3_active: cyclops_shot_hit
  s_right_drops_4_active: cyclops_shot_hit
  s_right_drops_5_active: cyclops_shot_hit

  s_saucer_1_active:
    - cyclops_major_hit
    - clear_saucers
  s_saucer_2_active:
    - cyclops_major_hit
    - clear_saucers
  s_saucer_3_active:
    - cyclops_major_hit
    - clear_saucers
  s_vuk_switch_active: cyclops_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_cyclops_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_cyclops_stopping:
    - clear_saucers
