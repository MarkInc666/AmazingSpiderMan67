#config_version=6

# Mad Science Meltdown placeholder mini-wizard.
# Weird Science mini-wizard multiball.
# Temporary flow: intro -> 2-ball multiball -> MB end -> summary -> next chapter.

mode:
  start_events: start_mode_mad_science_meltdown
  stop_events:
    - stop_mode_mad_science_meltdown
    - ball_ended
  code: mad_science_meltdown.MadScienceMeltdown
  priority: 800

multiballs:
  mad_science_meltdown_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: mad_science_meltdown_start_multiball
    stop_events:
      - stop_mode_mad_science_meltdown

variable_player:
  multiball_mad_science_meltdown_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_mad_science_meltdown_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_mad_science_meltdown_started:
    mad_science_meltdown:
      action: play

  mad_science_meltdown_mode_complete:
    mad_science_meltdown:
      action: remove

  mode_mad_science_meltdown_stopping:
    mad_science_meltdown:
      action: remove

  stop_mode_mad_science_meltdown:
    mad_science_meltdown:
      action: remove

event_player:
  s_pop_left_active: mad_science_meltdown_shot_hit
  s_pop_right_active: mad_science_meltdown_shot_hit
  s_trispinner_opto_active: mad_science_meltdown_shot_hit
  s_web_spinner_active: mad_science_meltdown_shot_hit
  s_star_rollover_active: mad_science_meltdown_shot_hit
  s_upper_target_left_active: mad_science_meltdown_shot_hit
  s_upper_target_center_active: mad_science_meltdown_shot_hit
  s_upper_target_right_active: mad_science_meltdown_shot_hit
  s_left_drops_1_active: mad_science_meltdown_shot_hit
  s_left_drops_2_active: mad_science_meltdown_shot_hit
  s_left_drops_3_active: mad_science_meltdown_shot_hit
  s_right_drops_1_active: mad_science_meltdown_shot_hit
  s_right_drops_2_active: mad_science_meltdown_shot_hit
  s_right_drops_3_active: mad_science_meltdown_shot_hit
  s_right_drops_4_active: mad_science_meltdown_shot_hit
  s_right_drops_5_active: mad_science_meltdown_shot_hit
  s_saucer_1_active:
    mad_science_meltdown_shot_hit:
    delayed_kickout_saucer_1:
  s_saucer_2_active:
    mad_science_meltdown_shot_hit:
    delayed_kickout_saucer_2:
  s_saucer_3_active:
    mad_science_meltdown_shot_hit:
    delayed_kickout_saucer_3:
  s_vuk_switch_active:
    - mad_science_meltdown_shot_hit
    - up_kick|1.5s

  multiball_mad_science_meltdown_multiball_ended: mad_science_meltdown_complete_request

  mode_mad_science_meltdown_started:
    - disable_daily_bugle_mystery
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_mad_science_meltdown_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - clear_saucers_delayed

  # Keep mini-wizard drop banks playable after they are completed.
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset
