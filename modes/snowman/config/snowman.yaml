#config_version=6

# Snowman / The Snowmen placeholder villain mode.
# Mode idea: Snowmen freeze shots; thaw with spinner/upper shots before collecting jackpot.

mode:
  start_events: start_mode_snowman
  stop_events:
    - snowman_mode_complete
    - snowman_mode_completed_summary
    - ball_ended
  code: snowman.Snowman
  priority: 300

widget_player:
  mode_snowman_started:
    snowman:
      action: play

  snowman_mode_complete:
    snowman:
      action: remove

  mode_snowman_stopping:
    snowman:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: snowman_shot_hit
  s_pop_right_active: snowman_shot_hit
  s_trispinner_opto_active: snowman_shot_hit
  s_web_spinner_active: snowman_shot_hit
  s_star_rollover_active: snowman_shot_hit
  s_upper_target_left_active: snowman_shot_hit
  s_upper_target_center_active: snowman_shot_hit
  s_upper_target_right_active: snowman_shot_hit

  s_left_drops_1_active: snowman_shot_hit
  s_left_drops_2_active: snowman_shot_hit
  s_left_drops_3_active: snowman_shot_hit
  s_right_drops_1_active: snowman_shot_hit
  s_right_drops_2_active: snowman_shot_hit
  s_right_drops_3_active: snowman_shot_hit
  s_right_drops_4_active: snowman_shot_hit
  s_right_drops_5_active: snowman_shot_hit

  s_saucer_1_active:
    - snowman_major_hit
    - clear_saucers
  s_saucer_2_active:
    - snowman_major_hit
    - clear_saucers
  s_saucer_3_active:
    - snowman_major_hit
    - clear_saucers
  s_vuk_switch_active: snowman_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_snowman_started:
    - rooftop_diverter_open|500ms
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_snowman_stopping:
    - clear_saucers
