#config_version=6

# Fakir: Ruby Heist.
# 2-ball multiball. Saucers are fake rubies; a saucer hold opens the roof
# and reveals the real ruby at an upper target. Spinners build the current
# Ruby/Super value. Mode ends when Fakir multiball ends.

mode:
  start_events: start_mode_fakir
  stop_events:
    - fakir_mode_complete
    - fakir_mode_completed_summary
    - ball_ended
  code: fakir.Fakir
  priority: 500

multiballs:
  fakir_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 10s
    start_events: fakir_start_multiball
    stop_events:
      - fakir_mode_completed_summary
      - ball_ended

variable_player:
  multiball_fakir_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_fakir_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_fakir_started:
    fakir:
      action: play

  fakir_mode_complete:
    fakir:
      action: remove

  mode_fakir_stopping:
    fakir:
      action: remove

event_player:
  fakir_startup_complete:
    - disable_daily_bugle_mystery
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - fakir_restore_base_gi
    - fakir_start_multiball|1s

  multiball_fakir_multiball_ended:
    - fakir_multiball_ended

  s_saucer_1_active: fakir_saucer_1_hit
  s_saucer_2_active: fakir_saucer_2_hit
  s_saucer_3_active: fakir_saucer_3_hit

  s_web_spinner_active: fakir_spinner_hit
  s_trispinner_opto_active: fakir_spinner_hit

  s_upper_target_left_active: fakir_upper_left_hit
  s_upper_target_center_active: fakir_upper_center_hit
  s_upper_target_right_active: fakir_upper_right_hit

  # Daily Bugle VUK is disabled during the mode, so Fakir
  # must always eject the ball itself.
  s_vuk_switch_active:
    - up_kick|1.5s

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_fakir_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - fakir_all_lights_off
    - fakir_stop_all_gi
    - rooftop_diverter_close
    - clear_saucers

show_player:
  fakir_restore_base_gi:
    fakir_ruby_search_gi:
      action: stop
    fakir_ruby_jackpot_gi_flash:
      action: stop
    fakir_base_gi:
      loops: -1

  fakir_fake_ruby_locked:
    fakir_base_gi:
      action: stop
    fakir_ruby_jackpot_gi_flash:
      action: stop
    fakir_ruby_search_gi:
      loops: -1

  fakir_ruby_jackpot_collected:
    fakir_ruby_search_gi:
      action: stop
    fakir_base_gi:
      action: stop
    fakir_ruby_jackpot_gi_flash:
      loops: 1

  fakir_super_jackpot_collected:
    fakir_ruby_search_gi:
      action: stop
    fakir_base_gi:
      action: stop
    fakir_ruby_jackpot_gi_flash:
      loops: 1

  fakir_ruby_timer_expired:
    fakir_ruby_search_gi:
      action: stop
    fakir_base_gi:
      loops: -1

  fakir_stop_all_gi:
    fakir_base_gi:
      action: stop
    fakir_ruby_search_gi:
      action: stop
    fakir_ruby_jackpot_gi_flash:
      action: stop

light_player:
  fakir_all_targets_off:
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off

  fakir_all_lights_off:
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off
    l_1_hole_l: off
    l_1_hole_r: off
    l_2_hole_l: off
    l_2_hole_r: off
    l_3_hole_l: off
    l_3_hole_r: off

  fakir_real_ruby_left_lit:
    l_upper_left: FF4444

  fakir_real_ruby_center_lit:
    l_upper_middle: FF4444

  fakir_real_ruby_right_lit:
    l_upper_right: FF4444

  fakir_real_ruby_all_targets_lit:
    l_upper_left: FF4444
    l_upper_middle: FF4444
    l_upper_right: FF4444

  fakir_fake_ruby_locked:
    l_1_hole_l: FF8888
    l_1_hole_r: FF8888
    l_2_hole_l: FF8888
    l_2_hole_r: FF8888
    l_3_hole_l: FF8888
    l_3_hole_r: FF8888

shows:
  fakir_base_gi:
    - duration: 1s
      lights:
        gi: DDDDDD

  fakir_ruby_search_gi:
    - duration: 100ms
      lights:
        gi: FFFFFF
    - duration: 100ms
      lights:
        gi: FFDDDD
    - duration: 100ms
      lights:
        gi: FFAAAA
    - duration: 100ms
      lights:
        gi: FF8888
    - duration: 100ms
      lights:
        gi: FF4444
    - duration: 100ms
      lights:
        gi: FF8888
    - duration: 100ms
      lights:
        gi: FFAAAA
    - duration: 100ms
      lights:
        gi: FFDDDD

  fakir_ruby_jackpot_gi_flash:
    - duration: 100ms
      lights:
        gi: FFFFFF
    - duration: 100ms
      lights:
        gi: off
    - duration: 100ms
      lights:
        gi: FFFFFF
    - duration: 100ms
      lights:
        gi: off
    - duration: 100ms
      lights:
        gi: FFFFFF
    - duration: 100ms
      lights:
        gi: off
