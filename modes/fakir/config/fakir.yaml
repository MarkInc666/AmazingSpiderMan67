#config_version=6

# Fantastic Fakir: Illusion Puzzle.
# Three shots look identical. Spinner reveals which shot is real.

mode:
  start_events: start_mode_fakir
  stop_events:
    - fakir_mode_complete
    - fakir_mode_completed_summary
    - ball_ended
  code: fakir.Fakir
  priority: 300


widget_player:
  mode_fakir_started:
    fakir:
      action: play

  fakir_mode_complete:
    fakir:
      action: remove

  mode_fakir_stopping:
    fakir:
      action: remove

event_player:
  s_web_target_left_active: fakir_left_web_hit
  s_web_target_mid_active: fakir_center_web_hit

  # Either spinner reveals the current answer. The upper spinner may also be
  # one of the three hidden choices, so Python handles that special case.
  s_web_spinner_active: fakir_spinner_reveal
  s_trispinner_opto_active: fakir_spinner_switch

  s_upper_target_left_active: fakir_upper_target_left_hit
  s_upper_target_center_active: fakir_upper_target_center_hit
  s_upper_target_right_active: fakir_upper_target_right_hit

  s_left_drops_1_active: fakir_left_drops_hit
  s_left_drops_2_active: fakir_left_drops_hit
  s_left_drops_3_active: fakir_left_drops_hit

  s_right_drops_1_active: fakir_right_drops_hit
  s_right_drops_2_active: fakir_right_drops_hit
  s_right_drops_3_active: fakir_right_drops_hit
  s_right_drops_4_active: fakir_right_drops_hit
  s_right_drops_5_active: fakir_right_drops_hit

  s_pop_left_active: fakir_pops_hit
  s_pop_right_active: fakir_pops_hit

  # Daily Bugle VUK is disabled during the mode, so Fakir
  # must always eject the ball itself.
  s_vuk_switch_active:
    - up_kick|1.5s

  # Saucers are not Fakir choices, but they must still kick out.
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  fakir_startup_complete:
    - disable_daily_bugle_mystery
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_fakir_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - fakir_all_lights_off
    - clear_saucers


light_player:
  fakir_all_lights_off:
    l_left_web_target: off
    l_gi_a: off
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off
