#config_version=6

# DeVargas placeholder villain mode.
# Mode idea: Gold value moves between shots; collect trails then cash city jackpot.

mode:
  start_events: start_mode_the_fly
  stop_events:
    - the_fly_mode_complete
    - the_fly_mode_completed_summary
    - ball_ended
  code: the_fly.TheFly
  priority: 300

widget_player:
  mode_the_fly_started:
    the_fly:
      action: play

  the_fly_mode_complete:
    the_fly:
      action: remove

  mode_the_fly_stopping:
    the_fly:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: the_fly_shot_hit
  s_pop_right_active: the_fly_shot_hit
  s_trispinner_opto_active: the_fly_shot_hit
  s_web_spinner_active: the_fly_shot_hit
  s_star_rollover_active: the_fly_shot_hit
  s_upper_target_left_active: the_fly_shot_hit
  s_upper_target_center_active: the_fly_shot_hit
  s_upper_target_right_active: the_fly_shot_hit

  s_left_drops_1_active: the_fly_shot_hit
  s_left_drops_2_active: the_fly_shot_hit
  s_left_drops_3_active: the_fly_shot_hit
  s_right_drops_1_active: the_fly_shot_hit
  s_right_drops_2_active: the_fly_shot_hit
  s_right_drops_3_active: the_fly_shot_hit
  s_right_drops_4_active: the_fly_shot_hit
  s_right_drops_5_active: the_fly_shot_hit

  s_saucer_1_active:
    - the_fly_major_hit
    - clear_saucers
  s_saucer_2_active:
    - the_fly_major_hit
    - clear_saucers
  s_saucer_3_active:
    - the_fly_major_hit
    - clear_saucers
  s_vuk_switch_active: the_fly_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_the_fly_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
