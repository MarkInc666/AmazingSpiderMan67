#config_version=6

# The Fly — Rooftop Swarm.
# Saucers open the roof gate. Entering the upper playfield starts a limited-flip
# attempt to hit all three upper targets. Remaining flips boost the Super.

mode:
  start_events: start_mode_the_fly
  stop_events:
    - the_fly_mode_complete
    - the_fly_mode_completed_summary
    - ball_ended
  code: the_fly.TheFly
  priority: 300

widget_player:
  mode_the_fly_started:
    the_fly:
      action: play

  the_fly_mode_complete:
    the_fly:
      action: remove

  mode_the_fly_stopping:
    the_fly:
      action: remove

event_player:
  mode_the_fly_started:
    - disable_daily_bugle_mystery
    - rooftop_diverter_close
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_the_fly_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - cmd_upper_flippers_enable
    - rooftop_diverter_close
    - clear_saucers
    - the_fly_all_lights_off
    - the_fly_stop_all_shows

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

show_player:
  the_fly_target_left_needed:
    the_fly_upper_left_pulse:
      loops: -1
  the_fly_target_center_needed:
    the_fly_upper_center_pulse:
      loops: -1
  the_fly_target_right_needed:
    the_fly_upper_right_pulse:
      loops: -1

  the_fly_target_left_solid:
    the_fly_upper_left_pulse:
      action: stop
  the_fly_target_center_solid:
    the_fly_upper_center_pulse:
      action: stop
  the_fly_target_right_solid:
    the_fly_upper_right_pulse:
      action: stop

  the_fly_target_left_off:
    the_fly_upper_left_pulse:
      action: stop
  the_fly_target_center_off:
    the_fly_upper_center_pulse:
      action: stop
  the_fly_target_right_off:
    the_fly_upper_right_pulse:
      action: stop

  the_fly_targets_off:
    the_fly_upper_left_pulse:
      action: stop
    the_fly_upper_center_pulse:
      action: stop
    the_fly_upper_right_pulse:
      action: stop

  the_fly_all_lights_off:
    the_fly_upper_left_pulse:
      action: stop
    the_fly_upper_center_pulse:
      action: stop
    the_fly_upper_right_pulse:
      action: stop

  the_fly_stop_all_shows:
    the_fly_upper_left_pulse:
      action: stop
    the_fly_upper_center_pulse:
      action: stop
    the_fly_upper_right_pulse:
      action: stop

  the_fly_roof_attempt_complete:
    the_fly_roof_super_flash:
      loops: 2

light_player:
  the_fly_saucers_needed:
    l_1: green
    l_2: green
    l_3: green

  the_fly_saucers_off:
    l_1: off
    l_2: off
    l_3: off

  the_fly_target_left_solid:
    l_upper_left: white
  the_fly_target_center_solid:
    l_upper_middle: white
  the_fly_target_right_solid:
    l_upper_right: white

  the_fly_target_left_off:
    l_upper_left: off
  the_fly_target_center_off:
    l_upper_middle: off
  the_fly_target_right_off:
    l_upper_right: off

  the_fly_targets_off:
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off

  the_fly_all_lights_off:
    l_1: off
    l_2: off
    l_3: off
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off

shows:
  the_fly_upper_left_pulse:
    - duration: 100ms
      lights:
        l_upper_left: FFFFFF
    - duration: 100ms
      lights:
        l_upper_left: DDFF66
    - duration: 100ms
      lights:
        l_upper_left: AAFF00
    - duration: 100ms
      lights:
        l_upper_left: DDFF66

  the_fly_upper_center_pulse:
    - duration: 100ms
      lights:
        l_upper_middle: FFFFFF
    - duration: 100ms
      lights:
        l_upper_middle: DDFF66
    - duration: 100ms
      lights:
        l_upper_middle: AAFF00
    - duration: 100ms
      lights:
        l_upper_middle: DDFF66

  the_fly_upper_right_pulse:
    - duration: 100ms
      lights:
        l_upper_right: FFFFFF
    - duration: 100ms
      lights:
        l_upper_right: DDFF66
    - duration: 100ms
      lights:
        l_upper_right: AAFF00
    - duration: 100ms
      lights:
        l_upper_right: DDFF66

  the_fly_roof_super_flash:
    - duration: 100ms
      lights:
        l_upper_left: FFFFFF
        l_upper_middle: FFFFFF
        l_upper_right: FFFFFF
    - duration: 100ms
      lights:
        l_upper_left: off
        l_upper_middle: off
        l_upper_right: off
