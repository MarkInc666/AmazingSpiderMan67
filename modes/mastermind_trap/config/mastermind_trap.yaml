#config_version=6

# Mastermind Trap placeholder mini-wizard.
# Masterminds mini-wizard multiball.
# Temporary flow: intro -> 2-ball multiball -> MB end -> summary -> next chapter.

mode:
  start_events: start_mode_mastermind_trap
  stop_events:
    - stop_mode_mastermind_trap
    - ball_ended
  code: mastermind_trap.MastermindTrap
  priority: 800

multiballs:
  mastermind_trap_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: mastermind_trap_start_multiball
    stop_events:
      - stop_mode_mastermind_trap

variable_player:
  multiball_mastermind_trap_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_mastermind_trap_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_mastermind_trap_started:
    mastermind_trap:
      action: play

  mastermind_trap_mode_complete:
    mastermind_trap:
      action: remove

  mode_mastermind_trap_stopping:
    mastermind_trap:
      action: remove

  stop_mode_mastermind_trap:
    mastermind_trap:
      action: remove

event_player:
  s_pop_left_active: mastermind_trap_shot_hit
  s_pop_right_active: mastermind_trap_shot_hit
  s_trispinner_opto_active: mastermind_trap_shot_hit
  s_web_spinner_active: mastermind_trap_shot_hit
  s_star_rollover_active: mastermind_trap_shot_hit
  s_upper_target_left_active: mastermind_trap_shot_hit
  s_upper_target_center_active: mastermind_trap_shot_hit
  s_upper_target_right_active: mastermind_trap_shot_hit
  s_left_drops_1_active: mastermind_trap_shot_hit
  s_left_drops_2_active: mastermind_trap_shot_hit
  s_left_drops_3_active: mastermind_trap_shot_hit
  s_right_drops_1_active: mastermind_trap_shot_hit
  s_right_drops_2_active: mastermind_trap_shot_hit
  s_right_drops_3_active: mastermind_trap_shot_hit
  s_right_drops_4_active: mastermind_trap_shot_hit
  s_right_drops_5_active: mastermind_trap_shot_hit
  s_saucer_1_active:
    mastermind_trap_shot_hit:
    delayed_kickout_saucer_1:
  s_saucer_2_active:
    mastermind_trap_shot_hit:
    delayed_kickout_saucer_2:
  s_saucer_3_active:
    mastermind_trap_shot_hit:
    delayed_kickout_saucer_3:
  s_vuk_switch_active: mastermind_trap_shot_hit

  multiball_mastermind_trap_multiball_ended: mastermind_trap_complete_request

  mode_mastermind_trap_started:
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_mastermind_trap_stopping:
    - clear_saucers_delayed

  # Keep mini-wizard drop banks playable after they are completed.
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset
