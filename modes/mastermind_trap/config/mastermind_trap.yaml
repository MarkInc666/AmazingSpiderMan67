#config_version=6

# Mastermind Trap placeholder mini-wizard.
# Mode idea: Rotate through five villain traps. Completing a trap locks in a letter/area; final jackpot at saucer/VUK.

mode:
  start_events: start_mode_mastermind_trap
  stop_events:
    - stop_mode_mastermind_trap
    - mastermind_trap_mode_complete
    - mastermind_trap_mode_failed
    - ball_ended
  code: mastermind_trap.MastermindTrap
  priority: 800

widget_player:
  mode_mastermind_trap_started:
    mastermind_trap:
      action: play

  mastermind_trap_mode_complete:
    mastermind_trap:
      action: remove

  mastermind_trap_mode_failed:
    mastermind_trap:
      action: remove

  mode_mastermind_trap_stopping:
    mastermind_trap:
      action: remove

  stop_mode_mastermind_trap:
    mastermind_trap:
      action: remove

event_player:
  s_pop_left_active: mastermind_trap_shot_hit
  s_pop_right_active: mastermind_trap_shot_hit
  s_trispinner_opto_active: mastermind_trap_shot_hit
  s_web_spinner_active: mastermind_trap_shot_hit
  s_star_rollover_active: mastermind_trap_shot_hit
  s_upper_target_left_active: mastermind_trap_shot_hit
  s_upper_target_center_active: mastermind_trap_shot_hit
  s_upper_target_right_active: mastermind_trap_shot_hit
  s_left_drops_1_active: mastermind_trap_shot_hit
  s_left_drops_2_active: mastermind_trap_shot_hit
  s_left_drops_3_active: mastermind_trap_shot_hit
  s_right_drops_1_active: mastermind_trap_shot_hit
  s_right_drops_2_active: mastermind_trap_shot_hit
  s_right_drops_3_active: mastermind_trap_shot_hit
  s_right_drops_4_active: mastermind_trap_shot_hit
  s_right_drops_5_active: mastermind_trap_shot_hit

  s_vuk_switch_active: mastermind_trap_jackpot_hit

  mode_mastermind_trap_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_mastermind_trap_stopping:
    - clear_saucers
