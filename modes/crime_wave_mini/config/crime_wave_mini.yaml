#config_version=6

# Crime Wave placeholder mini-wizard.
# Crime Wave mini-wizard. 2-ball MB. Enforcers=drops, Ox=pops, Phantom=hidden shot, Foswell=Daily Bugle evidence, Blackwell=spinner escape. Collect all evidence to light Kingpin warning.

mode:
  start_events: start_mode_crime_wave_mini
  stop_events:
    - stop_mode_crime_wave_mini
    - ball_ended
  code: crime_wave_mini.CrimeWaveMini
  priority: 800

multiballs:
  crime_wave_mini_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: crime_wave_mini_start_multiball
    stop_events:
      - stop_mode_crime_wave_mini


event_player:
  s_pop_left_active: crime_wave_mini_shot_hit
  s_pop_right_active: crime_wave_mini_shot_hit
  s_trispinner_opto_active: crime_wave_mini_shot_hit
  s_web_spinner_active: crime_wave_mini_shot_hit
  s_star_rollover_active: crime_wave_mini_shot_hit
  s_upper_target_left_active: crime_wave_mini_shot_hit
  s_upper_target_center_active: crime_wave_mini_shot_hit
  s_upper_target_right_active: crime_wave_mini_shot_hit
  s_left_drops_1_active: crime_wave_mini_shot_hit
  s_left_drops_2_active: crime_wave_mini_shot_hit
  s_left_drops_3_active: crime_wave_mini_shot_hit
  s_right_drops_1_active: crime_wave_mini_shot_hit
  s_right_drops_2_active: crime_wave_mini_shot_hit
  s_right_drops_3_active: crime_wave_mini_shot_hit
  s_right_drops_4_active: crime_wave_mini_shot_hit
  s_right_drops_5_active: crime_wave_mini_shot_hit

  s_vuk_switch_active: crime_wave_mini_jackpot_hit

  multiball_crime_wave_mini_multiball_ended: crime_wave_mini_failed

  mode_crime_wave_mini_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_crime_wave_mini_stopping:
    - clear_saucers
