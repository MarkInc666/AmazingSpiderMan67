#config_version=6

# Time-Tossed Showdown placeholder mini-wizard.
# Mode idea: Complete time/outlaw trials to light final showdown. Limited flips make choices matter.

mode:
  start_events: start_mode_time_tossed_showdown
  stop_events:
    - stop_mode_time_tossed_showdown
    - ball_ended
  code: time_tossed_showdown.TimeTossedShowdown
  priority: 800

multiballs:
  time_tossed_showdown_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: time_tossed_showdown_start_multiball
    stop_events:
      - stop_mode_time_tossed_showdown


variable_player:

  multiball_time_tossed_showdown_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_time_tossed_showdown_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0


widget_player:
  mode_time_tossed_showdown_started:
    time_tossed_showdown:
      action: play

  time_tossed_showdown_mode_complete:
    time_tossed_showdown:
      action: remove

  time_tossed_showdown_mode_failed:
    time_tossed_showdown:
      action: remove

  mode_time_tossed_showdown_stopping:
    time_tossed_showdown:
      action: remove

  stop_mode_time_tossed_showdown:
    time_tossed_showdown:
      action: remove

event_player:
  s_pop_left_active: time_tossed_showdown_shot_hit
  s_pop_right_active: time_tossed_showdown_shot_hit
  s_trispinner_opto_active: time_tossed_showdown_shot_hit
  s_web_spinner_active: time_tossed_showdown_shot_hit
  s_star_rollover_active: time_tossed_showdown_shot_hit
  s_upper_target_left_active: time_tossed_showdown_shot_hit
  s_upper_target_center_active: time_tossed_showdown_shot_hit
  s_upper_target_right_active: time_tossed_showdown_shot_hit
  s_left_drops_1_active: time_tossed_showdown_shot_hit
  s_left_drops_2_active: time_tossed_showdown_shot_hit
  s_left_drops_3_active: time_tossed_showdown_shot_hit
  s_right_drops_1_active: time_tossed_showdown_shot_hit
  s_right_drops_2_active: time_tossed_showdown_shot_hit
  s_right_drops_3_active: time_tossed_showdown_shot_hit
  s_right_drops_4_active: time_tossed_showdown_shot_hit
  s_right_drops_5_active: time_tossed_showdown_shot_hit

  s_vuk_switch_active: time_tossed_showdown_jackpot_hit

  multiball_time_tossed_showdown_multiball_ended: time_tossed_showdown_failed

  mode_time_tossed_showdown_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_time_tossed_showdown_stopping:
    - clear_saucers
