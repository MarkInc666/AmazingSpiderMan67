#config_version=6

# Charles Cameo placeholder villain mode.
# Mode idea: Cameo copies another villain’s shot pattern; identify and shoot the fake.

mode:
  start_events: start_mode_charles_cameo
  stop_events:
    - charles_cameo_mode_complete
    - charles_cameo_mode_completed_summary
    - ball_ended
  code: charles_cameo.CharlesCameo
  priority: 300

widget_player:
  mode_charles_cameo_started:
    charles_cameo:
      action: play

  charles_cameo_mode_complete:
    charles_cameo:
      action: remove

  mode_charles_cameo_stopping:
    charles_cameo:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: charles_cameo_shot_hit
  s_pop_right_active: charles_cameo_shot_hit
  s_trispinner_opto_active: charles_cameo_shot_hit
  s_web_spinner_active: charles_cameo_shot_hit
  s_star_rollover_active: charles_cameo_shot_hit
  s_upper_target_left_active: charles_cameo_shot_hit
  s_upper_target_center_active: charles_cameo_shot_hit
  s_upper_target_right_active: charles_cameo_shot_hit

  s_left_drops_1_active: charles_cameo_shot_hit
  s_left_drops_2_active: charles_cameo_shot_hit
  s_left_drops_3_active: charles_cameo_shot_hit
  s_right_drops_1_active: charles_cameo_shot_hit
  s_right_drops_2_active: charles_cameo_shot_hit
  s_right_drops_3_active: charles_cameo_shot_hit
  s_right_drops_4_active: charles_cameo_shot_hit
  s_right_drops_5_active: charles_cameo_shot_hit

  s_saucer_1_active:
    - charles_cameo_major_hit
    - clear_saucers
  s_saucer_2_active:
    - charles_cameo_major_hit
    - clear_saucers
  s_saucer_3_active:
    - charles_cameo_major_hit
    - clear_saucers
  s_vuk_switch_active: charles_cameo_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_charles_cameo_started:
    - rooftop_diverter_open|500ms
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_charles_cameo_stopping:
    - clear_saucers

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_charles_cameo_started:
    gi: FF70B0

  mode_charles_cameo_stopping:
    gi: E0E0E0

