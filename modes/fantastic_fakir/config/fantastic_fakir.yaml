#config_version=6

# Fantastic Fakir placeholder villain mode.
# Mode idea: Fakir controls animals; hit rhythm shots in order to break control and light jackpot.

mode:
  start_events: start_mode_fantastic_fakir
  stop_events:
    - fantastic_fakir_mode_complete
    - fantastic_fakir_mode_failed
    - fantastic_fakir_mode_completed_summary
    - ball_ended
  code: fantastic_fakir.FantasticFakir
  priority: 300

widget_player:
  mode_fantastic_fakir_started:
    fantastic_fakir:
      action: play

  fantastic_fakir_mode_complete:
    fantastic_fakir:
      action: remove

  fantastic_fakir_mode_failed:
    fantastic_fakir:
      action: remove

  mode_fantastic_fakir_stopping:
    fantastic_fakir:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: fantastic_fakir_shot_hit
  s_pop_right_active: fantastic_fakir_shot_hit
  s_trispinner_opto_active: fantastic_fakir_shot_hit
  s_web_spinner_active: fantastic_fakir_shot_hit
  s_star_rollover_active: fantastic_fakir_shot_hit
  s_upper_target_left_active: fantastic_fakir_shot_hit
  s_upper_target_center_active: fantastic_fakir_shot_hit
  s_upper_target_right_active: fantastic_fakir_shot_hit

  s_left_drops_1_active: fantastic_fakir_shot_hit
  s_left_drops_2_active: fantastic_fakir_shot_hit
  s_left_drops_3_active: fantastic_fakir_shot_hit
  s_right_drops_1_active: fantastic_fakir_shot_hit
  s_right_drops_2_active: fantastic_fakir_shot_hit
  s_right_drops_3_active: fantastic_fakir_shot_hit
  s_right_drops_4_active: fantastic_fakir_shot_hit
  s_right_drops_5_active: fantastic_fakir_shot_hit

  s_saucer_1_active:
    - fantastic_fakir_major_hit
    - clear_saucers
  s_saucer_2_active:
    - fantastic_fakir_major_hit
    - clear_saucers
  s_saucer_3_active:
    - fantastic_fakir_major_hit
    - clear_saucers
  s_vuk_switch_active: fantastic_fakir_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_fantastic_fakir_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_fantastic_fakir_stopping:
    - clear_saucers
