#config_version=6

# DiamondSmugglers placeholder villain mode.
# Mode idea: DiamondSmugglers plays rhythm; hit shots in beat/order to build and collect sonic jackpot.

mode:
  start_events: start_mode_diamond_smugglers
  stop_events:
    - diamond_smugglers_mode_complete
    - diamond_smugglers_mode_completed_summary
    - ball_ended
  code: diamond_smugglers.DiamondSmugglers
  priority: 300

widget_player:
  mode_diamond_smugglers_started:
    diamond_smugglers:
      action: play

  diamond_smugglers_mode_complete:
    diamond_smugglers:
      action: remove

  mode_diamond_smugglers_stopping:
    diamond_smugglers:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: diamond_smugglers_shot_hit
  s_pop_right_active: diamond_smugglers_shot_hit
  s_trispinner_opto_active: diamond_smugglers_shot_hit
  s_web_spinner_active: diamond_smugglers_shot_hit
  s_star_rollover_active: diamond_smugglers_shot_hit
  s_upper_target_left_active: diamond_smugglers_shot_hit
  s_upper_target_center_active: diamond_smugglers_shot_hit
  s_upper_target_right_active: diamond_smugglers_shot_hit

  s_left_drops_1_active: diamond_smugglers_shot_hit
  s_left_drops_2_active: diamond_smugglers_shot_hit
  s_left_drops_3_active: diamond_smugglers_shot_hit
  s_right_drops_1_active: diamond_smugglers_shot_hit
  s_right_drops_2_active: diamond_smugglers_shot_hit
  s_right_drops_3_active: diamond_smugglers_shot_hit
  s_right_drops_4_active: diamond_smugglers_shot_hit
  s_right_drops_5_active: diamond_smugglers_shot_hit

  s_saucer_1_active:
    - diamond_smugglers_major_hit
    - clear_saucers
  s_saucer_2_active:
    - diamond_smugglers_major_hit
    - clear_saucers
  s_saucer_3_active:
    - diamond_smugglers_major_hit
    - clear_saucers
  s_vuk_switch_active: diamond_smugglers_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_diamond_smugglers_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_diamond_smugglers_stopping:
    - clear_saucers
