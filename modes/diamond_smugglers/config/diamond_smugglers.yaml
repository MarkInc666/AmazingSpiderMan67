#config_version=6

# Diamond Smugglers villain mode.
# Complete the right 5-bank to start a cycling saucer chase. Both drop banks
# build the Diamond Jackpot and reset when completed. Star rollover freezes the
# chase and lights all three saucers briefly.

mode:
  start_events: start_mode_diamond_smugglers
  stop_events:
    - diamond_smugglers_mode_complete
    - diamond_smugglers_mode_completed_summary
    - ball_ended
  code: diamond_smugglers.DiamondSmugglers
  priority: 300

widget_player:
  mode_diamond_smugglers_started:
    diamond_smugglers:
      action: play

  diamond_smugglers_mode_complete:
    diamond_smugglers:
      action: remove

  mode_diamond_smugglers_stopping:
    diamond_smugglers:
      action: remove

event_player:
  s_right_drops_1_active: diamond_smugglers_right_drop_hit
  s_right_drops_2_active: diamond_smugglers_right_drop_hit
  s_right_drops_3_active: diamond_smugglers_right_drop_hit
  s_right_drops_4_active: diamond_smugglers_right_drop_hit
  s_right_drops_5_active: diamond_smugglers_right_drop_hit

  s_left_drops_1_active: diamond_smugglers_left_drop_hit
  s_left_drops_2_active: diamond_smugglers_left_drop_hit
  s_left_drops_3_active: diamond_smugglers_left_drop_hit

  drop_target_bank_dt_bank_right_down:
    - diamond_smugglers_right_bank_complete

  drop_target_bank_dt_bank_left_down:
    - diamond_smugglers_left_bank_complete

  s_saucer_1_active: diamond_smugglers_saucer_1_hit
  s_saucer_2_active: diamond_smugglers_saucer_2_hit
  s_saucer_3_active: diamond_smugglers_saucer_3_hit

  s_star_rollover_active: diamond_smugglers_star_hit

  mode_diamond_smugglers_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - diamond_smugglers_clear_lights

  mode_diamond_smugglers_stopping:
    - diamond_smugglers_clear_lights

show_player:
  diamond_smugglers_build_phase_started:
    diamond_smugglers_right_bank_build:
      loops: -1
    diamond_smugglers_left_bank_build:
      loops: -1

  diamond_smugglers_saucer_chase_started:
    diamond_smugglers_right_bank_build:
      action: stop
    diamond_smugglers_left_bank_build:
      action: stop

  diamond_smugglers_saucer_1_lit:
    diamond_smugglers_saucer_1_lit_show:
      loops: -1

  diamond_smugglers_saucer_2_lit:
    diamond_smugglers_saucer_2_lit_show:
      loops: -1

  diamond_smugglers_saucer_3_lit:
    diamond_smugglers_saucer_3_lit_show:
      loops: -1

  diamond_smugglers_all_saucers_lit:
    diamond_smugglers_all_saucers_lit_show:
      loops: -1

  diamond_smugglers_wrong_saucer:
    diamond_smugglers_wrong_saucer_show:
      loops: 2

  diamond_smugglers_jackpot_collected:
    diamond_smugglers_all_saucers_lit_show:
      loops: 3

  diamond_smugglers_clear_saucer_lights:
    diamond_smugglers_saucer_1_lit_show:
      action: stop
    diamond_smugglers_saucer_2_lit_show:
      action: stop
    diamond_smugglers_saucer_3_lit_show:
      action: stop
    diamond_smugglers_all_saucers_lit_show:
      action: stop
    diamond_smugglers_wrong_saucer_show:
      action: stop

  diamond_smugglers_clear_lights:
    diamond_smugglers_right_bank_build:
      action: stop
    diamond_smugglers_left_bank_build:
      action: stop
    diamond_smugglers_saucer_1_lit_show:
      action: stop
    diamond_smugglers_saucer_2_lit_show:
      action: stop
    diamond_smugglers_saucer_3_lit_show:
      action: stop
    diamond_smugglers_all_saucers_lit_show:
      action: stop
    diamond_smugglers_wrong_saucer_show:
      action: stop

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_diamond_smugglers_started:
    gi: B8FFFF

  mode_diamond_smugglers_stopping:
    gi: E0E0E0

  diamond_smugglers_clear_lights:
    l_1: off
    l_1_hole_l: off
    l_1_hole_r: off
    l_2: off
    l_2_hole_l: off
    l_2_hole_r: off
    l_3: off
    l_3_hole_l: off
    l_3_hole_r: off
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: off
    l_5bank_4: off
    l_5bank_5: off
    l_gi_3bank: off

  diamond_smugglers_clear_saucer_lights:
    l_1: off
    l_1_hole_l: off
    l_1_hole_r: off
    l_2: off
    l_2_hole_l: off
    l_2_hole_r: off
    l_3: off
    l_3_hole_l: off
    l_3_hole_r: off

shows:
  diamond_smugglers_right_bank_build:
    - duration: 250ms
      lights:
        l_5bank_1: white
        l_5bank_2: white
        l_5bank_3: white
        l_5bank_4: white
        l_5bank_5: white
    - duration: 250ms
      lights:
        l_5bank_1: off
        l_5bank_2: off
        l_5bank_3: off
        l_5bank_4: off
        l_5bank_5: off

  diamond_smugglers_left_bank_build:
    - duration: 250ms
      lights:
        l_gi_3bank: yellow
    - duration: 250ms
      lights:
        l_gi_3bank: off

  diamond_smugglers_saucer_1_lit_show:
    - duration: 200ms
      lights:
        l_1: yellow
        l_1_hole_l: yellow
        l_1_hole_r: yellow
    - duration: 200ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off

  diamond_smugglers_saucer_2_lit_show:
    - duration: 200ms
      lights:
        l_2: yellow
        l_2_hole_l: yellow
        l_2_hole_r: yellow
    - duration: 200ms
      lights:
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off

  diamond_smugglers_saucer_3_lit_show:
    - duration: 200ms
      lights:
        l_3: yellow
        l_3_hole_l: yellow
        l_3_hole_r: yellow
    - duration: 200ms
      lights:
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off

  diamond_smugglers_all_saucers_lit_show:
    - duration: 150ms
      lights:
        l_1: white
        l_1_hole_l: white
        l_1_hole_r: white
        l_2: white
        l_2_hole_l: white
        l_2_hole_r: white
        l_3: white
        l_3_hole_l: white
        l_3_hole_r: white
    - duration: 150ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off

  diamond_smugglers_wrong_saucer_show:
    - duration: 100ms
      lights:
        l_1: red
        l_1_hole_l: red
        l_1_hole_r: red
        l_2: red
        l_2_hole_l: red
        l_2_hole_r: red
        l_3: red
        l_3_hole_l: red
        l_3_hole_r: red
    - duration: 100ms
      lights:
        l_1: off
        l_1_hole_l: off
        l_1_hole_r: off
        l_2: off
        l_2_hole_l: off
        l_2_hole_r: off
        l_3: off
        l_3_hole_l: off
        l_3_hole_r: off
