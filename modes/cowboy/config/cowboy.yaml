#config_version=6

# Cowboy placeholder villain mode.
# Mode idea: One target lights for a short quickdraw; hit it to build showdown jackpot.

mode:
  start_events: start_mode_cowboy
  stop_events:
    - cowboy_mode_complete
    - cowboy_mode_failed
    - cowboy_mode_completed_summary
    - ball_ended
  code: cowboy.Cowboy
  priority: 300

widget_player:
  mode_cowboy_started:
    cowboy:
      action: play

  cowboy_mode_complete:
    cowboy:
      action: remove

  cowboy_mode_failed:
    cowboy:
      action: remove

  mode_cowboy_stopping:
    cowboy:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: cowboy_shot_hit
  s_pop_right_active: cowboy_shot_hit
  s_trispinner_opto_active: cowboy_shot_hit
  s_web_spinner_active: cowboy_shot_hit
  s_star_rollover_active: cowboy_shot_hit
  s_upper_target_left_active: cowboy_shot_hit
  s_upper_target_center_active: cowboy_shot_hit
  s_upper_target_right_active: cowboy_shot_hit

  s_left_drops_1_active: cowboy_shot_hit
  s_left_drops_2_active: cowboy_shot_hit
  s_left_drops_3_active: cowboy_shot_hit
  s_right_drops_1_active: cowboy_shot_hit
  s_right_drops_2_active: cowboy_shot_hit
  s_right_drops_3_active: cowboy_shot_hit
  s_right_drops_4_active: cowboy_shot_hit
  s_right_drops_5_active: cowboy_shot_hit

  s_saucer_1_active:
    - cowboy_major_hit
    - clear_saucers
  s_saucer_2_active:
    - cowboy_major_hit
    - clear_saucers
  s_saucer_3_active:
    - cowboy_major_hit
    - clear_saucers
  s_vuk_switch_active: cowboy_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_cowboy_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_cowboy_stopping:
    - clear_saucers
