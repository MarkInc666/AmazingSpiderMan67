#config_version=6

# Crime Wave Crackdown placeholder mini-wizard.
# Mode idea: Collect leads, reveal criminals, survive trick shots, and finish timed predictions during a citywide crime wave.

mode:
  start_events: start_mode_crime_wave_crackdown
  stop_events:
    - stop_mode_crime_wave_crackdown
    - ball_ended
  code: crime_wave_crackdown.CrimeWaveCrackdown
  priority: 800

multiballs:
  crime_wave_crackdown_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: crime_wave_crackdown_start_multiball
    stop_events:
      - stop_mode_crime_wave_crackdown


variable_player:

  multiball_crime_wave_crackdown_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_crime_wave_crackdown_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0


widget_player:
  mode_crime_wave_crackdown_started:
    crime_wave_crackdown:
      action: play

  crime_wave_crackdown_mode_complete:
    crime_wave_crackdown:
      action: remove

  crime_wave_crackdown_mode_failed:
    crime_wave_crackdown:
      action: remove

  mode_crime_wave_crackdown_stopping:
    crime_wave_crackdown:
      action: remove

  stop_mode_crime_wave_crackdown:
    crime_wave_crackdown:
      action: remove

event_player:
  s_pop_left_active: crime_wave_crackdown_shot_hit
  s_pop_right_active: crime_wave_crackdown_shot_hit
  s_trispinner_opto_active: crime_wave_crackdown_shot_hit
  s_web_spinner_active: crime_wave_crackdown_shot_hit
  s_star_rollover_active: crime_wave_crackdown_shot_hit
  s_upper_target_left_active: crime_wave_crackdown_shot_hit
  s_upper_target_center_active: crime_wave_crackdown_shot_hit
  s_upper_target_right_active: crime_wave_crackdown_shot_hit
  s_left_drops_1_active: crime_wave_crackdown_shot_hit
  s_left_drops_2_active: crime_wave_crackdown_shot_hit
  s_left_drops_3_active: crime_wave_crackdown_shot_hit
  s_right_drops_1_active: crime_wave_crackdown_shot_hit
  s_right_drops_2_active: crime_wave_crackdown_shot_hit
  s_right_drops_3_active: crime_wave_crackdown_shot_hit
  s_right_drops_4_active: crime_wave_crackdown_shot_hit
  s_right_drops_5_active: crime_wave_crackdown_shot_hit

  s_vuk_switch_active: crime_wave_crackdown_jackpot_hit

  multiball_crime_wave_crackdown_multiball_ended: crime_wave_crackdown_failed

  mode_crime_wave_crackdown_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_crime_wave_crackdown_stopping:
    - clear_saucers
