#config_version=6

# Master Vine placeholder villain mode.
# Mode idea: Vines spread across shots; clear vine shots before they lock out too many areas.

mode:
  start_events: start_mode_master_vine
  stop_events:
    - master_vine_mode_complete
    - master_vine_mode_completed_summary
    - ball_ended
  code: master_vine.MasterVine
  priority: 300

widget_player:
  mode_master_vine_started:
    master_vine:
      action: play

  master_vine_mode_complete:
    master_vine:
      action: remove

  mode_master_vine_stopping:
    master_vine:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: master_vine_shot_hit
  s_pop_right_active: master_vine_shot_hit
  s_trispinner_opto_active: master_vine_shot_hit
  s_web_spinner_active: master_vine_shot_hit
  s_star_rollover_active: master_vine_shot_hit
  s_upper_target_left_active: master_vine_shot_hit
  s_upper_target_center_active: master_vine_shot_hit
  s_upper_target_right_active: master_vine_shot_hit

  s_left_drops_1_active: master_vine_shot_hit
  s_left_drops_2_active: master_vine_shot_hit
  s_left_drops_3_active: master_vine_shot_hit
  s_right_drops_1_active: master_vine_shot_hit
  s_right_drops_2_active: master_vine_shot_hit
  s_right_drops_3_active: master_vine_shot_hit
  s_right_drops_4_active: master_vine_shot_hit
  s_right_drops_5_active: master_vine_shot_hit

  s_saucer_1_active:
    - master_vine_major_hit
    - clear_saucers
  s_saucer_2_active:
    - master_vine_major_hit
    - clear_saucers
  s_saucer_3_active:
    - master_vine_major_hit
    - clear_saucers
  s_vuk_switch_active: master_vine_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_master_vine_started:
    - rooftop_diverter_open|500ms
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_master_vine_stopping:
    - clear_saucers

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_master_vine_started:
    gi: 40A040

  mode_master_vine_stopping:
    gi: E0E0E0

