#config_version=6

mode:
  start_events: start_mode_sinister_surge
  stop_events:
    - stop_mode_sinister_surge
    - ball_ended
  priority: 800
  code: sinister_surge.SinisterSurge

variable_player:

  multiball_sinister_surge_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_sinister_surge_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0


multiballs:
  sinister_surge_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 20s
    start_events: sinister_surge_start_multiball
    stop_events:
      - sinister_surge_stop_multiball

  sinister_surge_add_a_ball:
    ball_count: 1
    ball_count_type: add
    shoot_again: 10s
    start_events: sinister_surge_add_a_ball


event_player:

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  multiball_sinister_surge_multiball_started:
    - sinister_surge_choose_first_area


  mode_sinister_surge_stopping:
    - sinister_surge_enable_daily_bugle_mystery
    - sinister_surge_close_upper_gate
    - sinister_surge_release_all_saucers
    - clear_saucers_delayed
    - sinister_surge_clear_all_sinister_surge_lights

  sinister_surge_mode_complete:
    - stop_mode_sinister_surge

  mode_sinister_surge_started:
    - sinister_surge_setup
    - sinister_surge_start_multiball|1s

  sinister_surge_setup:
    - sinister_surge_reset_banks
    - clear_saucers
    - sinister_surge_disable_daily_bugle_mystery
    - sinister_surge_mode_intro
    - play_song_7

  sinister_surge_reset_banks:
    - drop_target_bank_dt_bank_left_reset|100ms
    - drop_target_bank_dt_bank_right_reset|200ms

  multiball_sinister_surge_multiball_ended:
    - sinister_surge_multiball_ended

  sinister_surge_open_upper_gate: rooftop_diverter_open

  sinister_surge_close_upper_gate: rooftop_diverter_close

  sinister_surge_disable_daily_bugle_mystery: disable_daily_bugle_mystery

  sinister_surge_enable_daily_bugle_mystery: enable_daily_bugle_mystery


widget_player:
  mode_sinister_surge_started:
    sinister_surge:
      action: play

  sinister_surge_mode_ended:
    sinister_surge:
      action: remove

  xsinister_surge_mode_intro:
    sinister_surge_intro:
      action: play
      expire: 5s

  sinister_surge_area_changed:
    sinister_surge_area_status:
      action: play
      expire: 3s

  xsinister_surge_jackpot_lit:
    sinister_surge_jackpot_lit:
      action: play
      expire: 3s

  xsinister_surge_victory_laps_started:
    sinister_surge_victory_laps:
      action: play
      expire: 4s

  xsinister_surge_mode_complete:
    sinister_surge_complete:
      action: play
      expire: 5s



show_player:

  sinister_surge_clear_area_lights:
    sinister_surge_pops_lit_show:
      action: stop
    sinister_surge_spinner_lit_show:
      action: stop
    sinister_surge_star_lit_show:
      action: stop
    sinister_surge_upper_targets_lit_show:
      action: stop
    sinister_surge_drops_lit_show:
      action: stop

  sinister_surge_area_pops_lit:
    sinister_surge_pops_lit_show:
      action: play
      loops: -1
      speed: 2

  sinister_surge_area_spinner_lit:
    sinister_surge_spinner_lit_show:
      action: play
      loops: -1
      speed: 2

  sinister_surge_area_star_lit:
    sinister_surge_star_lit_show:
      action: play
      loops: -1
      speed: 2

  sinister_surge_area_upper_targets_lit:
    sinister_surge_upper_targets_lit_show:
      action: play
      loops: -1
      speed: 2

  sinister_surge_area_drops_lit:
    sinister_surge_drops_lit_show:
      action: play
      loops: -1
      speed: 2

  sinister_surge_jackpot_lit_show:
    sinister_surge_daily_bugle_jackpot_show:
      action: play
      loops: -1
      speed: 4

  sinister_surge_ab_ready_show:
    sinister_surge_ab_ready_show:
      action: play
      loops: -1
      speed: 3

  sinister_surge_ab_clear_show:
    sinister_surge_ab_ready_show:
      action: stop

  sinister_surge_victory_laps_show:
    sinister_surge_victory_laps_show:
      action: play
      loops: -1
      speed: 5

  sinister_surge_super_jackpot_lit_show:
    sinister_surge_super_jackpot_show:
      action: play
      loops: -1
      speed: 6

  sinister_surge_clear_all_sinister_surge_lights:
    sinister_surge_pops_lit_show:
      action: stop
    sinister_surge_spinner_lit_show:
      action: stop
    sinister_surge_star_lit_show:
      action: stop
    sinister_surge_upper_targets_lit_show:
      action: stop
    sinister_surge_drops_lit_show:
      action: stop
    sinister_surge_daily_bugle_jackpot_show:
      action: stop
    sinister_surge_ab_ready_show:
      action: stop
    sinister_surge_victory_laps_show:
      action: stop
    sinister_surge_super_jackpot_show:
      action: stop

