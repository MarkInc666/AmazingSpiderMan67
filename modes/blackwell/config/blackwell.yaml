#config_version=6

# Blackwell - Prediction Panic
#
# 6-shot timed sequence:
# - left web
# - center web
# - upper spinner
# - upper target left
# - upper target center
# - upper target right
#
# Case File: More Jackpots adds a 7th "pops" shot.
# Either pop hit awards that shot.

mode:
  start_events: start_mode_blackwell
  stop_events:
    - blackwell_mode_complete
    - blackwell_mode_failed
    - blackwell_mode_completed_summary
    - ball_ended
  code: blackwell.Blackwell
  priority: 300


widget_player:
  mode_blackwell_started:
    blackwell:
      action: play

  blackwell_mode_complete:
    blackwell:
      action: remove

  blackwell_mode_failed:
    blackwell:
      action: remove

  mode_blackwell_stopping:
    blackwell:
      action: remove


event_player:
  blackwell_startup_complete:
    - clear_saucers
    - reset_drops

  # Main sequence shots.
  s_web_target_left_active: blackwell_left_web_hit
  s_web_target_mid_active: blackwell_center_web_hit
  s_trispinner_opto_active: blackwell_upper_spinner_hit
  s_upper_target_left_active: blackwell_upper_target_left_hit
  s_upper_target_center_active: blackwell_upper_target_center_hit
  s_upper_target_right_active: blackwell_upper_target_right_hit

  # Spinner time add. The upper spinner is also one of the lit sequence shots;
  # Python ignores the time-add if the mode is already done.
  s_web_spinner_active: blackwell_spinner_time_add

  # Case File 1 extra shot. Either pop completes the logical "pops" shot.
  s_pop_left_active: blackwell_pops_hit
  s_pop_right_active: blackwell_pops_hit

  # Physical cleanup while the villain mode is active.
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_blackwell_stopping:
    - clear_saucers


random_event_player:
  blackwell_jackpot_collected:
    - blackwell_jackpot_collected_1
    - blackwell_jackpot_collected_2
    - blackwell_jackpot_collected_3

  blackwell_shot_missed:
    - blackwell_prediction_missed_1
    - blackwell_prediction_missed_2


sound_player:
  blackwell_jackpot_collected_1:
    jackpot:
      action: play
      bus: effects

  blackwell_jackpot_collected_2:
    light_smash_1:
      action: play
      bus: effects

  blackwell_jackpot_collected_3:
    light_smash_2:
      action: play
      bus: effects

  blackwell_prediction_missed_1:
    spark_1:
      action: play
      bus: effects

  blackwell_prediction_missed_2:
    electro_zap:
      action: play
      bus: effects

  blackwell_time_added:
    ticking:
      action: play
      bus: effects


show_player:
  blackwell_lite_left_web:
    blackwell_left_web_lit_show:
      loops: -1

  blackwell_lite_center_web:
    blackwell_center_web_lit_show:
      loops: -1

  blackwell_lite_upper_spinner:
    blackwell_upper_spinner_lit_show:
      loops: -1

  blackwell_lite_upper_target_left:
    blackwell_upper_target_left_lit_show:
      loops: -1

  blackwell_lite_upper_target_center:
    blackwell_upper_target_center_lit_show:
      loops: -1

  blackwell_lite_upper_target_right:
    blackwell_upper_target_right_lit_show:
      loops: -1

  blackwell_lite_pops:
    blackwell_pops_lit_show:
      loops: -1

  blackwell_stop_left_web:
    blackwell_left_web_lit_show:
      action: stop

  blackwell_stop_center_web:
    blackwell_center_web_lit_show:
      action: stop

  blackwell_stop_upper_spinner:
    blackwell_upper_spinner_lit_show:
      action: stop

  blackwell_stop_upper_target_left:
    blackwell_upper_target_left_lit_show:
      action: stop

  blackwell_stop_upper_target_center:
    blackwell_upper_target_center_lit_show:
      action: stop

  blackwell_stop_upper_target_right:
    blackwell_upper_target_right_lit_show:
      action: stop

  blackwell_stop_pops:
    blackwell_pops_lit_show:
      action: stop

  blackwell_jackpot_collected:
    blackwell_jackpot_collected_show:
      loops: 0

  blackwell_shot_assist_used:
    blackwell_shot_assist_show:
      loops: 0

  blackwell_mode_complete:
    blackwell_mode_complete_show:
      loops: 0


shows:
