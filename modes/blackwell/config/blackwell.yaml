        l_upper_left: yellow
    - duration: 120ms
      lights:
        l_upper_left: blue

  blackwell_upper_target_center_lit_show:
    - duration: 120ms
      lights:
        l_upper_middle: yellow
    - duration: 120ms
      lights:
        l_upper_middle: blue

  blackwell_upper_target_right_lit_show:
    - duration: 120ms
      lights:
        l_upper_right: yellow
    - duration: 120ms
      lights:
        l_upper_right: blue

  blackwell_pops_lit_show:
    - duration: 120ms
      lights:
        l_pop_1_1: yellow
        l_pop_1_2: yellow
        l_pop_1_3: yellow
        l_pop_1_4: yellow
        l_pop_1_5: yellow
        l_pop_1_6: yellow
        l_pop_1_7: yellow
        l_pop_1_8: yellow
        l_pop_1_9: yellow
        l_pop_1_10: yellow
        l_pop_1_11: yellow
        l_pop_1_12: yellow
        l_pop_2_1: yellow
        l_pop_2_2: yellow
        l_pop_2_3: yellow
        l_pop_2_4: yellow
        l_pop_2_5: yellow
        l_pop_2_6: yellow
        l_pop_2_7: yellow
        l_pop_2_8: yellow
        l_pop_2_9: yellow
        l_pop_2_10: yellow
        l_pop_2_11: yellow
        l_pop_2_12: yellow
    - duration: 120ms
      lights:
        l_pop_1_1: blue
        l_pop_1_2: blue
        l_pop_1_3: blue
        l_pop_1_4: blue
        l_pop_1_5: blue
        l_pop_1_6: blue
        l_pop_1_7: blue
        l_pop_1_8: blue
        l_pop_1_9: blue
        l_pop_1_10: blue
        l_pop_1_11: blue
        l_pop_1_12: blue
        l_pop_2_1: blue
        l_pop_2_2: blue
        l_pop_2_3: blue
        l_pop_2_4: blue
        l_pop_2_5: blue
        l_pop_2_6: blue
        l_pop_2_7: blue
        l_pop_2_8: blue
        l_pop_2_9: blue
        l_pop_2_10: blue
        l_pop_2_11: blue
        l_pop_2_12: blue

  blackwell_jackpot_collected_show:
    - duration: 200ms
      lights:
        gi: white
    - duration: 200ms
      lights:
        gi: green

  blackwell_shot_assist_show:
    - duration: 200ms
      lights:
        gi: yellow
    - duration: 200ms
      lights:
        gi: white

  blackwell_mode_complete_show:
