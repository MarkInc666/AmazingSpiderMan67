    - duration: 150ms
      lights:
        l_left_web_target: yellow
    - duration: 150ms
      lights:
        l_left_web_target: off

  blackwell_center_web_lit_show:
    - duration: 150ms
      lights:
        l_mid_web_target: yellow
    - duration: 150ms
      lights:
        l_mid_web_target: off

  blackwell_upper_spinner_lit_show:
    - duration: 120ms
      lights:
        l_gi_a: yellow
    - duration: 120ms
      lights:
        l_gi_a: blue

  blackwell_upper_target_left_lit_show:
