#config_version=6

# Fly Twins placeholder villain mode.
# Mode idea: Two fly shots are lit; hit both within window for double jackpot.

mode:
  start_events: start_mode_human_flies
  stop_events:
    - human_flies_mode_complete
    - human_flies_mode_completed_summary
    - ball_ended
  code: human_flies.HumanFlies
  priority: 300

widget_player:
  mode_human_flies_started:
    human_flies:
      action: play

  human_flies_mode_complete:
    human_flies:
      action: remove

  mode_human_flies_stopping:
    human_flies:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: human_flies_shot_hit
  s_pop_right_active: human_flies_shot_hit
  s_trispinner_opto_active: human_flies_shot_hit
  s_web_spinner_active: human_flies_shot_hit
  s_star_rollover_active: human_flies_shot_hit
  s_upper_target_left_active: human_flies_shot_hit
  s_upper_target_center_active: human_flies_shot_hit
  s_upper_target_right_active: human_flies_shot_hit

  s_left_drops_1_active: human_flies_shot_hit
  s_left_drops_2_active: human_flies_shot_hit
  s_left_drops_3_active: human_flies_shot_hit
  s_right_drops_1_active: human_flies_shot_hit
  s_right_drops_2_active: human_flies_shot_hit
  s_right_drops_3_active: human_flies_shot_hit
  s_right_drops_4_active: human_flies_shot_hit
  s_right_drops_5_active: human_flies_shot_hit

  s_saucer_1_active:
    - human_flies_major_hit
    - clear_saucers
  s_saucer_2_active:
    - human_flies_major_hit
    - clear_saucers
  s_saucer_3_active:
    - human_flies_major_hit
    - clear_saucers
  s_vuk_switch_active: human_flies_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_human_flies_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_human_flies_stopping:
    - clear_saucers
