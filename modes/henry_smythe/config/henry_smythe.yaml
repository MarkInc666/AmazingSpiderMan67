#config_version=6

# Henry Smythe placeholder villain mode.
# Mode idea: Smythe repairs disabled robot systems unless repair shots are stopped.

mode:
  start_events: start_mode_henry_smythe
  stop_events:
    - henry_smythe_mode_complete
    - henry_smythe_mode_failed
    - henry_smythe_mode_completed_summary
    - ball_ended
  code: henry_smythe.HenrySmythe
  priority: 300

widget_player:
  mode_henry_smythe_started:
    henry_smythe:
      action: play

  henry_smythe_mode_complete:
    henry_smythe:
      action: remove

  henry_smythe_mode_failed:
    henry_smythe:
      action: remove

  mode_henry_smythe_stopping:
    henry_smythe:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: henry_smythe_shot_hit
  s_pop_right_active: henry_smythe_shot_hit
  s_trispinner_opto_active: henry_smythe_shot_hit
  s_web_spinner_active: henry_smythe_shot_hit
  s_star_rollover_active: henry_smythe_shot_hit
  s_upper_target_left_active: henry_smythe_shot_hit
  s_upper_target_center_active: henry_smythe_shot_hit
  s_upper_target_right_active: henry_smythe_shot_hit

  s_left_drops_1_active: henry_smythe_shot_hit
  s_left_drops_2_active: henry_smythe_shot_hit
  s_left_drops_3_active: henry_smythe_shot_hit
  s_right_drops_1_active: henry_smythe_shot_hit
  s_right_drops_2_active: henry_smythe_shot_hit
  s_right_drops_3_active: henry_smythe_shot_hit
  s_right_drops_4_active: henry_smythe_shot_hit
  s_right_drops_5_active: henry_smythe_shot_hit

  s_saucer_1_active:
    - henry_smythe_major_hit
    - clear_saucers
  s_saucer_2_active:
    - henry_smythe_major_hit
    - clear_saucers
  s_saucer_3_active:
    - henry_smythe_major_hit
    - clear_saucers
  s_vuk_switch_active: henry_smythe_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_henry_smythe_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_henry_smythe_stopping:
    - clear_saucers
