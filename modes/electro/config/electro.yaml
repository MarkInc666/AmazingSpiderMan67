#config_version=6


#todo: open gate to upper for upper shots

mode:
  start_events: start_mode_electro
  stop_events:
    - electro_mode_complete
    - electro_mode_failed
    - ball_ended
  code: electro.Electro
  priority: 500


random_event_player:
  electro_jackpot_collected:
    - electro_jackpot_collected_1  
    - electro_jackpot_collected_2  
    - electro_jackpot_collected_3  

  electro_lit_shot_changed:
    - electro_jackpot_moved_1  
    - electro_jackpot_moved_2  
    - electro_jackpot_moved_3  


sound_player:
  electro_jackpot_moved_1:
    spark_1:
      action: play
      bus: effects

  electro_jackpot_moved_2:
    spark_2:
      action: play
      bus: effects

  electro_jackpot_moved_3:
    electro_zap:
      action: play
      bus: effects

  electro_jackpot_collected_1:
    light_smash_1:
      action: play
      bus: effects

  electro_jackpot_collected_2:
    light_smash_2:
      action: play
      bus: effects

  electro_jackpot_collected_3:
    light_smash_3:
      action: play
      bus: effects

  electro_super_collected:
    jackpot:
      action: play
      bus: effects


event_player:
  electro_mode_complete:
    - reset_villain_locate

  electro_mode_started:
    - reset_drops
    - clear_saucers

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  electro_saucers_hit:
    - clear_saucers  


  # -------------------------------
  # Real switches / shot groups -> Electro Python events
  # -------------------------------
  s_web_target_left_active: electro_left_web_hit
  s_web_spinner_active: electro_spinner_hit
  elect_left_drops_hit: electro_left_drops_hit
  elect_saucers_hit: electro_saucers_hit
  s_web_target_top_active: electro_right_web_hit
  s_trispinner_opto_active: electro_upper_spinner_hit
  elect_upper_targets_hit: electro_upper_target_hit
  elect_right_drops_hit: electro_right_drops_hit

  # -------------------------------
  # Timer completions -> Python
  # -------------------------------
  timer_electro_shot_timer_complete: electro_lit_shot_timeout
  timer_electro_super_timer_complete: electro_super_timeout


shot_groups:
  elect_right_drops:
    shots: electro_right_drop_1, electro_right_drop_2, electro_right_drop_3, electro_right_drop_4, electro_right_drop_5

  elect_left_drops:
    shots: electro_left_drop_1, electro_left_drop_2, electro_left_drop_3

  elect_upper_targets:
    shots: electro_upper_target_left, electro_upper_target_center, electro_upper_target_right

  elect_saucers:
    shots: electro_saucer_1, electro_saucer_2, electro_saucer_3

shots:

  electro_saucer_1:
    switch: s_saucer_1

  electro_saucer_2:
    switch: s_saucer_2

  electro_saucer_3:
    switch: s_saucer_3

  electro_upper_target_left:
    switch: s_upper_target_left

  electro_upper_target_center:
    switch: s_upper_target_center

  electro_upper_target_right:
    switch: s_upper_target_right

  electro_right_drop_1:
    switch: s_right_drops_1

  electro_right_drop_2:
    switch: s_right_drops_2

  electro_right_drop_3:
    switch: s_right_drops_3

  electro_right_drop_4:
    switch: s_right_drops_4

  electro_right_drop_5:
    switch: s_right_drops_5

  electro_left_drop_1:
    switch: s_left_drops_1

  electro_left_drop_2:
    switch: s_left_drops_2

  electro_left_drop_3:
    switch: s_left_drops_3


variable_player:
  electro_jackpot_collected:
    score:
      action: add
      int: current_player.electro_jackpot_value

  electro_super_collected:
    score:
      action: add
      int: current_player.electro_super_jackpot_value

timers:
  electro_shot_timer:
    start_value: 5
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: electro_shot_timer_start
        action: restart
      - event: electro_shot_timer_stop
        action: stop

  electro_super_timer:
    start_value: 10
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: electro_super_timer_start
        action: restart
      - event: electro_super_timer_stop
        action: stop

show_player:
  electro_mode_started:
    electro_mode_start_show:
      loops: 0

  # -------------------------------
  # Normal lit shots
  # -------------------------------
  electro_lite_left_web:
    electro_left_web_lit_show:
      loops: -1

  electro_lite_spinner:
    electro_spinner_lit_show:
      loops: -1

  electro_lite_left_drops:
    electro_left_drops_lit_show:
      loops: -1

  electro_lite_saucers:
    electro_saucers_lit_show:
      loops: -1

  electro_lite_right_web:
    electro_right_web_lit_show:
      loops: -1

  electro_lite_upper_spinner:
    electro_upper_spinner_lit_show:
      loops: -1

  electro_lite_upper_targets:
    electro_upper_targets_lit_show:
      loops: -1

  electro_lite_right_drops:
    electro_right_drops_lit_show:
      loops: -1

  # -------------------------------
  # Stop normal lit shots
  # -------------------------------
  electro_stop_left_web:
    electro_left_web_lit_show:
      action: stop

  electro_stop_spinner:
    electro_spinner_lit_show:
      action: stop

  electro_stop_left_drops:
    electro_left_drops_lit_show:
      action: stop

  electro_stop_saucers:
    electro_saucers_lit_show:
      action: stop

  electro_stop_right_web:
    electro_right_web_lit_show:
      action: stop

  electro_stop_upper_spinner:
    electro_upper_spinner_lit_show:
      action: stop

  electro_stop_upper_targets:
    electro_upper_targets_lit_show:
      action: stop

  electro_stop_right_drops:
    electro_right_drops_lit_show:
      action: stop

  # -------------------------------
  # Super jackpot lit shots
  # -------------------------------
  electro_super_lite_left_web:
    electro_left_web_super_show:
      loops: -1

  electro_super_lite_spinner:
    electro_spinner_super_show:
      loops: -1

  electro_super_lite_left_drops:
    electro_left_drops_super_show:
      loops: -1

  electro_super_lite_saucers:
    electro_saucers_super_show:
      loops: -1

  electro_super_lite_right_web:
    electro_right_web_super_show:
      loops: -1

  electro_super_lite_upper_spinner:
    electro_upper_spinner_super_show:
      loops: -1

  electro_super_lite_upper_targets:
    electro_upper_targets_super_show:
      loops: -1

  electro_super_lite_right_drops:
    electro_right_drops_super_show:
      loops: -1

  electro_super_collected:
    electro_super_collected_show:
      loops: 0

  electro_mode_complete:
    electro_mode_complete_show:
      loops: 0

  electro_mode_failed:
    electro_mode_failed_show:
      loops: 0

shows:
  electro_mode_start_show:
    - duration: 200ms
      lights:
        l_20k: yellow
    - duration: 200ms
      lights:
        l_20k: off

  # -------------------------------
  # Normal lit shot shows
  # Replace lights with your actual shot indicator lights.
  # -------------------------------
  electro_left_web_lit_show:
    - duration: 150ms
      lights:
        l_left_web_target: yellow      
    - duration: 150ms
      lights:
        l_left_web_target: off

  electro_spinner_lit_show:
    - duration: 150ms
      lights:
        l_spinner: yellow
    - duration: 150ms
      lights:
        l_spinner: off

  electro_left_drops_lit_show:
    - duration: 120ms
      lights:
        l_3bankbonus: yellow
        l_extraball: yellow
    - duration: 120ms
      lights:
        l_3bankbonus: blue
        l_extraball: blue

  electro_saucers_lit_show:
    - duration: 150ms
      lights:
        l_1_hole_l: red
        l_1_hole_r: red        
        l_2_hole_l: red
        l_2_hole_r: red        
        l_3_hole_l: red
        l_3_hole_r: red        
    - duration: 150ms
      lights:
        l_1_hole_l: off
        l_1_hole_r: off        
        l_2_hole_l: off
        l_2_hole_r: off        
        l_3_hole_l: off
        l_3_hole_r: off        

  electro_right_web_lit_show:
    - duration: 150ms
      lights:
        l_mid_spider_target: yellow
    - duration: 150ms
      lights:
        l_mid_spider_target: off

  electro_upper_spinner_lit_show:
    - duration: 120ms
      lights:
        l_gi_a: yellow
    - duration: 120ms
      lights:
        l_gi_a: blue

  electro_upper_targets_lit_show:
    - duration: 120ms
      lights:
        l_upper_left: yellow
        l_upper_middle: yellow
        l_upper_right: yellow
    - duration: 120ms
      lights:
        l_upper_left: blue
        l_upper_middle: blue
        l_upper_right: blue

  electro_right_drops_lit_show:
    - duration: 120ms
      lights:
        l_5bank_1: yellow
        l_5bank_2: yellow
        l_5bank_3: yellow
        l_5bank_4: yellow
        l_5bank_5: yellow
    - duration: 120ms
      lights:
        l_5bank_1: blue
        l_5bank_2: blue
        l_5bank_3: blue
        l_5bank_4: blue
        l_5bank_5: blue

  # -------------------------------
  # Super shows
  # -------------------------------
  electro_left_web_super_show:
    - duration: 150ms
      lights:
        l_left_web_target: white      
    - duration: 150ms
      lights:
        l_left_web_target: off

  electro_spinner_super_show:
    - duration: 150ms
      lights:
        l_spinner: white
    - duration: 150ms
      lights:
        l_spinner: off

  electro_left_drops_super_show:
    - duration: 120ms
      lights:
        l_3bankbonus: white
        l_extraball: white
    - duration: 120ms
      lights:
        l_3bankbonus: off
        l_extraball: off

  electro_saucers_super_show:
    - duration: 150ms
      lights:
        l_1_hole_l: white
        l_1_hole_r: white        
        l_2_hole_l: white
        l_2_hole_r: white        
        l_3_hole_l: white
        l_3_hole_r: white        
    - duration: 150ms
      lights:
        l_1_hole_l: off
        l_1_hole_r: off        
        l_2_hole_l: off
        l_2_hole_r: off        
        l_3_hole_l: off
        l_3_hole_r: off        

  electro_right_web_super_show:
    - duration: 150ms
      lights:
        l_mid_spider_target: white
    - duration: 150ms
      lights:
        l_mid_spider_target: off

  electro_upper_spinner_super_show:
    - duration: 120ms
      lights:
        l_gi_a: white
    - duration: 120ms
      lights:
        l_gi_a: blue

  electro_upper_targets_super_show:
    - duration: 120ms
      lights:
        l_upper_left: white
        l_upper_middle: white
        l_upper_right: white
    - duration: 120ms
      lights:
        l_upper_left: off
        l_upper_middle: off
        l_upper_right: off

  electro_right_drops_super_show:
    - duration: 120ms
      lights:
        l_5bank_1: white
        l_5bank_2: white
        l_5bank_3: white
        l_5bank_4: white
        l_5bank_5: white
    - duration: 120ms
      lights:
        l_5bank_1: off
        l_5bank_2: off
        l_5bank_3: off
        l_5bank_4: off
        l_5bank_5: off

  electro_super_collected_show:
    - duration: 500ms
      lights:
        gi: white
    - duration: 500ms
      lights:
        gi: red
    - duration: 500ms
      lights:
        gi: red
    - duration: 500ms
      lights:
        gi: white

  electro_mode_complete_show:
    - duration: 500ms
      lights:
        gi: green

  electro_mode_failed_show:
    - duration: 500ms
      lights:
        gi: red

