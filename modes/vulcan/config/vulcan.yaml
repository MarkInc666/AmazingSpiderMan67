#config_version=6

mode:
  start_events: start_mode_vulcan
  stop_events:
    - vulcan_mode_complete
    - vulcan_mode_completed_summary
    - ball_ended
  code: vulcan.Vulcan
  priority: 300

variable_player:
  multiball_vulcan_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_vulcan_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

  multiball_vulcan_add_a_ball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_vulcan_add_a_ball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

multiballs:
  vulcan_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 16s
    start_events: vulcan_start_multiball
    stop_events:
      - vulcan_stop_multiball

  vulcan_add_a_ball:
    ball_count: 1
    ball_count_type: add
    shoot_again: 10s
    start_events: vulcan_add_a_ball

widget_player:
  mode_vulcan_started:
    vulcan:
      action: play

  mode_vulcan_stopping:
    vulcan:
      action: remove

  vulcan_mode_complete:
    vulcan:
      action: remove

event_player:
  vulcan_setup:
    - clear_saucers
    - reset_drops
    - rooftop_diverter_open
    - vulcan_right_bank_reloaded
    - vulcan_upper_targets_reset
    - vulcan_clear_bonus_rubber

  mode_vulcan_stopping:
    - clear_saucers
    - reset_drops
    - rooftop_diverter_close
    - vulcan_clear_all_lights

  multiball_vulcan_multiball_ended:
    - vulcan_multiball_ended

  multiball_vulcan_add_a_ball_started:
    - vulcan_add_a_ball_started

  multiball_vulcan_add_a_ball_ended:
    - vulcan_check_cooling

  s_web_spinner_active:
    - vulcan_spinner_hit
    - vulcan_lower_spinner_flash

  s_trispinner_opto_active:
    - vulcan_spinner_hit    

  s_right_drops_1_active:
    - vulcan_right_drop_1_hit
    - vulcan_5bank_gi_flash
  s_right_drops_2_active:
    - vulcan_right_drop_2_hit
    - vulcan_5bank_gi_flash
  s_right_drops_3_active:
    - vulcan_right_drop_3_hit
    - vulcan_5bank_gi_flash
  s_right_drops_4_active:
    - vulcan_right_drop_4_hit
    - vulcan_5bank_gi_flash
  s_right_drops_5_active:
    - vulcan_right_drop_5_hit
    - vulcan_5bank_gi_flash

  # Right bank does not auto-reset when complete. Upper-left exit reloads it.
  drop_target_bank_dt_bank_right_down:
    - vulcan_right_bank_down

  s_upper_exit_left_opto_active:
    - vulcan_upper_left_exit

  s_upper_target_left_active:
    - vulcan_upper_target_left_hit
  s_upper_target_center_active:
    - vulcan_upper_target_center_hit
  s_upper_target_right_active:
    - vulcan_upper_target_right_hit

  s_right_drops_rubber_active:
    - vulcan_bonus_rubber_hit
  s_right_drops_top_rubber_active:
    - vulcan_bonus_rubber_hit

  s_saucer_1_active:
    - clear_saucers
  s_saucer_2_active:
    - clear_saucers
  s_saucer_3_active:
    - clear_saucers

coil_player:
  vulcan_shot_assist_drop_1:
    c_right_bank_drop_1:
      action: pulse
  vulcan_shot_assist_drop_2:
    c_right_bank_drop_2:
      action: pulse
  vulcan_shot_assist_drop_3:
    c_right_bank_drop_3:
      action: pulse
  vulcan_shot_assist_drop_4:
    c_right_bank_drop_4:
      action: pulse
  vulcan_shot_assist_drop_5:
    c_right_bank_drop_5:
      action: pulse

show_player:
  mode_vulcan_started:
    vulcan_spinner_lit_show:
      action: play
      loops: -1
      speed: 2

  vulcan_lower_spinner_flash:
    lower_spinner_flash_show:
      action: play
      loops: 0
      priority: 1000

  vulcan_5bank_gi_flash:
    vulcan_5bank_gi_flash_show:
      action: play
      loops: 0
      priority: 1000

  vulcan_right_bank_reloaded:
    vulcan_right_drop_1_lit_show:
      action: play
      loops: -1
      speed: 2
    vulcan_right_drop_2_lit_show:
      action: play
      loops: -1
      speed: 2
    vulcan_right_drop_3_lit_show:
      action: play
      loops: -1
      speed: 2
    vulcan_right_drop_4_lit_show:
      action: play
      loops: -1
      speed: 2
    vulcan_right_drop_5_lit_show:
      action: play
      loops: -1
      speed: 2

  vulcan_right_drop_1_collected:
    vulcan_right_drop_1_lit_show:
      action: stop
  vulcan_right_drop_2_collected:
    vulcan_right_drop_2_lit_show:
      action: stop
  vulcan_right_drop_3_collected:
    vulcan_right_drop_3_lit_show:
      action: stop
  vulcan_right_drop_4_collected:
    vulcan_right_drop_4_lit_show:
      action: stop
  vulcan_right_drop_5_collected:
    vulcan_right_drop_5_lit_show:
      action: stop

  vulcan_upper_targets_reset:
    vulcan_upper_left_lit_show:
      action: play
      loops: -1
      speed: 2
    vulcan_upper_center_lit_show:
      action: play
      loops: -1
      speed: 2
    vulcan_upper_right_lit_show:
      action: play
      loops: -1
      speed: 2

  vulcan_upper_target_left_collected:
    vulcan_upper_left_lit_show:
      action: stop
  vulcan_upper_target_center_collected:
    vulcan_upper_center_lit_show:
      action: stop
  vulcan_upper_target_right_collected:
    vulcan_upper_right_lit_show:
      action: stop

  vulcan_upper_targets_completed:
    vulcan_upper_targets_complete_flash_show:
      action: play
      loops: 0
      priority: 1000

  vulcan_bonus_jackpot_lit:
    vulcan_bonus_rubber_lit_show:
      action: play
      loops: -1
      speed: 2

  vulcan_bonus_jackpot_collected:
    vulcan_bonus_rubber_lit_show:
      action: stop

  vulcan_clear_bonus_rubber:
    vulcan_bonus_rubber_lit_show:
      action: stop

  vulcan_clear_all_lights:
    vulcan_spinner_lit_show:
      action: stop
    vulcan_right_drop_1_lit_show:
      action: stop
    vulcan_right_drop_2_lit_show:
      action: stop
    vulcan_right_drop_3_lit_show:
      action: stop
    vulcan_right_drop_4_lit_show:
      action: stop
    vulcan_right_drop_5_lit_show:
      action: stop
    vulcan_upper_left_lit_show:
      action: stop
    vulcan_upper_center_lit_show:
      action: stop
    vulcan_upper_right_lit_show:
      action: stop
    vulcan_bonus_rubber_lit_show:
      action: stop

light_player:
  vulcan_right_drop_1_collected:
    l_5bank_1: off
  vulcan_right_drop_2_collected:
    l_5bank_2: off
  vulcan_right_drop_3_collected:
    l_5bank_3: off
  vulcan_right_drop_4_collected:
    l_5bank_4: off
  vulcan_right_drop_5_collected:
    l_5bank_5: off

  vulcan_upper_target_left_collected:
    l_upper_left: yellow
  vulcan_upper_target_center_collected:
    l_upper_middle: yellow
  vulcan_upper_target_right_collected:
    l_upper_right: yellow

  vulcan_clear_all_lights:
    l_gi_a: off
    l_spinner: off
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: off
    l_5bank_4: off
    l_5bank_5: off
    l_gi_5bank_lower: off
    l_gi_5bank_upper: off
    l_upper_left: off
    l_upper_middle: off
    l_upper_right: off
    l_gi_right_sling: off

shows:
  lower_spinner_flash_show:
    - duration: 100ms
      lights:
        gi: white
    - duration: 100ms
      lights:
        gi: yellow
    - duration: 100ms
      lights:
        gi: off

  vulcan_spinner_lit_show:
    - duration: 250ms
      lights:
        l_gi_a: yellow
        l_spinner: yellow
    - duration: 250ms
      lights:
        l_gi_a: off
        l_spinner: off

  vulcan_5bank_gi_flash_show:
    - duration: 100ms
      lights:
        l_gi_5bank_lower: yellow
        l_gi_5bank_upper: yellow
    - duration: 100ms
      lights:
        l_gi_5bank_lower: off
        l_gi_5bank_upper: off
    - duration: 100ms
      lights:
        l_gi_5bank_lower: yellow
        l_gi_5bank_upper: yellow
    - duration: 100ms
      lights:
        l_gi_5bank_lower: off
        l_gi_5bank_upper: off

  vulcan_right_drop_1_lit_show:
    - duration: 250ms
      lights:
        l_5bank_1: orange
    - duration: 250ms
      lights:
        l_5bank_1: off
  vulcan_right_drop_2_lit_show:
    - duration: 250ms
      lights:
        l_5bank_2: orange
    - duration: 250ms
      lights:
        l_5bank_2: off
  vulcan_right_drop_3_lit_show:
    - duration: 250ms
      lights:
        l_5bank_3: orange
    - duration: 250ms
      lights:
        l_5bank_3: off
  vulcan_right_drop_4_lit_show:
    - duration: 250ms
      lights:
        l_5bank_4: orange
    - duration: 250ms
      lights:
        l_5bank_4: off
  vulcan_right_drop_5_lit_show:
    - duration: 250ms
      lights:
        l_5bank_5: orange
    - duration: 250ms
      lights:
        l_5bank_5: off

  vulcan_upper_left_lit_show:
    - duration: 250ms
      lights:
        l_upper_left: yellow
    - duration: 250ms
      lights:
        l_upper_left: off
  vulcan_upper_center_lit_show:
    - duration: 250ms
      lights:
        l_upper_middle: yellow
    - duration: 250ms
      lights:
        l_upper_middle: off
  vulcan_upper_right_lit_show:
    - duration: 250ms
      lights:
        l_upper_right: yellow
    - duration: 250ms
      lights:
        l_upper_right: off

  vulcan_upper_targets_complete_flash_show:
    - duration: 100ms
      lights:
        l_upper_left: white
        l_upper_middle: white
        l_upper_right: white
    - duration: 100ms
      lights:
        l_upper_left: off
        l_upper_middle: off
        l_upper_right: off
    - duration: 100ms
      lights:
        l_upper_left: white
        l_upper_middle: white
        l_upper_right: white
    - duration: 100ms
      lights:
        l_upper_left: off
        l_upper_middle: off
        l_upper_right: off

  vulcan_bonus_rubber_lit_show:
    - duration: 250ms
      lights:
        l_gi_right_sling: yellow
    - duration: 250ms
      lights:
        l_gi_right_sling: off
