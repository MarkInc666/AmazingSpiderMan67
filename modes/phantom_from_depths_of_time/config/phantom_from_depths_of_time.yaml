#config_version=6

# PhantomFromDepthsOfTime placeholder villain mode.
# Mode idea: One target lights for a short quickdraw; hit it to build showdown jackpot.

mode:
  start_events: start_mode_phantom_from_depths_of_time
  stop_events:
    - phantom_from_depths_of_time_mode_complete
    - phantom_from_depths_of_time_mode_completed_summary
    - ball_ended
  code: phantom_from_depths_of_time.PhantomFromDepthsOfTime
  priority: 300

widget_player:
  mode_phantom_from_depths_of_time_started:
    phantom_from_depths_of_time:
      action: play

  phantom_from_depths_of_time_mode_complete:
    phantom_from_depths_of_time:
      action: remove

  mode_phantom_from_depths_of_time_stopping:
    phantom_from_depths_of_time:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: phantom_from_depths_of_time_shot_hit
  s_pop_right_active: phantom_from_depths_of_time_shot_hit
  s_trispinner_opto_active: phantom_from_depths_of_time_shot_hit
  s_web_spinner_active: phantom_from_depths_of_time_shot_hit
  s_star_rollover_active: phantom_from_depths_of_time_shot_hit
  s_upper_target_left_active: phantom_from_depths_of_time_shot_hit
  s_upper_target_center_active: phantom_from_depths_of_time_shot_hit
  s_upper_target_right_active: phantom_from_depths_of_time_shot_hit

  s_left_drops_1_active: phantom_from_depths_of_time_shot_hit
  s_left_drops_2_active: phantom_from_depths_of_time_shot_hit
  s_left_drops_3_active: phantom_from_depths_of_time_shot_hit
  s_right_drops_1_active: phantom_from_depths_of_time_shot_hit
  s_right_drops_2_active: phantom_from_depths_of_time_shot_hit
  s_right_drops_3_active: phantom_from_depths_of_time_shot_hit
  s_right_drops_4_active: phantom_from_depths_of_time_shot_hit
  s_right_drops_5_active: phantom_from_depths_of_time_shot_hit

  s_saucer_1_active:
    - phantom_from_depths_of_time_major_hit
    - clear_saucers
  s_saucer_2_active:
    - phantom_from_depths_of_time_major_hit
    - clear_saucers
  s_saucer_3_active:
    - phantom_from_depths_of_time_major_hit
    - clear_saucers
  s_vuk_switch_active: phantom_from_depths_of_time_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_phantom_from_depths_of_time_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_phantom_from_depths_of_time_stopping:
    - clear_saucers
