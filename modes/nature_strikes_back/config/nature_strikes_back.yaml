#config_version=6

# Nature Strikes Back placeholder mini-wizard.
# Frozen / Monster Oddities mini-wizard multiball.
# Temporary flow: intro -> 2-ball multiball -> MB end -> summary -> next chapter.

mode:
  start_events: start_mode_nature_strikes_back
  stop_events:
    - stop_mode_nature_strikes_back
    - ball_ended
  code: nature_strikes_back.NatureStrikesBack
  priority: 800

multiballs:
  nature_strikes_back_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: nature_strikes_back_start_multiball
    stop_events:
      - stop_mode_nature_strikes_back

variable_player:
  multiball_nature_strikes_back_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_nature_strikes_back_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_nature_strikes_back_started:
    nature_strikes_back:
      action: play

  nature_strikes_back_mode_complete:
    nature_strikes_back:
      action: remove

  nature_strikes_back_mode_failed:
    nature_strikes_back:
      action: remove

  mode_nature_strikes_back_stopping:
    nature_strikes_back:
      action: remove

  stop_mode_nature_strikes_back:
    nature_strikes_back:
      action: remove

event_player:
  s_pop_left_active: nature_strikes_back_shot_hit
  s_pop_right_active: nature_strikes_back_shot_hit
  s_trispinner_opto_active: nature_strikes_back_shot_hit
  s_web_spinner_active: nature_strikes_back_shot_hit
  s_star_rollover_active: nature_strikes_back_shot_hit
  s_upper_target_left_active: nature_strikes_back_shot_hit
  s_upper_target_center_active: nature_strikes_back_shot_hit
  s_upper_target_right_active: nature_strikes_back_shot_hit
  s_left_drops_1_active: nature_strikes_back_shot_hit
  s_left_drops_2_active: nature_strikes_back_shot_hit
  s_left_drops_3_active: nature_strikes_back_shot_hit
  s_right_drops_1_active: nature_strikes_back_shot_hit
  s_right_drops_2_active: nature_strikes_back_shot_hit
  s_right_drops_3_active: nature_strikes_back_shot_hit
  s_right_drops_4_active: nature_strikes_back_shot_hit
  s_right_drops_5_active: nature_strikes_back_shot_hit
  s_saucer_1_active: nature_strikes_back_shot_hit
  s_saucer_2_active: nature_strikes_back_shot_hit
  s_saucer_3_active: nature_strikes_back_shot_hit
  s_vuk_switch_active: nature_strikes_back_shot_hit

  multiball_nature_strikes_back_multiball_ended: nature_strikes_back_complete_request

  mode_nature_strikes_back_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_nature_strikes_back_stopping:
    - clear_saucers
