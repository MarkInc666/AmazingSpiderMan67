#config_version=6

mode:
  start_events: ball_started
  code: daily_bugle_mystery.DailyBugleMystery
  priority: 90

event_player:

  # A rollovers
  s_inlane_a_active:
    - daily_bugle_a_hit

  s_inlane_m_r_active:
    - daily_bugle_a_hit

  # B rollovers
  s_inlane_b_active:
    - daily_bugle_b_hit

  s_inlane_m_l_active:
    - daily_bugle_b_hit

  # Successful rooftop traversal
  s_upper_exit_right_opto_active:
    - daily_bugle_rooftop_right_exit

  # VUK collects mystery when ready
  s_vuk_switch_active:
    - daily_bugle_vuk_collect_request


variable_player:
  mystery_award_million_points:
    score: 1000000


show_player:

  daily_bugle_a_complete:
    daily_bugle_a_complete_show:
      loops: -1

  daily_bugle_b_complete:
    daily_bugle_b_complete_show:
      loops: -1

  daily_bugle_ab_complete:
    daily_bugle_a_complete_show:
      action: stop
    daily_bugle_b_complete_show:
      action: stop
    daily_bugle_ab_ready_show:
      loops: 3

  mystery_ab_ready:
    daily_bugle_spinner_ready_show:
      loops: -1

  daily_bugle_rooftop_traversal_complete:
    daily_bugle_ab_off_show:
      loops: 0
    daily_bugle_spinner_ready_show:
      action: stop
    daily_bugle_mystery_ready_show:
      loops: -1

  daily_bugle_mystery_collected:
    daily_bugle_mystery_ready_show:
      action: stop
    daily_bugle_mystery_collect_show:
      loops: 4



shows:

  daily_bugle_a_complete_show:
    - duration: 300ms
      lights:
        l_a_rollover: white
        l_right_a: white
    - duration: 300ms
      lights:
        l_a_rollover: blue
        l_right_a: blue

  daily_bugle_b_complete_show:
    - duration: 300ms
      lights:
        l_b_rollover: white
        l_left_b: white
    - duration: 300ms
      lights:
        l_b_rollover: blue
        l_left_b: blue

  daily_bugle_ab_off_show:
    - duration: 300ms
      lights:
        l_a_rollover: off
        l_right_a: off
        l_b_rollover: off
        l_left_b: off

  daily_bugle_ab_ready_show:
    - duration: 300ms
      lights:
        l_a_rollover: white
        l_right_a: white
        l_b_rollover: white
        l_left_b: white
    - duration: 300ms
      lights:
        l_a_rollover: blue
        l_b_rollover: blue
        l_right_a: blue
        l_left_b: blue

  daily_bugle_spinner_ready_show:
    - duration: 400ms
      lights:
        l_spinner: white
    - duration: 400ms
      lights:
        l_spinner: blue

  daily_bugle_mystery_ready_show:
    - duration: 250ms
      lights:
        l_spinner: green
    - duration: 250ms
      lights:
        l_spinner: off

  daily_bugle_mystery_collect_show:
    - duration: 150ms
      lights:
        gi: white
    - duration: 150ms
      lights:
        gi: blue        
        