#config_version=6

mode:
  start_events: ball_started
  stop_events: ball_ending
  code: daily_bugle_mystery.DailyBugleMystery
  priority: 300

event_player:

  # A rollovers
  s_inlane_a_active:
    - daily_bugle_a_hit

  s_inlane_m_r_active:
    - daily_bugle_a_hit

  # B rollovers
  s_inlane_b_active:
    - daily_bugle_b_hit

  s_inlane_m_l_active:
    - daily_bugle_b_hit

  # Rooftop spinner collects Daily Bugle photos. 3 photos lights Mystery.
  s_trispinner_opto_active:
    - daily_bugle_rooftop_spinner_hit

  # Left exit uses the pop-up post hold and instruction.
  s_upper_exit_left_opto_active:
    - daily_bugle_rooftop_left_exit

  # Right exit only plays the instruction/callout. No post hold.
  s_upper_exit_right_opto_active:
    - daily_bugle_rooftop_right_exit

  # Holding both flippers while the post is holding the ball drops it early.
  s_left_flipper_active{device.switches.s_right_flipper.state == 1}:
    - daily_bugle_left_exit_hold_cancel

  s_right_flipper_active{device.switches.s_left_flipper.state == 1}:
    - daily_bugle_left_exit_hold_cancel

  # VUK collects mystery when ready
  s_vuk_switch_active:
    - daily_bugle_vuk_collect_request


widget_player:
  daily_bugle_widget_remove:
    daily_bugle_ready:
      action: remove

  daily_bugle_widget_update:
    daily_bugle_ready:
      action: update


variable_player:
  mystery_award_million_points:
    score: 1000000

  s_vuk_switch_active:
    score: 3000


random_event_player:
  daily_bugle_mystery_ready:
    - daily_bugle_rooftop_right_exit_1
    - daily_bugle_rooftop_right_exit_2


sound_player:
  s_vuk_switch_active:
    bump_sfx_2:
      action: play
      bus: effects

  daily_bugle_a_complete{current_player.daily_bugle_b_hit == 0}:
    hub_create_gem:
      action: play
      bus: effects

  daily_bugle_b_complete{current_player.daily_bugle_a_hit == 0}:
    hub_create_gem:
      action: play
      bus: effects

  ab_rolledover_sfx:
    le_hit:
      action: play
      bus: effects

  daily_bugle_ab_complete:
    sm_i_better_take_some_photos:
      action: play
      bus: voice

  daily_bugle_rooftop_instruction_more_pics:
    sm_i_better_take_some_photos:
      action: play
      bus: voice

  daily_bugle_rooftop_instruction_bring_pics:
    sm_i_hope_mr_jameson_likes:
      action: play
      bus: voice

  daily_bugle_rooftop_instruction_villain_ready:
    sm_i_wonder_what_mr_jameson:
      action: play
      bus: voice

  daily_bugle_left_exit_hold_cancelled:
    zip_out:
      action: play
      bus: effects

  daily_bugle_rooftop_right_exit_1:
    sm_i_hope_mr_jameson_likes:
      action: play
      bus: voice

  daily_bugle_rooftop_right_exit_2:
    sm_i_wonder_what_mr_jameson:
      action: play
      bus: voice

  mystery_award_ball_save:
    sm_a_safety_net:
      action: play
      bus: voice

  mystery_award_start_super_spinner:
    sm_super_spinner:
      action: play
      bus: voice

  mystery_award_advance_bonus_multiplier:
    sm_a_bigger_reward:
      action: play
      bus: voice

  mystery_award_collect_bonus:
    sm_oh_i_love_bonus_points:
      action: play
      bus: voice

  mystery_award_hold_bonus:
    sm_ill_keep_these:
      action: play
      bus: voice

  mystery_award_start_super_pops:
    sm_super_pops:
      action: play
      bus: voice

  mystery_award_million_points:
    sm_a_million_points:
      action: play
      bus: voice

  mystery_award_villain_start_ready:
    jj_that_menace_is_getting_help:
      action: play
      bus: voice

  mystery_award_start_next_villain:
    sm_objective_spotted:
      action: play
      bus: voice

  say_sm_tingle:
    sm_my_spidey_senses_are_starting_to_tingle:
      action: play
      bus: voice

  s_trispinner_opto_active:
    short_click:
      action: play
      bus: effects

  s_upper_target_left_active: 
    bell1:
      action: play
      bus: effects
  s_upper_target_center_active: 
    bell2:
      action: play
      bus: effects
  s_upper_target_right_active: 
    bell3:
      action: play
      bus: effects


show_player:
  s_trispinner_opto_active:
    upper_spinner_pic_show:
      loops: 1

  # Hit feedback: flash a couple times, then stay solid.
  daily_bugle_a_complete:
    daily_bugle_a_hit_flash_then_solid:
      key: daily_bugle_a

  daily_bugle_b_complete:
    daily_bugle_b_hit_flash_then_solid:
      key: daily_bugle_b

  # Restore events: no old hit animation, just restore the correct state.
  daily_bugle_a_restore_complete:
    daily_bugle_a_solid:
      key: daily_bugle_a

  daily_bugle_a_restore_incomplete:
    daily_bugle_a_off:
      key: daily_bugle_a

  daily_bugle_b_restore_complete:
    daily_bugle_b_solid:
      key: daily_bugle_b

  daily_bugle_b_restore_incomplete:
    daily_bugle_b_off:
      key: daily_bugle_b

  # A+B complete: stop the individual A/B shows and show the spinner/AB ready state.
  daily_bugle_ab_complete:
    daily_bugle_a_hit_flash_then_solid:
      action: stop
      key: daily_bugle_a
    daily_bugle_b_hit_flash_then_solid:
      action: stop
      key: daily_bugle_b
    daily_bugle_a_solid:
      action: stop
      key: daily_bugle_a
    daily_bugle_b_solid:
      action: stop
      key: daily_bugle_b
    daily_bugle_ab_ready_show:
      loops: 3
      key: daily_bugle_ab
    daily_bugle_spinner_ready_show:
      loops: -1
      key: daily_bugle_spinner

  daily_bugle_restore_ab_ready:
    daily_bugle_ab_ready_solid:
      key: daily_bugle_ab
    daily_bugle_spinner_ready_show:
      loops: -1
      key: daily_bugle_spinner

  # Mystery ready: stop AB/spinner ready and flash mystery.
  daily_bugle_mystery_ready:
    daily_bugle_ab_ready_show:
      action: stop
      key: daily_bugle_ab
    daily_bugle_ab_ready_solid:
      action: stop
      key: daily_bugle_ab
    daily_bugle_spinner_ready_show:
      action: stop
      key: daily_bugle_spinner
    daily_bugle_ab_off_show:
      key: daily_bugle_ab
    daily_bugle_mystery_ready_show:
      loops: -1
      key: daily_bugle_mystery

  daily_bugle_restore_mystery_ready:
    daily_bugle_ab_off_show:
      key: daily_bugle_ab
    daily_bugle_mystery_ready_show:
      loops: -1
      key: daily_bugle_mystery

  daily_bugle_mystery_collected:
    daily_bugle_mystery_ready_show:
      action: stop
      key: daily_bugle_mystery
    daily_bugle_mystery_collect_show:
      loops: 4
      key: daily_bugle_collect

  daily_bugle_mystery_stop_all:
    daily_bugle_a_hit_flash_then_solid:
      action: stop
      key: daily_bugle_a
    daily_bugle_b_hit_flash_then_solid:
      action: stop
      key: daily_bugle_b
    daily_bugle_a_solid:
      action: stop
      key: daily_bugle_a
    daily_bugle_b_solid:
      action: stop
      key: daily_bugle_b
    daily_bugle_a_off:
      action: stop
      key: daily_bugle_a
    daily_bugle_b_off:
      action: stop
      key: daily_bugle_b
    daily_bugle_ab_ready_show:
      action: stop
      key: daily_bugle_ab
    daily_bugle_ab_ready_solid:
      action: stop
      key: daily_bugle_ab
    daily_bugle_ab_off_show:
      action: stop
      key: daily_bugle_ab
    daily_bugle_spinner_ready_show:
      action: stop
      key: daily_bugle_spinner
    daily_bugle_mystery_ready_show:
      action: stop
      key: daily_bugle_mystery
    daily_bugle_mystery_collect_show:
      action: stop
      key: daily_bugle_collect


shows:
  upper_spinner_pic_show:
    - duration: 100ms
      lights:
        gi: white
    - duration: 100ms
      lights:
        gi: blue
    - duration: 100ms
      lights:
        gi: off

  daily_bugle_a_hit_flash_then_solid:
    - duration: 120ms
      lights:
        l_a_rollover: white
        l_right_a: white
    - duration: 120ms
      lights:
        l_a_rollover: off
        l_right_a: off
    - duration: 120ms
      lights:
        l_a_rollover: white
        l_right_a: white
    - duration: 120ms
      lights:
        l_a_rollover: off
        l_right_a: off
    - duration: -1
      lights:
        l_a_rollover: yellow
        l_right_a: yellow

  daily_bugle_b_hit_flash_then_solid:
    - duration: 120ms
      lights:
        l_b_rollover: white
        l_left_b: white
    - duration: 120ms
      lights:
        l_b_rollover: off
        l_left_b: off
    - duration: 120ms
      lights:
        l_b_rollover: white
        l_left_b: white
    - duration: 120ms
      lights:
        l_b_rollover: off
        l_left_b: off
    - duration: -1
      lights:
        l_b_rollover: yellow
        l_left_b: yellow

  daily_bugle_a_solid:
    - duration: -1
      lights:
        l_a_rollover: yellow
        l_right_a: yellow

  daily_bugle_b_solid:
    - duration: -1
      lights:
        l_b_rollover: yellow
        l_left_b: yellow

  daily_bugle_a_off:
    - duration: -1
      lights:
        l_a_rollover: off
        l_right_a: off

  daily_bugle_b_off:
    - duration: -1
      lights:
        l_b_rollover: off
        l_left_b: off

  daily_bugle_ab_off_show:
    - duration: -1
      lights:
        l_a_rollover: off
        l_right_a: off
        l_b_rollover: off
        l_left_b: off

  daily_bugle_ab_ready_show:
    - duration: 300ms
      lights:
        l_a_rollover: white
        l_right_a: white
        l_b_rollover: white
        l_left_b: white
    - duration: 300ms
      lights:
        l_a_rollover: yellow
        l_b_rollover: yellow
        l_right_a: yellow
        l_left_b: yellow

  daily_bugle_ab_ready_solid:
    - duration: -1
      lights:
        l_a_rollover: yellow
        l_right_a: yellow
        l_b_rollover: yellow
        l_left_b: yellow

  daily_bugle_spinner_ready_show:
    - duration: 400ms
      lights:
        l_spinner: white
    - duration: 400ms
      lights:
        l_spinner: yellow

  daily_bugle_mystery_ready_show:
    - duration: 250ms
      lights:
        l_spinner: green
    - duration: 250ms
      lights:
        l_spinner: off

  daily_bugle_mystery_collect_show:
    - duration: 150ms
      lights:
        gi: white
    - duration: 150ms
      lights:
        gi: blue
