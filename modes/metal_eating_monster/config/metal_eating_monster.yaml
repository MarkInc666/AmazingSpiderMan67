#config_version=6

# Metal-Eating Monster placeholder villain mode.
# Mode idea: Monster eats metal targets; hit repair shots or lose scoring areas temporarily.

mode:
  start_events: start_mode_metal_eating_monster
  stop_events:
    - metal_eating_monster_mode_complete
    - metal_eating_monster_mode_failed
    - metal_eating_monster_mode_completed_summary
    - ball_ended
  code: metal_eating_monster.MetalEatingMonster
  priority: 300

widget_player:
  mode_metal_eating_monster_started:
    metal_eating_monster:
      action: play

  metal_eating_monster_mode_complete:
    metal_eating_monster:
      action: remove

  metal_eating_monster_mode_failed:
    metal_eating_monster:
      action: remove

  mode_metal_eating_monster_stopping:
    metal_eating_monster:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: metal_eating_monster_shot_hit
  s_pop_right_active: metal_eating_monster_shot_hit
  s_trispinner_opto_active: metal_eating_monster_shot_hit
  s_web_spinner_active: metal_eating_monster_shot_hit
  s_star_rollover_active: metal_eating_monster_shot_hit
  s_upper_target_left_active: metal_eating_monster_shot_hit
  s_upper_target_center_active: metal_eating_monster_shot_hit
  s_upper_target_right_active: metal_eating_monster_shot_hit

  s_left_drops_1_active: metal_eating_monster_shot_hit
  s_left_drops_2_active: metal_eating_monster_shot_hit
  s_left_drops_3_active: metal_eating_monster_shot_hit
  s_right_drops_1_active: metal_eating_monster_shot_hit
  s_right_drops_2_active: metal_eating_monster_shot_hit
  s_right_drops_3_active: metal_eating_monster_shot_hit
  s_right_drops_4_active: metal_eating_monster_shot_hit
  s_right_drops_5_active: metal_eating_monster_shot_hit

  s_saucer_1_active:
    - metal_eating_monster_major_hit
    - clear_saucers
  s_saucer_2_active:
    - metal_eating_monster_major_hit
    - clear_saucers
  s_saucer_3_active:
    - metal_eating_monster_major_hit
    - clear_saucers
  s_vuk_switch_active: metal_eating_monster_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_metal_eating_monster_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_metal_eating_monster_stopping:
    - clear_saucers
