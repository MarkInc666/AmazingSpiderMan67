#config_version=6

# Eigor placeholder villain mode.
# Mode idea: Start with limited flips; correct mind-control shots restore flips; wrong flips are costly.

mode:
  start_events: start_mode_eigor
  stop_events:
    - eigor_mode_complete
    - eigor_mode_completed_summary
    - ball_ended
  code: eigor.Eigor
  priority: 300

widget_player:
  mode_eigor_started:
    eigor:
      action: play

  eigor_mode_complete:
    eigor:
      action: remove

  mode_eigor_stopping:
    eigor:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: eigor_shot_hit
  s_pop_right_active: eigor_shot_hit
  s_trispinner_opto_active: eigor_shot_hit
  s_web_spinner_active: eigor_shot_hit
  s_star_rollover_active: eigor_shot_hit
  s_upper_target_left_active: eigor_shot_hit
  s_upper_target_center_active: eigor_shot_hit
  s_upper_target_right_active: eigor_shot_hit

  s_left_drops_1_active: eigor_shot_hit
  s_left_drops_2_active: eigor_shot_hit
  s_left_drops_3_active: eigor_shot_hit
  s_right_drops_1_active: eigor_shot_hit
  s_right_drops_2_active: eigor_shot_hit
  s_right_drops_3_active: eigor_shot_hit
  s_right_drops_4_active: eigor_shot_hit
  s_right_drops_5_active: eigor_shot_hit

  s_saucer_1_active:
    - eigor_major_hit
    - clear_saucers
  s_saucer_2_active:
    - eigor_major_hit
    - clear_saucers
  s_saucer_3_active:
    - eigor_major_hit
    - clear_saucers
  s_vuk_switch_active: eigor_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_eigor_started:
    - rooftop_diverter_open|500ms
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_eigor_stopping:
    - clear_saucers

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_eigor_started:
    gi: 90B050

  mode_eigor_stopping:
    gi: E0E0E0

