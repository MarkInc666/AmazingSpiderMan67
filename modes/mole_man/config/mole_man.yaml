#config_version=6

# Mole Man placeholder villain mode.
# Gameplay notes:
# Mole Man Mode idea: Monster Island chapter. Underground/drop-bank threat. Placeholder: common shots build progress; later gameplay should focus on completing/resetting drop banks and saucer escapes.
#
# This is intentionally simple for now. Hardware events are mapped to
# generic Python events, and the Python mode handles score/state/summary.

mode:
  start_events: start_mode_mole_man
  stop_events:
    - mole_man_mode_complete
    - mole_man_mode_failed
    - mole_man_mode_completed_summary
    - ball_ended
  code: mole_man.MoleMan
  priority: 300


widget_player:
  mode_mole_man_started:
    mole_man:
      action: play

  mole_man_mode_complete:
    mole_man:
      action: remove

  mole_man_mode_failed:
    mole_man:
      action: remove

  mode_mole_man_stopping:
    mole_man:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: mole_man_shot_hit
  s_pop_right_active: mole_man_shot_hit
  s_trispinner_opto_active: mole_man_shot_hit
  s_web_spinner_active: mole_man_shot_hit
  s_star_rollover_active: mole_man_shot_hit
  s_upper_target_left_active: mole_man_shot_hit
  s_upper_target_center_active: mole_man_shot_hit
  s_upper_target_right_active: mole_man_shot_hit

  s_left_drops_1_active: mole_man_shot_hit
  s_left_drops_2_active: mole_man_shot_hit
  s_left_drops_3_active: mole_man_shot_hit
  s_right_drops_1_active: mole_man_shot_hit
  s_right_drops_2_active: mole_man_shot_hit
  s_right_drops_3_active: mole_man_shot_hit
  s_right_drops_4_active: mole_man_shot_hit
  s_right_drops_5_active: mole_man_shot_hit

  s_saucer_1_active:
    - mole_man_major_hit
    - clear_saucers
  s_saucer_2_active:
    - mole_man_major_hit
    - clear_saucers
  s_saucer_3_active:
    - mole_man_major_hit
    - clear_saucers
  s_vuk_switch_active: mole_man_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_mole_man_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_mole_man_stopping:
    - clear_saucers
