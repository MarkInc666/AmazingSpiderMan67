#config_version=6

# Find the Mole Man
# Upper targets reveal the secret lower drop target by knocking down non-secret drops.
# Spinner builds the jackpot. Once only the secret target remains, hurry back lower
# and hit it before the timer expires.

mode:
  start_events: start_mode_mole_man
  stop_events:
    - mole_man_mode_complete
    - mole_man_mode_failed
    - mole_man_mode_completed_summary
    - ball_ended
  code: mole_man.MoleMan
  priority: 300


widget_player:
  mode_mole_man_started:
    mole_man:
      action: play

  mole_man_mode_complete:
    mole_man:
      action: remove

  mole_man_mode_failed:
    mole_man:
      action: remove

  mode_mole_man_stopping:
    mole_man:
      action: remove


event_player:
  mode_mole_man_started:
    - clear_saucers
    - rooftop_diverter_open

  mode_mole_man_stopping:
    - clear_saucers
    - rooftop_diverter_close
