#config_version=6

mode:
  code: case_files.CaseFiles
  start_events: ball_started
  stop_events: ball_ending
  priority: 120

widget_player:
  case_files_status_changed:
    daily_bugle_ready:
      action: update

event_player:
  s_web_spinner_active:
    - case_file_spinner_hit

  s_right_drops_1_active:
    - case_file_drop_1_hit
  s_right_drops_2_active:
    - case_file_drop_2_hit
  s_right_drops_3_active:
    - case_file_drop_3_hit
  s_right_drops_4_active:
    - case_file_drop_4_hit
  s_right_drops_5_active:
    - case_file_drop_5_hit


show_player:
  # Any right 5-bank hit flashes the local GI.
  case_file_any_drop_hit:
    case_file_5bank_gi_flash:
      loops: 2
      key: case_file_5bank_gi

  # Stop the currently flashing target before setting the collected target solid.
  case_file_selected_stop:
    case_file_more_jackpots_flash:
      action: stop
    case_file_more_time_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_safety_net_flash:
      action: stop
    case_file_shot_assist_flash:
      action: stop

  # Selected/flashing Case File target.
  case_file_selected_more_jackpots:
    case_file_more_time_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_safety_net_flash:
      action: stop
    case_file_shot_assist_flash:
      action: stop
    case_file_more_jackpots_flash:
      loops: -1

  case_file_selected_more_time:
    case_file_more_jackpots_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_safety_net_flash:
      action: stop
    case_file_shot_assist_flash:
      action: stop
    case_file_more_time_flash:
      loops: -1

  case_file_selected_bigger_jackpots:
    case_file_more_jackpots_flash:
      action: stop
    case_file_more_time_flash:
      action: stop
    case_file_safety_net_flash:
      action: stop
    case_file_shot_assist_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      loops: -1

  case_file_selected_safety_net:
    case_file_more_jackpots_flash:
      action: stop
    case_file_more_time_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_shot_assist_flash:
      action: stop
    case_file_safety_net_flash:
      loops: -1

  case_file_selected_shot_assist:
    case_file_more_jackpots_flash:
      action: stop
    case_file_more_time_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_safety_net_flash:
      action: stop
    case_file_shot_assist_flash:
      loops: -1

  # Collected Case File target goes solid.
  case_file_collected_more_jackpots:
    case_file_more_jackpots_flash:
      action: stop
    case_file_more_jackpots_solid:
      loops: -1

  case_file_collected_more_time:
    case_file_more_time_flash:
      action: stop
    case_file_more_time_solid:
      loops: -1

  case_file_collected_bigger_jackpots:
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_bigger_jackpots_solid:
      loops: -1

  case_file_collected_safety_net:
    case_file_safety_net_flash:
      action: stop
    case_file_safety_net_solid:
      loops: -1

  case_file_collected_shot_assist:
    case_file_shot_assist_flash:
      action: stop
    case_file_shot_assist_solid:
      loops: -1

  # Clear all Case File shows on a manual Case File reset.
  case_files_cleared:
    case_file_more_jackpots_flash:
      action: stop
    case_file_more_time_flash:
      action: stop
    case_file_bigger_jackpots_flash:
      action: stop
    case_file_safety_net_flash:
      action: stop
    case_file_shot_assist_flash:
      action: stop
    case_file_more_jackpots_solid:
      action: stop
    case_file_more_time_solid:
      action: stop
    case_file_bigger_jackpots_solid:
      action: stop
    case_file_safety_net_solid:
      action: stop
    case_file_shot_assist_solid:
      action: stop

shows:
  case_file_5bank_gi_flash:
    - duration: 100ms
      lights:
        l_gi_5bank_lower: white
        l_gi_5bank_upper: white
    - duration: 100ms
      lights:
        l_gi_5bank_lower: off
        l_gi_5bank_upper: off

  case_file_more_jackpots_flash:
    - duration: 250ms
      lights:
        l_5bank_1: white
    - duration: 250ms
      lights:
        l_5bank_1: off

  case_file_more_time_flash:
    - duration: 250ms
      lights:
        l_5bank_2: white
    - duration: 250ms
      lights:
        l_5bank_2: off

  case_file_bigger_jackpots_flash:
    - duration: 250ms
      lights:
        l_5bank_3: white
    - duration: 250ms
      lights:
        l_5bank_3: off

  case_file_safety_net_flash:
    - duration: 250ms
      lights:
        l_5bank_4: white
    - duration: 250ms
      lights:
        l_5bank_4: off

  case_file_shot_assist_flash:
    - duration: 250ms
      lights:
        l_5bank_5: white
    - duration: 250ms
      lights:
        l_5bank_5: off

  case_file_more_jackpots_solid:
    - duration: -1
      lights:
        l_5bank_1: blue

  case_file_more_time_solid:
    - duration: -1
      lights:
        l_5bank_2: blue

  case_file_bigger_jackpots_solid:
    - duration: -1
      lights:
        l_5bank_3: blue

  case_file_safety_net_solid:
    - duration: -1
      lights:
        l_5bank_4: blue

  case_file_shot_assist_solid:
    - duration: -1
      lights:
        l_5bank_5: blue
