#config_version=6

# Fifth Dimension Curse placeholder mini-wizard.
# Mystic Menace mini-wizard multiball.
# Temporary flow: intro -> 2-ball multiball -> MB end -> summary -> next chapter.

mode:
  start_events: start_mode_fifth_dimension_curse
  stop_events:
    - stop_mode_fifth_dimension_curse
    - ball_ended
  code: fifth_dimension_curse.FifthDimensionCurse
  priority: 800

multiballs:
  fifth_dimension_curse_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: fifth_dimension_curse_start_multiball
    stop_events:
      - stop_mode_fifth_dimension_curse

variable_player:
  multiball_fifth_dimension_curse_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_fifth_dimension_curse_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_fifth_dimension_curse_started:
    fifth_dimension_curse:
      action: play

  fifth_dimension_curse_mode_complete:
    fifth_dimension_curse:
      action: remove

  fifth_dimension_curse_mode_failed:
    fifth_dimension_curse:
      action: remove

  mode_fifth_dimension_curse_stopping:
    fifth_dimension_curse:
      action: remove

  stop_mode_fifth_dimension_curse:
    fifth_dimension_curse:
      action: remove

event_player:
  s_pop_left_active: fifth_dimension_curse_shot_hit
  s_pop_right_active: fifth_dimension_curse_shot_hit
  s_trispinner_opto_active: fifth_dimension_curse_shot_hit
  s_web_spinner_active: fifth_dimension_curse_shot_hit
  s_star_rollover_active: fifth_dimension_curse_shot_hit
  s_upper_target_left_active: fifth_dimension_curse_shot_hit
  s_upper_target_center_active: fifth_dimension_curse_shot_hit
  s_upper_target_right_active: fifth_dimension_curse_shot_hit
  s_left_drops_1_active: fifth_dimension_curse_shot_hit
  s_left_drops_2_active: fifth_dimension_curse_shot_hit
  s_left_drops_3_active: fifth_dimension_curse_shot_hit
  s_right_drops_1_active: fifth_dimension_curse_shot_hit
  s_right_drops_2_active: fifth_dimension_curse_shot_hit
  s_right_drops_3_active: fifth_dimension_curse_shot_hit
  s_right_drops_4_active: fifth_dimension_curse_shot_hit
  s_right_drops_5_active: fifth_dimension_curse_shot_hit
  s_saucer_1_active:
    fifth_dimension_curse_shot_hit:
    delayed_kickout_saucer_1:
  s_saucer_2_active:
    fifth_dimension_curse_shot_hit:
    delayed_kickout_saucer_2:
  s_saucer_3_active:
    fifth_dimension_curse_shot_hit:
    delayed_kickout_saucer_3:
  s_vuk_switch_active: fifth_dimension_curse_shot_hit

  multiball_fifth_dimension_curse_multiball_ended: fifth_dimension_curse_complete_request

  mode_fifth_dimension_curse_started:
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_fifth_dimension_curse_stopping:
    - clear_saucers_delayed

  # Keep mini-wizard drop banks playable after they are completed.
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset
