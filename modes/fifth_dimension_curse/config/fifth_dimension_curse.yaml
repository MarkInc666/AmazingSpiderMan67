#config_version=6

mode:
  start_events: start_mode_fifth_dimension_curse
  stop_events:
    - stop_mode_fifth_dimension_curse
    - fifth_dimension_curse_mode_complete
    - ball_ended
  code: fifth_dimension_curse.FifthDimensionCurse
  priority: 800

multiballs:
  fifth_dimension_curse_multiball:
    ball_count: 3
    ball_count_type: total
    shoot_again: 20s
    start_events: fifth_dimension_curse_start_multiball
    stop_events:
      - stop_mode_fifth_dimension_curse

  fifth_dimension_curse_add_a_ball:
    ball_count: 1
    ball_count_type: add
    shoot_again: 10s
    start_events: fifth_dimension_curse_add_a_ball

variable_player:
  multiball_fifth_dimension_curse_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1
  multiball_fifth_dimension_curse_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0
  multiball_fifth_dimension_curse_add_a_ball_started:
    multiball_autoplunge_active:
      action: set
      int: 1
  multiball_fifth_dimension_curse_add_a_ball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_fifth_dimension_curse_started:
    fifth_dimension_curse:
      action: play
  fifth_dimension_curse_mode_complete:
    fifth_dimension_curse:
      action: remove
  mode_fifth_dimension_curse_stopping:
    fifth_dimension_curse:
      action: remove

event_player:
  mode_fifth_dimension_curse_started:
    - disable_daily_bugle_mystery
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
    - play_song_48
  mode_fifth_dimension_curse_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset
  s_saucer_1_active: delayed_kickout_saucer_1
  s_saucer_2_active: delayed_kickout_saucer_2
  s_saucer_3_active: delayed_kickout_saucer_3
  multiball_fifth_dimension_curse_multiball_ended: fifth_dimension_curse_multiball_ended

