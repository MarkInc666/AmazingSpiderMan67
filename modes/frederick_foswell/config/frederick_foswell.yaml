#config_version=6

# Frederick Foswell placeholder villain mode.
# Gameplay notes:
# Frederick Foswell Mode idea: Crime Wave chapter. Daily Bugle evidence/undercover story. Placeholder: common shots build progress; later gameplay should collect evidence at Daily Bugle/VUK.
#
# This is intentionally simple for now. Hardware events are mapped to
# generic Python events, and the Python mode handles score/state/summary.

mode:
  start_events: start_mode_frederick_foswell
  stop_events:
    - frederick_foswell_mode_completed_summary
    - ball_ended
  code: frederick_foswell.FrederickFoswell
  priority: 300


event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: frederick_foswell_shot_hit
  s_pop_right_active: frederick_foswell_shot_hit
  s_trispinner_opto_active: frederick_foswell_shot_hit
  s_web_spinner_active: frederick_foswell_shot_hit
  s_star_rollover_active: frederick_foswell_shot_hit
  s_upper_target_left_active: frederick_foswell_shot_hit
  s_upper_target_center_active: frederick_foswell_shot_hit
  s_upper_target_right_active: frederick_foswell_shot_hit

  s_left_drops_1_active: frederick_foswell_shot_hit
  s_left_drops_2_active: frederick_foswell_shot_hit
  s_left_drops_3_active: frederick_foswell_shot_hit
  s_right_drops_1_active: frederick_foswell_shot_hit
  s_right_drops_2_active: frederick_foswell_shot_hit
  s_right_drops_3_active: frederick_foswell_shot_hit
  s_right_drops_4_active: frederick_foswell_shot_hit
  s_right_drops_5_active: frederick_foswell_shot_hit

  s_saucer_1_active:
    - frederick_foswell_major_hit
    - clear_saucers
  s_saucer_2_active:
    - frederick_foswell_major_hit
    - clear_saucers
  s_saucer_3_active:
    - frederick_foswell_major_hit
    - clear_saucers
  s_vuk_switch_active: frederick_foswell_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_frederick_foswell_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_frederick_foswell_stopping:
    - clear_saucers
