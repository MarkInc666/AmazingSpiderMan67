#config_version=6

mode:
  start_events: start_mode_scarlet_sorcerer
  stop_events:
    - scarlet_sorcerer_mode_complete
    - ball_ended
  code: scarlet_sorcerer.ScarletSorcerer
  priority: 300

widget_player:
  mode_scarlet_sorcerer_started:
    scarlet_sorcerer:
      action: play

  scarlet_sorcerer_mode_complete:
    scarlet_sorcerer:
      action: remove

  mode_scarlet_sorcerer_stopping:
    scarlet_sorcerer:
      action: remove

event_player:
  s_web_target_left_active: scarlet_sorcerer_left_web_hit
  s_web_target_mid_active: scarlet_sorcerer_center_web_hit

  s_left_drops_1_active: scarlet_sorcerer_left_drops_hit
  s_left_drops_2_active: scarlet_sorcerer_left_drops_hit
  s_left_drops_3_active: scarlet_sorcerer_left_drops_hit

  s_right_drops_1_active: scarlet_sorcerer_right_drops_hit
  s_right_drops_2_active: scarlet_sorcerer_right_drops_hit
  s_right_drops_3_active: scarlet_sorcerer_right_drops_hit
  s_right_drops_4_active: scarlet_sorcerer_right_drops_hit
  s_right_drops_5_active: scarlet_sorcerer_right_drops_hit

  s_pop_left_active: scarlet_sorcerer_left_pop_hit
  s_pop_right_active: scarlet_sorcerer_right_pop_hit

  s_vuk_switch_active:
    - scarlet_sorcerer_vuk_hit
    - up_kick|1s

  # Scarlet Sorcerer does not use the three lower saucers. Always kick them out.
  s_saucer_1_active: delayed_kickout_saucer_1
  s_saucer_2_active: delayed_kickout_saucer_2
  s_saucer_3_active: delayed_kickout_saucer_3

  mode_scarlet_sorcerer_started:
    - disable_daily_bugle_mystery
    - rooftop_diverter_close
    - clear_saucers_delayed
    - reset_drops

  mode_scarlet_sorcerer_stopping:
    - rooftop_diverter_close
    - clear_saucers_delayed
    - reset_drops
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state

  # Keep both physical banks playable even if a bank is completed.
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset

show_player:
  scarlet_sorcerer_start_gi_flash:
    scarlet_sorcerer_gi_flash:
      loops: -1
  scarlet_sorcerer_stop_gi_flash:
    scarlet_sorcerer_gi_flash:
      action: stop

light_player:
  scarlet_sorcerer_gi_red:
    gi: red

  scarlet_sorcerer_light_left_web:
    l_left_web_target: yellow
  scarlet_sorcerer_unlight_left_web:
    l_left_web_target: off

  scarlet_sorcerer_light_center_web:
    l_mid_web_target: yellow
  scarlet_sorcerer_unlight_center_web:
    l_mid_web_target: off

  scarlet_sorcerer_light_left_drops:
    l_gi_3bank: yellow
  scarlet_sorcerer_unlight_left_drops:
    l_gi_3bank: red

  scarlet_sorcerer_light_right_drops:
    l_gi_5bank_lower: yellow
    l_gi_5bank_upper: yellow
  scarlet_sorcerer_unlight_right_drops:
    l_gi_5bank_lower: red
    l_gi_5bank_upper: red

  scarlet_sorcerer_light_left_pop:
