#config_version=6

# Fiddler placeholder villain mode.
# Mode idea: Fiddler plays rhythm; hit shots in beat/order to build and collect sonic jackpot.

mode:
  start_events: start_mode_fiddler
  stop_events:
    - fiddler_mode_complete
    - fiddler_mode_failed
    - fiddler_mode_completed_summary
    - ball_ended
  code: fiddler.Fiddler
  priority: 300

widget_player:
  mode_fiddler_started:
    fiddler:
      action: play

  fiddler_mode_complete:
    fiddler:
      action: remove

  fiddler_mode_failed:
    fiddler:
      action: remove

  mode_fiddler_stopping:
    fiddler:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: fiddler_shot_hit
  s_pop_right_active: fiddler_shot_hit
  s_trispinner_opto_active: fiddler_shot_hit
  s_web_spinner_active: fiddler_shot_hit
  s_star_rollover_active: fiddler_shot_hit
  s_upper_target_left_active: fiddler_shot_hit
  s_upper_target_center_active: fiddler_shot_hit
  s_upper_target_right_active: fiddler_shot_hit

  s_left_drops_1_active: fiddler_shot_hit
  s_left_drops_2_active: fiddler_shot_hit
  s_left_drops_3_active: fiddler_shot_hit
  s_right_drops_1_active: fiddler_shot_hit
  s_right_drops_2_active: fiddler_shot_hit
  s_right_drops_3_active: fiddler_shot_hit
  s_right_drops_4_active: fiddler_shot_hit
  s_right_drops_5_active: fiddler_shot_hit

  s_saucer_1_active:
    - fiddler_major_hit
    - clear_saucers
  s_saucer_2_active:
    - fiddler_major_hit
    - clear_saucers
  s_saucer_3_active:
    - fiddler_major_hit
    - clear_saucers
  s_vuk_switch_active: fiddler_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_fiddler_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_fiddler_stopping:
    - clear_saucers
