#config_version=6

mode:
  start_events: ball_started
  code: bonus_lanes.BonusLanes
  priority: 80

      
variable_player:
  mode_bonus_lanes_started:
    bonus_multiplier:
      action: set
      int: 1
    bonus_count:
      action: set
      int: 0


sound_player:

  in_out_lane_rolled_over_unlit:
    minesound1:
      action: play
      bus: effects

  in_out_lane_rolled_over_lit:
    bump_sfx_2:
      action: play
      bus: effects

  #bonus 1K
  bonus_count_add:
    hb_pot_1:
      action: play
      bus: effects

  #1/4 lanes lit
  bonus_lane_lit_sfx:
    hb_pot_1:
      action: play
      bus: effects

  #center target ready 
  bonus_center_web_lit:
    sm_hit_the_center_web:
      action: play
      bus: voice

  #almost bonus x
  bonus_left_web_lit:
    sm_hit_the_left_web:
      action: play
      bus: voice

  #bonus X
  bonus_left_web_collected_2x:
    sm_2x:
      action: play
      bus: voice
  bonus_left_web_collected_3x:
    sm_3x:
      action: play
      bus: voice
  bonus_left_web_collected_4x:
    sm_4x:
      action: play
      bus: voice
  bonus_left_web_collected_5x:
    sm_5x:
      action: play
      bus: voice
  bonus_left_web_collected_max:
    hb_bounce_2:
      action: play
      bus: effects


event_player:
  mode_bonus_lanes_started:
    - bonus_lanes_start

  s_upper_entrance_opto_active:
    - bonus_count_add

  s_star_rollover_active:
    - bonus_count_add

  s_left_flipper_active:
    - bonus_lanes_rotate_left

  s_right_flipper_active:
    - bonus_lanes_rotate_right

  s_outlane_l_active:
    - bonus_lane_1_hit

  s_inlane_l_active:
    - bonus_lane_2_hit

  s_inlane_r_active:
    - bonus_lane_3_hit

  s_outlane_r_active:
    - bonus_lane_4_hit

  s_web_target_mid_active:
    - bonus_center_web_request
#    - bonus_count_add

  s_web_target_left_active:
    - bonus_left_web_request
#    - bonus_count_add

  timer_bonus_center_web_timer_complete:
    - bonus_center_web_timeout

  timer_bonus_left_web_timer_complete:
    - bonus_left_web_timeout

  drop_target_bank_dt_bank_left_down:
    - bonus_left_bank_complete

  drop_target_bank_dt_bank_right_down:
    - bonus_right_bank_complete    


timers:
  bonus_center_web_timer:
    start_value: 10
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: bonus_center_web_lit
        action: restart
      - event: bonus_center_web_collected
        action: stop
      - event: ball_ended
        action: stop

  bonus_left_web_timer:
    start_value: 10
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: bonus_left_web_lit
        action: restart
      - event: bonus_left_web_collected
        action: stop
      - event: ball_ended
        action: stop

show_player:
  bonus_show_lanes:
  #shut off the lanes
    bonus_lane_1_solid:
      action: stop
    bonus_lane_2_solid:
      action: stop
    bonus_lane_3_solid:
      action: stop
    bonus_lane_4_solid:
      action: stop
    bonus_lane_show:
      loops: 3

  bonus_center_web_lit:
    bonus_center_web_show:
      loops: -1

  bonus_center_web_collected:
    bonus_center_web_show:
      action: stop

  bonus_center_web_timeout:
    bonus_center_web_show:
      action: stop

  bonus_left_web_lit:
    bonus_left_web_show:
      loops: -1

  bonus_left_web_collected:
    bonus_left_web_show:
      action: stop
    bonus_multiplier_award_show:
      loops: 1

  bonus_left_web_timeout:
    bonus_left_web_show:
      action: stop

  bonus_lane_1_solid:
    bonus_lane_1_solid:
      loops: -1

  bonus_lane_1_off:
    bonus_lane_1_solid:
      action: stop
      
