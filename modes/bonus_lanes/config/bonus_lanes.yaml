shows:
  bonus_lane_show:
    - duration: 300ms
      lights:
        l_left_outlane: white
        l_left_inlane: white
        l_right_inlane: white
        l_right_outlane: white
    - duration: 300ms
      lights:
        l_left_outlane: off
        l_left_inlane: off
        l_right_inlane: off
        l_right_outlane: off
                

  bonus_center_web_show:
    - duration: 250ms
      lights:
        l_mid_web_target: white
    - duration: 250ms
      lights:
        l_mid_web_target: blue

  bonus_left_web_show:
    - duration: 250ms
      lights:
        l_left_web_target: white
    - duration: 250ms
      lights:
        l_left_web_target: blue

  bonus_multiplier_award_show:
    - duration: 150ms
      lights:
        gi: white
    - duration: 150ms
      lights:
        gi: blue
        
  bonus_lane_1_pulse:
    - duration: 400ms
      lights:
        l_left_outlane: purple
    - duration: 400ms
      lights:
        l_left_outlane: blue

  bonus_lane_2_pulse:
