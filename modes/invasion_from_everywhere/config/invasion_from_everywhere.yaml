#config_version=6

# Night of the Robots placeholder mini-wizard.
# Robot Rampage mini-wizard multiball.
# Temporary flow: intro -> 2-ball multiball -> MB end -> summary -> next chapter.

mode:
  start_events: start_mode_invasion_from_everywhere
  stop_events:
    - stop_mode_invasion_from_everywhere
    - ball_ended
  code: invasion_from_everywhere.InvasionFromEverywhere
  priority: 800

multiballs:
  invasion_from_everywhere_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 15s
    start_events: invasion_from_everywhere_start_multiball
    stop_events:
      - stop_mode_invasion_from_everywhere

variable_player:
  multiball_invasion_from_everywhere_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_invasion_from_everywhere_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

widget_player:
  mode_invasion_from_everywhere_started:
    invasion_from_everywhere:
      action: play

  invasion_from_everywhere_mode_complete:
    invasion_from_everywhere:
      action: remove

  mode_invasion_from_everywhere_stopping:
    invasion_from_everywhere:
      action: remove

  stop_mode_invasion_from_everywhere:
    invasion_from_everywhere:
      action: remove

event_player:
  s_pop_left_active: invasion_from_everywhere_shot_hit
  s_pop_right_active: invasion_from_everywhere_shot_hit
  s_trispinner_opto_active: invasion_from_everywhere_shot_hit
  s_web_spinner_active: invasion_from_everywhere_shot_hit
  s_star_rollover_active: invasion_from_everywhere_shot_hit
  s_upper_target_left_active: invasion_from_everywhere_shot_hit
  s_upper_target_center_active: invasion_from_everywhere_shot_hit
  s_upper_target_right_active: invasion_from_everywhere_shot_hit
  s_left_drops_1_active: invasion_from_everywhere_shot_hit
  s_left_drops_2_active: invasion_from_everywhere_shot_hit
  s_left_drops_3_active: invasion_from_everywhere_shot_hit
  s_right_drops_1_active: invasion_from_everywhere_shot_hit
  s_right_drops_2_active: invasion_from_everywhere_shot_hit
  s_right_drops_3_active: invasion_from_everywhere_shot_hit
  s_right_drops_4_active: invasion_from_everywhere_shot_hit
  s_right_drops_5_active: invasion_from_everywhere_shot_hit
  s_saucer_1_active:
    invasion_from_everywhere_shot_hit:
    delayed_kickout_saucer_1:
  s_saucer_2_active:
    invasion_from_everywhere_shot_hit:
    delayed_kickout_saucer_2:
  s_saucer_3_active:
    invasion_from_everywhere_shot_hit:
    delayed_kickout_saucer_3:
  s_vuk_switch_active:
    - invasion_from_everywhere_shot_hit
    - up_kick|1.5s

  multiball_invasion_from_everywhere_multiball_ended: invasion_from_everywhere_complete_request

  mode_invasion_from_everywhere_started:
    - rooftop_diverter_open|500ms
    - disable_daily_bugle_mystery
    - clear_saucers_delayed
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_invasion_from_everywhere_stopping:
    - enable_daily_bugle_mystery
    - daily_bugle_restore_state
    - clear_saucers_delayed

  # Keep mini-wizard drop banks playable after they are completed.
  drop_target_bank_dt_bank_left_down: drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down: drop_target_bank_dt_bank_right_reset

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_invasion_from_everywhere_started:
    gi: 30A0C0

  mode_invasion_from_everywhere_stopping:
    gi: E0E0E0

