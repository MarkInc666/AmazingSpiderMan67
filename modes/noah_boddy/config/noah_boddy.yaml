#config_version=6

# Find the Noah Boddy
# Upper targets reveal the secret lower drop target by knocking down non-secret drops.
# Spinner builds the jackpot. Once only the secret target remains, hurry back lower
# and hit it before the timer expires.

mode:
  start_events: start_mode_noah_boddy
  stop_events:
    - noah_boddy_mode_complete
    - noah_boddy_mode_completed_summary
    - ball_ended
  code: noah_boddy.NoahBoddy
  priority: 300


widget_player:
  mode_noah_boddy_started:
    noah_boddy:
      action: play

  noah_boddy_mode_complete:
    noah_boddy:
      action: remove

  mode_noah_boddy_stopping:
    noah_boddy:
      action: remove


event_player:
  mode_noah_boddy_started:
    - clear_saucers
    - rooftop_diverter_open

  mode_noah_boddy_stopping:
    - clear_saucers
    - rooftop_diverter_close
