#config_version=6

mode:
  start_events: start_mode_kingpin
  stop_events:
    - kingpin_mode_completed_summary
    - ball_ended
  priority: 1000
  code: kingpin.Kingpin

variable_player:
  multiball_kingpin_multiball_started:
    multiball_autoplunge_active:
      action: set
      int: 1

  multiball_kingpin_multiball_ended:
    multiball_autoplunge_active:
      action: set
      int: 0

multiballs:
  kingpin_multiball:
    ball_count: 2
    ball_count_type: total
    shoot_again: 20s
    start_events: kingpin_start_multiball
    stop_events:
      - kingpin_stop_multiball
      - kingpin_mode_completed_summary
      - ball_ended

event_player:
  mode_kingpin_started:
    - kingpin_setup

  kingpin_setup:
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset|100ms
    - clear_saucers_delayed
    - kingpin_start_multiball
    - kingpin_mode_intro

  mode_kingpin_stopping:
    - kingpin_stop_multiball
    - kingpin_clear_lights

  kingpin_mode_complete:
    villain_bookend_summary_request:
      villain: kingpin
      done_event: kingpin_mode_completed_summary

  multiball_kingpin_multiball_ended:
    - kingpin_multiball_ended

  s_right_drops_1_active: kingpin_right_drop_1_hit
  s_right_drops_2_active: kingpin_right_drop_2_hit
  s_right_drops_3_active: kingpin_right_drop_3_hit
  s_right_drops_4_active: kingpin_right_drop_4_hit
  s_right_drops_5_active: kingpin_right_drop_5_hit

  drop_target_bank_dt_bank_left_down: kingpin_left_bank_complete

  s_saucer_1_active: delayed_kickout_saucer_1
  s_saucer_2_active: delayed_kickout_saucer_2
  s_saucer_3_active: delayed_kickout_saucer_3

widget_player:
  mode_kingpin_started:
    kingpin:
      action: play

  kingpin_mode_complete:
    kingpin:
      action: remove

  mode_kingpin_stopping:
    kingpin:
      action: remove

light_player:
  # Full-playfield GI theme while this mode is active.
  mode_kingpin_started:
    gi: 7B2CBF

  mode_kingpin_stopping:
    gi: E0E0E0

  kingpin_clear_lights:
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: off
    l_5bank_4: off
    l_5bank_5: off

  kingpin_target_1_complete:
    l_5bank_1: green
  kingpin_target_2_complete:
    l_5bank_2: green
  kingpin_target_3_complete:
    l_5bank_3: green
  kingpin_target_4_complete:
    l_5bank_4: green
  kingpin_target_5_complete:
    l_5bank_5: green

  kingpin_extra_round_started:
    l_5bank_1: yellow
    l_5bank_2: yellow
    l_5bank_3: yellow
    l_5bank_4: yellow
    l_5bank_5: yellow

show_player:
  kingpin_round_started:
    kingpin_right_drop_1_available_show:
      action: play
      loops: -1
      speed: 2
    kingpin_right_drop_2_available_show:
      action: play
      loops: -1
      speed: 2
    kingpin_right_drop_3_available_show:
      action: play
      loops: -1
      speed: 2
    kingpin_right_drop_4_available_show:
      action: play
      loops: -1
      speed: 2
    kingpin_right_drop_5_available_show:
      action: play
      loops: -1
      speed: 2
    kingpin_left_bank_time_show:
      action: play
      loops: -1
      speed: 2

  kingpin_target_1_complete:
    kingpin_right_drop_1_available_show:
      action: stop
  kingpin_target_2_complete:
    kingpin_right_drop_2_available_show:
      action: stop
  kingpin_target_3_complete:
    kingpin_right_drop_3_available_show:
      action: stop
  kingpin_target_4_complete:
    kingpin_right_drop_4_available_show:
      action: stop
  kingpin_target_5_complete:
    kingpin_right_drop_5_available_show:
      action: stop

  kingpin_bank_sweep_started:
    kingpin_right_drop_1_available_show:
      action: stop
    kingpin_right_drop_2_available_show:
      action: stop
    kingpin_right_drop_3_available_show:
      action: stop
    kingpin_right_drop_4_available_show:
      action: stop
    kingpin_right_drop_5_available_show:
      action: stop

  kingpin_extra_round_started:
    kingpin_right_drop_1_available_show:
      action: play
      loops: -1
      speed: 3
    kingpin_right_drop_2_available_show:
      action: play
      loops: -1
      speed: 3
    kingpin_right_drop_3_available_show:
      action: play
      loops: -1
      speed: 3
    kingpin_right_drop_4_available_show:
      action: play
      loops: -1
      speed: 3
    kingpin_right_drop_5_available_show:
      action: play
      loops: -1
      speed: 3

  kingpin_clear_lights:
    kingpin_right_drop_1_available_show:
      action: stop
    kingpin_right_drop_2_available_show:
      action: stop
    kingpin_right_drop_3_available_show:
      action: stop
    kingpin_right_drop_4_available_show:
      action: stop
    kingpin_right_drop_5_available_show:
      action: stop
    kingpin_left_bank_time_show:
      action: stop

shows:
  kingpin_right_drop_1_available_show:
    - duration: 250ms
      lights:
        l_5bank_1: yellow
    - duration: 250ms
      lights:
        l_5bank_1: off
  kingpin_right_drop_2_available_show:
    - duration: 250ms
      lights:
        l_5bank_2: yellow
    - duration: 250ms
      lights:
        l_5bank_2: off
  kingpin_right_drop_3_available_show:
    - duration: 250ms
      lights:
        l_5bank_3: yellow
    - duration: 250ms
      lights:
        l_5bank_3: off
  kingpin_right_drop_4_available_show:
    - duration: 250ms
      lights:
        l_5bank_4: yellow
    - duration: 250ms
      lights:
        l_5bank_4: off
  kingpin_right_drop_5_available_show:
    - duration: 250ms
      lights:
        l_5bank_5: yellow
    - duration: 250ms
      lights:
        l_5bank_5: off

  kingpin_left_bank_time_show:
    - duration: 400ms
      lights:
        l_3bankbonus: blue
    - duration: 400ms
      lights:
        l_3bankbonus: off
