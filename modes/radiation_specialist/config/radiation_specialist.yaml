#config_version=6

# Spider-Slayer placeholder villain mode.
# Mode idea: Robot locks onto shot groups; hit priority target before attack resolves.

mode:
  start_events: start_mode_radiation_specialist
  stop_events:
    - radiation_specialist_mode_complete
    - radiation_specialist_mode_completed_summary
    - ball_ended
  code: radiation_specialist.RadiationSpecialist
  priority: 300

widget_player:
  mode_radiation_specialist_started:
    radiation_specialist:
      action: play

  radiation_specialist_mode_complete:
    radiation_specialist:
      action: remove

  mode_radiation_specialist_stopping:
    radiation_specialist:
      action: remove

event_player:
  # Common playfield hits. Refine these later when the mode design is built out.
  s_pop_left_active: radiation_specialist_shot_hit
  s_pop_right_active: radiation_specialist_shot_hit
  s_trispinner_opto_active: radiation_specialist_shot_hit
  s_web_spinner_active: radiation_specialist_shot_hit
  s_star_rollover_active: radiation_specialist_shot_hit
  s_upper_target_left_active: radiation_specialist_shot_hit
  s_upper_target_center_active: radiation_specialist_shot_hit
  s_upper_target_right_active: radiation_specialist_shot_hit

  s_left_drops_1_active: radiation_specialist_shot_hit
  s_left_drops_2_active: radiation_specialist_shot_hit
  s_left_drops_3_active: radiation_specialist_shot_hit
  s_right_drops_1_active: radiation_specialist_shot_hit
  s_right_drops_2_active: radiation_specialist_shot_hit
  s_right_drops_3_active: radiation_specialist_shot_hit
  s_right_drops_4_active: radiation_specialist_shot_hit
  s_right_drops_5_active: radiation_specialist_shot_hit

  s_saucer_1_active:
    - radiation_specialist_major_hit
    - clear_saucers
  s_saucer_2_active:
    - radiation_specialist_major_hit
    - clear_saucers
  s_saucer_3_active:
    - radiation_specialist_major_hit
    - clear_saucers
  s_vuk_switch_active: radiation_specialist_major_hit

  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset
  drop_target_bank_dt_bank_right_down:
    - drop_target_bank_dt_bank_right_reset

  mode_radiation_specialist_started:
    - clear_saucers
    - drop_target_bank_dt_bank_left_reset
    - drop_target_bank_dt_bank_right_reset

  mode_radiation_specialist_stopping:
    - clear_saucers
