#config_version=6

# Diana - Archery Volley
# Limited arrows/flips. Rearm on the upper playfield, then exit upper-left to start timed right-bank Hunt windows.

mode:
  start_events: start_mode_diana
  stop_events:
    - diana_mode_complete
    - diana_mode_completed_summary
    - ball_ended
  code: diana.Diana
  priority: 300

widget_player:
  mode_diana_started:
    diana:
      action: play

  diana_mode_complete:
    diana:
      action: remove

  mode_diana_stopping:
    diana:
      action: remove

event_player:
  drop_target_bank_dt_bank_left_down:
    - drop_target_bank_dt_bank_left_reset

  # Rearm upstairs. Daily Bugle/Vulture-style shared VUK handling is left alone.
  s_trispinner_opto_active:
    - diana_upper_spinner_hit

  s_upper_exit_right_opto_active:
    - diana_upper_right_exit

  s_upper_exit_left_opto_active:
    - diana_upper_left_exit

  s_upper_entrance_opto_active:
    - diana_upper_entered

  # Timed Hunt bullseyes.
  s_right_drops_1_active:
    - diana_right_drop_1_hit
  s_right_drops_2_active:
    - diana_right_drop_2_hit
  s_right_drops_3_active:
    - diana_right_drop_3_hit
  s_right_drops_4_active:
    - diana_right_drop_4_hit
  s_right_drops_5_active:
    - diana_right_drop_5_hit

  # Repeatable 25K/50K arrow shot during active Hunt windows.
  s_right_drops_rubber_active:
    - diana_right_rubber_hit

  # Diana does not use saucers during gameplay; kick out any ball that lands there.
  s_saucer_1_active: clear_saucers
  s_saucer_2_active: clear_saucers
  s_saucer_3_active: clear_saucers

  # Flipper-cancel the post hold. The Hunt timer starts only after the post drops.
  s_left_flipper_active{device.switches.s_right_flipper.state == 1}:
    - diana_post_hold_cancel

  s_right_flipper_active{device.switches.s_left_flipper.state == 1}:
    - diana_post_hold_cancel

  mode_diana_started:
    - clear_saucers
    - reset_5bank
    - rooftop_diverter_open|500ms
    - diana_rearm_phase_started

  mode_diana_stopping:
    - clear_saucers
    - diana_clear_all_lights

coil_player:
  diana_drop_right_target_1:
    c_right_bank_drop_1:
      action: pulse
  diana_drop_right_target_2:
    c_right_bank_drop_2:
      action: pulse
  diana_drop_right_target_3:
    c_right_bank_drop_3:
      action: pulse
  diana_drop_right_target_4:
    c_right_bank_drop_4:
      action: pulse
  diana_drop_right_target_5:
    c_right_bank_drop_5:
      action: pulse

light_player:
  diana_rearm_phase_started:
    l_spinner: yellow
    l_gi_a: yellow
    l_gi_ramp: yellow

  diana_hunt_1_staged:
    l_5bank_1: red
    l_5bank_2: off
    l_5bank_3: red
    l_5bank_4: off
    l_5bank_5: red
    l_gi_5bank_lower: red
    l_gi_5bank_upper: red

  diana_hunt_2_staged:
    l_5bank_1: off
    l_5bank_2: orange
    l_5bank_3: off
    l_5bank_4: orange
    l_5bank_5: off
    l_gi_5bank_lower: orange
    l_gi_5bank_upper: orange

  diana_hunt_3_staged:
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: white
    l_5bank_4: off
    l_5bank_5: off
    l_gi_5bank_lower: white
    l_gi_5bank_upper: white

  diana_bullseye_awarded:
    l_gi_5bank_lower: white
    l_gi_5bank_upper: white

  diana_rubber_arrow_awarded:
    l_gi_5bank_lower: yellow
    l_gi_5bank_upper: yellow

  diana_clear_all_lights:
    l_spinner: off
    l_gi_a: off
    l_gi_ramp: off
    l_5bank_1: off
    l_5bank_2: off
    l_5bank_3: off
    l_5bank_4: off
    l_5bank_5: off
    l_gi_5bank_lower: off
    l_gi_5bank_upper: off
